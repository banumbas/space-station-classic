name: Check PR Target Branch

# Cancel older jobs on PRs when new changes are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  check-target-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Check if PR targets starlight-dev
        run: |
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          echo "PR from: $SOURCE_BRANCH -> $TARGET_BRANCH"

          # For all PRs, require master as target
          if [ "$TARGET_BRANCH" != "master" ]; then
            echo "Error: PR must target 'master' branch, but targets '$TARGET_BRANCH'"
            echo "Please change the target branch to 'master'"
            exit 1
          else
            echo "Success: PR correctly targets 'master' branch"
          fi
