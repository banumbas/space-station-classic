name: "Labels: PR"

on:
- pull_request_target

jobs:
  labeler:
    if: github.actor != 'PJBot'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/labeler@v5

    # Starlight
  assign:
    runs-on: ubuntu-latest
    needs: labeler
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Wait a bit for labels to be applied
        run: sleep 10s
        
      - name: Assign reviewers based on labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LABELER_PAT }}
          script: |
            const labelToAssign = {
              "Changes: Sprites": ["spriters"],
              "Changes: Map": ["mappers"],
              "Changes: UI": ["dev"],
              "Changes: Shaders": ["dev"],
              "Changes: Audio": ["dev"],
              "Changes: C#": ["dev"],
              "Changes: Prototypes": ["prototypers"],
            };

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const labels = pr.data.labels.map(label => label.name);
            const reviewers = new Set();

            for (const label of labels) {
              const tempAssing = labelToAssign[label];
              if (tempAssing) {
                tempAssing.forEach(a => reviewers.add(a));
              }
            }

            if (reviewers.size > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                team_reviewers: Array.from(reviewers),
              });
            }
