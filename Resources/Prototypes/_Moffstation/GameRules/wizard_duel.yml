- type: entity
  parent: BaseGameRule
  id: WizardDuel
  components:
  - type: LoadMapRule
    mapPath: /Maps/_Starlight/Nonstations/wizards-court.yml
  - type: RuleGrids
  - type: AntagLoadProfileRule
  - type: GameRule
    minPlayers: 35
  - type: AntagObjectives
    objectives:
    - WizardDuelistMeetObjective
    - WizardDuelistRelocateObjective
    - WizardDuelistDemonstrateObjective
  - type: AntagSelection
    agentName: wizard-round-end-name
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ WizardDuelist ] # Red Wizard Duelist
      min: 1
      max: 1
      spawnerPrototype: SpawnPointGhostWizardDuelistRed
      roleLoadout:
      - RoleSurvivalWizardDuelist
      briefing:
        text: wizard-duelist-red-role-greeting
        color: Turquoise
        sound: "/Audio/_Starlight/Ambience/Antag/wizard.ogg" # Starlight
      startingGear: WizardDuelistRedGear
      components:
      - type: UniversalLanguageSpeaker # Starlight
      - type: NpcFactionMember
        factions:
        - Wizard
      - type: RandomMetadata
        nameSegments:
        - NamesWizardFirst
        - NamesWizardLast
        nameFormat: name-format-wizard
      mindRoles:
      - MindRoleWizardDuelistRed
      # Starlight-start
      tags:
        - CantBecomeRevolutionary
        - Wizard
      # Starlight-end
    - prefRoles: [ WizardDuelist ] # Blue Wizard Duelist
      min: 1
      max: 1
      spawnerPrototype: SpawnPointGhostWizardDuelistBlue
      roleLoadout:
      - RoleSurvivalWizardDuelist
      briefing:
        text: wizard-duelist-blue-role-greeting
        color: Turquoise
        sound: "/Audio/_Starlight/Ambience/Antag/wizard.ogg" # Starlight
      startingGear: WizardDuelistBlueGear
      components:
      - type: UniversalLanguageSpeaker # Starlight
      - type: NpcFactionMember
        factions:
        - Wizard
      - type: RandomMetadata
        nameSegments:
        - NamesWizardFirst
        - NamesWizardLast
        nameFormat: name-format-wizard
      mindRoles:
      - MindRoleWizardDuelistBlue
      # Starlight-start
      tags:
        - CantBecomeRevolutionary
        - Wizard
      # Starlight-end
    - prefRoles: [ WizardDuelist ] # Starlight, Purple Wizard Duelist
      min: 0 # Starlight, only spawn above 90pop
      max: 1
      playerRatio: 90 # Starlight, only spawn above 90pop
      spawnerPrototype: SpawnPointGhostWizardDuelistPurple # Starlight, violet -> Purple
      roleLoadout:
      - RoleSurvivalWizardDuelist
      briefing:
        text: wizard-duelist-purple-role-greeting # Starlight, violet -> Purple
        color: Turquoise
        sound: "/Audio/_Starlight/Ambience/Antag/wizard.ogg" # Starlight
      startingGear: WizardDuelistPurpleGear # Starlight, violet -> Purple
      components:
      - type: UniversalLanguageSpeaker # Starlight
      - type: NpcFactionMember
        factions:
        - Wizard
      - type: RandomMetadata
        nameSegments:
        - NamesWizardFirst
        - NamesWizardLast
        nameFormat: name-format-wizard
      mindRoles:
      - MindRoleWizardDuelistPurple # Starlight, violet -> Purple
      # Starlight-start
      tags:
        - CantBecomeRevolutionary
        - Wizard
    - prefRoles: [ WizardDuelist ] # Yellow Wizard Duelist
      min: 1
      max: 1
      spawnerPrototype: SpawnPointGhostWizardDuelistYellow
      roleLoadout:
      - RoleSurvivalWizardDuelist
