    - prefRoles: [ WizardDuelist ] # Orange Wizard Duelist
      min: 0 # Only spawn above 110pop
      max: 1
      playerRatio: 110 # Only spawn above 110pop, the rarest wizard
      spawnerPrototype: SpawnPointGhostWizardDuelistOrange
