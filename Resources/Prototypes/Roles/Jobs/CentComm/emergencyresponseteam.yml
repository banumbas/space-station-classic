# Leader
- type: job
  id: ERTLeader
  name: job-name-ertleader
  description: job-description-ertleader
  playTimeTracker: JobERTLeader
  # Starlight start
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 96h # Realistically, if you have the CC time, you'll have met this anyways... But, in case that CC time is removed later.
  - !type:DepartmentTimeRequirement
    department: CentralCommand
    time: 10h
  - !type:DepartmentTimeRequirement
    department: Command
    time: 20h
  - !type:RoleTimeRequirement
    role: JobSecurityOfficer
    time: 15h # If theyre not an admin, they NEED to be good in combat. You're the last hope, after all.
  # Starlight end
  setPreference: false
  startingGear: ERTLeaderGearEVA
  icon: "JobIconERTLeader"
  supervisors: job-supervisors-centcom
  canBeAntag: false
  bypassEorPacification: true # Starlight
  accessGroups:
  - AllAccess
  access:
  - CentralCommand
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant, DeathRattleImplantCentcomm ]

- type: startingGear
  parent: ERTLeaderGearEVA
  id: ERTLeaderGear
  equipment:
    shoes: ClothingShoesBootsJack
    head: ClothingHeadHelmetERTLeader
    outerClothing: ClothingOuterArmorBasic

