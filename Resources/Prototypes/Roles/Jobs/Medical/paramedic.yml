- type: job
  id: Paramedic
  name: job-name-paramedic
  description: job-description-paramedic
  playTimeTracker: JobParamedic
  requirements:
    - !type:RoleTimeRequirement # Starlight start
      role: JobMedicalDoctor # Can't be department because of Psychologist again...
      time: 4h # Starlight end
  startingGear: ParamedicGear
  icon: "JobIconParamedic"
  supervisors: job-supervisors-cmo
  canBeAntag: false # Starlight
  access:
  - Medical
  - Maintenance
  - Paramedic # Starlight
  - External # Starlight
  extendedAccess:
  - Chemistry
  - Surgery # Starlight BEGIN
  special:
    - !type:AddImplantSpecial
      implants: [ MindShieldImplant ]  # Starlight END

- type: startingGear
  id: ParamedicGear
  equipment:
    ears: ClothingHeadsetMedical
    belt: ClothingBeltMedicalEMTFilled
  storage:
    back:
    - EmergencyRollerBedSpawnFolded
    - BodyBagLockableFolded #Starlight
    - DefibrillatorParamed #Starlight

- type: chameleonOutfit
  id: ParamedicChameleonOutfit
  job: Paramedic
  equipment:
    head: ClothingHeadHatParamedicsoft
    eyes: ClothingEyesHudMedical
    mask: ClothingMaskSterile
    neck: ClothingNeckStethoscope
    outerClothing: ClothingOuterCoatParamedicWB
    gloves: ClothingHandsGlovesLatex
