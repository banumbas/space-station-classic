- type: job
  id: HeadOfSecurity
  name: job-name-hos
  description: job-description-hos
  playTimeTracker: JobHeadOfSecurity
  requirements:
    - !type:RoleTimeRequirement
      role: JobWarden
      time: 10h # Starlight
    - !type:RoleTimeRequirement
      role: JobDetective
      time: 5h # knowing how to use the tools is important # Starlight
    - !type:RoleTimeRequirement
      role: JobSecurityOfficer
      time: 15h # Starlight
    - !type:DepartmentTimeRequirement
      department: Security
      time: 50h # Starlight - Literally the most pressured role in the game, you need extensive knowledge of your department

  weight: 10
  startingGear: HoSGear
  icon: "JobIconHeadOfSecurity"
  supervisors: job-supervisors-captain
  canBeAntag: false
  access:
  - Cadet # Starlight
  - HeadOfSecurity
  - Command
  - Brig
  - Security
  - Armory
  - Maintenance
  - External
  - Detective
  - Cryogenics
  - Brigmedic
  - GenpopEnter
  - GenpopLeave
  - Debrief # Starlight
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff

- type: startingGear
  id: HoSGear
  equipment:
    eyes: ClothingEyesGlassesSecurity
    id: HoSPDA
    # gloves: ClothingHandsGlovesCombat # Starlight
    ears: ClothingHeadsetAltSecurity
  storage:
    back:
    - Flash

- type: chameleonOutfit
  id: HeadOfSecurityChameleonOutfit
  job: HeadOfSecurity
  hasMindShield: true
  equipment:
    mask: ClothingMaskGasSecurity
    neck: ClothingNeckCloakHos
