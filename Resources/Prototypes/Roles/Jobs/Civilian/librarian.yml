- type: job
  id: Librarian
  name: job-name-librarian
  description: job-description-librarian
  playTimeTracker: JobLibrarian
  startingGear: LibrarianGear
  icon: "JobIconLibrarian"
  supervisors: job-supervisors-hop
  access:
  - Service
  - Maintenance
  special: # Starlight start - librarian starts with crew languages
  - !type:AddComponentSpecial
    components:
    - type: AdditionalLanguageKnowledge # If we just put in LanguageKnowledge, it'd overwrite your ability to e.g. understand mothroaches as a moth
      speaks:
      - GalacticCommon
      - Scratch
      - SolCommon
      - Bubblish
      - Canilunzt
      - Chittin
      - Draconic
      - Marish
      - Moffic
      - Nekomimetic
      - Sylvan
      - Terrum
      - Thaveyan
      - VoxPidgin
      - Sign
      - Darktongue
      understands:
      - GalacticCommon
      - Scratch
      - SolCommon
      - Bubblish
      - Canilunzt
      - Chittin
      - Draconic
      - Marish
      - Moffic
      - Nekomimetic
      - Sylvan
      - Terrum
      - Thaveyan
      - VoxPidgin
      - Sign
      - Darktongue
  # Starlight end

- type: startingGear
  id: LibrarianGear
  equipment:
    #shoes: ClothingShoesBootsLaceup # 🌟Starlight🌟
    id: LibrarianPDA
    ears: ClothingHeadsetService
    pocket1: d20Dice
    pocket2: HandLabeler # for making named bestsellers
  storage:
    back:
    - BookRandom

- type: chameleonOutfit
  id: LibrarianChameleonOutfit
  job: Librarian
  equipment:
    head: ClothingHeadHatCanadaBeanie
