- type: antag
  id: HeadRev
  name: roles-antag-rev-head-name
  antagonist: true
  setPreference: true
  objective: roles-antag-rev-head-objective
  guides: [ Revolutionaries ]
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 72h # Starlight start
  - !type:RoleTimeRequirement
    role: JobSecurityOfficer # Less important than some of the other antags to know
    time: 1h
  - !type:DepartmentTimeRequirement
    department: Command
    time: 12h # Have to be a leader. You're essentially making your own chain of command in this role.
  playTimeTracker: AntagHeadRev # Starlight end

- type: antag
  id: Rev
  name: roles-antag-rev-name
  antagonist: true
  setPreference: false
  objective: roles-antag-rev-objective
  guides: [ Revolutionaries ]
  playTimeTracker: AntagRev # Starlight

- type: startingGear
  id: HeadRevGear
  storage:
    back:
    - Flash
    - ClothingEyesGlassesSunglasses
    - USSPUplinkImplanter
