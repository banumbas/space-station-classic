- type: soundCollection
  id: PhoneSpeak
  files:
  - /Audio/_Starlight/Machines/talk_phone1.ogg
  - /Audio/_Starlight/Machines/talk_phone2.ogg
  - /Audio/_Starlight/Machines/talk_phone3.ogg
  - /Audio/_Starlight/Machines/talk_phone4.ogg
  - /Audio/_Starlight/Machines/talk_phone5.ogg
  - /Audio/_Starlight/Machines/talk_phone6.ogg
  - /Audio/_Starlight/Machines/talk_phone7.ogg
  
- type: ambientMusic
  id: NearTheDark
  sound:
    params:
      volume: -12
    collection: AmbienceTheDark
  rules: NearTheDark
  priority: 2

- type: ambientMusic
  id: TheDark
  sound:
    params:
      volume: -10
    collection: AmbienceTheDark
  fadeIn: true
  interruptable: true
  rules: InTheDark
  priority: 1

- type: soundCollection
  id: AmbienceTheDark
  files:
    - /Audio/_Starlight/Ambiance/TheDark/dark1.ogg
    - /Audio/_Starlight/Ambiance/TheDark/dark2.ogg
    - /Audio/_Starlight/Ambiance/TheDark/dark3.ogg

- type: rules
  id: NearTheDark
  rules:
    - !type:NearbyEntitiesRule
      count: 1
      whitelist:
        tags:
          - TheDark
      range: 5

- type: rules
  id: InTheDark
  rules:
    - !type:OnMapTagRule
      mapTag: TheDark
