# Roundender-less events table for survival
- type: entityTable
  id: BasicAntagEventsTableNoRoundenders
  table:
    !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - id: ClosetSkeleton
    - id: DragonSpawn
    - id: KingRatMigration
    - id: NinjaSpawn
    - id: ParadoxCloneSpawn
    - id: RevenantSpawn
    - id: SleeperAgents
#    - id: ZombieOutbreak
    - id: LoneOpsSpawn
    - !type:NestedSelector
      tableId: DerelictBorgEventTable
    - id: WizardSpawn
    - id: Xenoborgs
    # Starlight gamerules:
    - id: AbductorsSpawn
    - id: Brighteye

- type: entity
  parent: BaseGameRule
  id: DerelictBorgiSpawn
  components:
    - type: StationEvent
      globalAnnouncement: false # Starlight
      weight: 5
      earliestStart: 15
      reoccurrenceDelay: 20
      minimumPlayers: 4
      duration: null
    - type: SpaceSpawnRule
      spawnDistance: 0
    - type: AntagSpawner
      prototype: DerelictBorgiChassis
    - type: AntagSelection
      definitions:
        - spawnerPrototype: SpawnPointGhostDerelictBorgi
          min: 1
          max: 1
          pickPlayer: false
          
