# Brighteye
- type: entity
  parent: BaseGameRule
  id: Brighteye
  components:
  - type: StationEvent
    weight: 1
    earliestStart: 10
    reoccurrenceDelay: 20
    minimumPlayers: 20
    duration: null
  - type: RuleGrids
  - type: GameRule
    minPlayers: 20
  - type: BrighteyeRule
  - type: LoadMapRule
    mapPath: /Maps/_Starlight/TheDark/Hideout.yml
    mapTag: TheDark
  - type: AntagLoadProfileRule
    speciesHardOverride: Shadekin
    applyCharacterProfile: true
  - type: AntagObjectives
    objectives:
    - BirghteyeSurviveObjective
    - BirghteyePortalObjective
  - type: AntagSelection
    agentName: roles-antag-brighteye-name
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ Brighteye ]
      playerRatio: 1
      spawnerPrototype: SpawnPointGhostBrighteye
      roleLoadout:
      - AntagBrighteye
      briefing:
        text: brighteye-role-greeting
        color: "#F200FF"
        sound: "/Audio/_Starlight/Ambiance/Antag/brighteye.ogg"
      components:
      - type: Brighteye
        energy: 200 # THIS IS HARDCODED BULLSHIT... i wish i could set this auto to MaxEnergy.
      - type: NpcFactionMember
        factions:
        - SimpleHostile
      - type: CombatMode
        disarmFailChance: 0.5
        canDisarm: true
      mindRoles:
      - MindRoleBrighteye
      tags:
        - CantBecomeRevolutionary
  - type: SubGamemodes
    rules:
    - id: RailroadingBrighteye
  - type: DynamicRuleCost
    cost: 150

