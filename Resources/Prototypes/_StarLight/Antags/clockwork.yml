- type: antag
  id: ClockworkMaster
  name: roles-antag-clockwork-master-name
  antagonist: true
  setPreference: true
  objective: roles-antag-clockwork-master-objective
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 36000 # 10h
  - !type:DepartmentTimeRequirement
    department: Command
    time: 36000 # 10h
  guides: [ Clockwork ]

- type: antag
  id: ClockworkCultist
  name: roles-antag-clockwork-cultist-name
  antagonist: true
  setPreference: true
  objective: roles-antag-clockwork-cultist-objective
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 18000 # 5h
  guides: [ Clockwork ]

    
- type: startingGear
  parent: ClockworkCultistGear
  id: ClockworkMasterGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitClockworkMaster
    back: ClothingBackpackPouchesClockwork
    mask: ClothingMaskGasClockwork
    gloves: ClothingHandsGlovesClockwork
    shoes: ClothingShoesBootsClockwork
    belt: ClothingClockworkBelt

- type: startingGear
  id: ClockworkCultistGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitClockwork
    back: ClothingBackpackPouchesClockwork
    mask: ClothingMaskGasClockworkProphet
    gloves: ClothingHandsGlovesClockwork
    outerClothing: ClothingOuterCoatClockworkMaster
    shoes: ClothingShoesBootsClockwork
    belt: ClothingClockworkBelt