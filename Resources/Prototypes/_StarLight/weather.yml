- type: weather
  id: RadStorm
  sprite:
    sprite: /Textures/Effects/weather.rsi
    state: ashfall_heavy
  color: green
  sound:
    path: /Audio/_Starlight/Effects/Weather/blobalarm.ogg
    params:
      loop: true
      volume: -10
  effects:
    - !type:HealthChange
      damage:
        types:
          Radiation: 1

- type: weather
  id: SolarFlare
  sprite:
    sprite: /Textures/Effects/weather.rsi
    state: ashfall_light
  color: yellow
  sound:
    path: /Audio/_Starlight/Effects/Weather/blobalarm.ogg
    params:
      loop: true
      volume: -10
  onlySpace: true
  effects:
    - !type:Flash
    - !type:Flammable
      multiplier: 3.75
      multiplierOnExisting: 0.75
    - !type:Ignite
    - !type:HealthChange
      damage:
        types:
          Heat: 1

- type: weather
  id: AuroraCaelus
  sprite:
    sprite: /Textures/_Starlight/Effects/weather.rsi
    state: starry_night
  sound:
    path: /Audio/_Starlight/Effects/Weather/aurora_caelus.ogg
    params:
      volume: 0
  onlySpace: true
  parallax: AuroraCaelus

- type: weather
  id: SpaceWhale
  onlySpace: true
  parallax: SpaceWhale

- type: weather
  id: SpaceDog
  onlySpace: true
  parallax: SpaceDog
