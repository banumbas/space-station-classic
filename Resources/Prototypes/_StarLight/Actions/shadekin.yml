- type: entity
  id: NullPhaseAction
  name: Phase Shift
  description: Shift yourself out of alignment with realspace to travel quickly to different areas.
  categories: [HideSpawnMenu]
  components:
    - type: Action
      useDelay: 1
      icon:
        sprite: _Starlight/Interface/Actions/shadekin32.rsi
        state: phase_shift
      itemIconStyle: BigItem
    - type: InstantAction
      event: !type:NullPhaseActionEvent

- type: entity
  id: BrighteyePhaseAction
  parent: NullPhaseAction
  categories: [HideSpawnMenu]
  components:
    - type: Action
      icon:
        sprite: _Starlight/Interface/Actions/shadekin.rsi
        state: phase
      checkCanInteract: false
      itemIconStyle: NoItem
    - type: InstantAction
      event: !type:BrighteyePhaseActionEvent

- type: entity
  id: BrighteyePortalAction
  name: Create Portal
  description: Create a portal to the dark at your current location.
  categories: [HideSpawnMenu]
  components:
    - type: Action
      useDelay: 1
      icon:
        sprite: _Starlight/Structures/Specific/Anomalies/dark.rsi
        state: portal
      itemIconStyle: NoItem
      checkCanInteract: false
    - type: InstantAction
      event: !type:BrighteyePortalActionEvent

- type: entity
  id: BrighteyeDarkTrapAction
  name: Create Trap
  description: Create a dark trap at your current location.
  categories: [HideSpawnMenu]
  components:
    - type: Action
      useDelay: 60
      icon:
        sprite: _Starlight/Interface/Actions/shadekin32.rsi
        state: darktrap
      itemIconStyle: NoItem
    - type: InstantAction
      event: !type:BrighteyeDarkTrapActionEvent

- type: entity
  id: BrighteyeShadeSkipAction
  name: ShadeSkip
  description: Stun a creature with the dark.
  categories: [HideSpawnMenu]
  components:
    - type: Action
      useDelay: 60
      icon:
        sprite: _Starlight/Interface/Actions/shadekin.rsi
        state: shadeskip
      itemIconStyle: NoItem
    - type: TargetAction
      interactOnMiss: false
    - type: EntityTargetAction
      whitelist:
        components:
          - MobState
      canTargetSelf: false
      event: !type:BrighteyeShadeSkipActionEvent

- type: entity
  id: BrighteyeCreateShadeAction
  name: Create Shade
  description: Create a field of darkness that follows you.
  categories: [HideSpawnMenu]
  components:
    - type: Action
      useDelay: 30
      icon:
        sprite: _Starlight/Interface/Actions/shadekin32.rsi
        state: create_shade
      itemIconStyle: NoItem
    - type: InstantAction
      event: !type:BrighteyeCreateShadeActionEvent
