- type: entity
  id: ActionMidaseToggle
  name: magical aura
  description: A sinister looking aura that distorts the flow of reality around it.
  components:
  - type: InstantAction
    itemIconStyle: NoItem
    icon:
      sprite: _Starlight/Interface/Actions/actions_clockwork.rsi
      state: midace_hand
    iconOn:
      sprite: _Starlight/Interface/Actions/actions_clockwork.rsi
      state: midace_hand_active
    event: !type:MidaseToggleEvent
    useDelay: 1
    
- type: entity
  id: ActionItemEnchant
  name: enchant item
  description: enchant an object to do something.
  components:
  - type: InstantAction
    icon:
      sprite: _Starlight/Interface/Actions/actions_clockwork.rsi
      state: enchant_item
    event: !type:ClockworkItemEnchantEvent
    useDelay: 1

- type: entity
  id: ActionClockworkExitConsole
  name: Exit console
  description: Exit console.
  components:
  - type: InstantAction
    priority: -20
    itemIconStyle: BigAction
    icon:
      sprite: _Starlight/Interface/Actions/actions_clockwork.rsi
      state: exit
    event: !type:ExitConsoleEvent

- type: entity
  id: ActionClockworkPortal
  name: Open portal
  components:
  - type: WorldTargetAction
    useDelay: 10
    priority: -19
    range: -1
    checkCanAccess: false
    itemIconStyle: BigAction
    icon:
      sprite: _Starlight/Interface/Actions/actions_clockwork.rsi
      state: portal
    event: !type:ClockworkConsoleOpenPortalEvent
      spot: ClockworkArch
      effect: ClockworkRitualPortal
      portal: ClockworkPortal