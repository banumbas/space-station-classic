# Cleanse

- type: entity
  parent: BaseAction
  id: ActionCantripMop
  name: Cleanse
  description: Removes filth around you. Like a tiny cleanade. Only affects tiles adjacent to where you stand.
  components:
  - type: Magic
    requiresClothes: false
  - type: Action
    useDelay: 15
