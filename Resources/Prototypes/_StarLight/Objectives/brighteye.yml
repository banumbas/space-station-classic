- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseBrighteyeObjective
  components:
  - type: Objective
    # difficulty isn't used since all objectives are picked
    difficulty: 1.5
    issuer: objective-issuer-brighteye
  - type: RoleRequirement
    roles:
    - BrighteyeRole

- type: entity
  parent: [BaseBrighteyeObjective]
  id: BirghteyeSurviveObjective
  name: Protect your core
  description: Ensure your core is not damaged or removed!
  components:
  - type: BrighteyeSurviveCondition
  - type: Objective
    icon:
      sprite: _Starlight/Mobs/Species/Shadekin/organs.rsi
      state: core

- type: entity
  parent: [BaseBrighteyeObjective]
  id: BirghteyePortalObjective
  name: Open a portal to the dark
  description: Open and keep a portal open to the dark.
  components:
  - type: BrighteyePortalCondition
  - type: Objective
    icon:
      sprite: _Starlight/Structures/Specific/Anomalies/dark.rsi
      state: portal