- type: gameMap
  id: StarlightPlasma
  mapName: 'Plasma'
  mapPath: /Maps/_Starlight/Stations/Plasma.yml
  minPlayers: 25
  maxPlayers: 80
  stations:
    StarlightPlasma:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Plasma {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_plasma.yml
        - type: StationCargoShuttle
          path: /Maps/_Starlight/Shuttles/cargo_plasma.yml
        - type: StationJobs
          availableJobs:
            #command (7)
            Captain: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            ChiefEngineer: [ 1, 1 ]
            ChiefMedicalOfficer: [ 1, 1 ]
            ResearchDirector: [ 1, 1 ]
            HeadOfSecurity: [ 1, 1 ]
            Quartermaster: [ 1, 1 ]
            #service (15 - 17)
            Bartender: [ 2, 2 ]
            Botanist: [ 2, 3 ]
            Chef: [ 2, 2 ]
            Janitor: [ 3, 3 ]
            Chaplain: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            ServiceWorker: [ 2, 2 ]
            Reporter: [ 2, 3 ]
            #engineering (8)
            AtmosphericTechnician: [ 4, 4 ]
            StationEngineer: [ 4, 4 ]
            TechnicalAssistant: [ 4, 4 ] #intern, not counted
            #medical (10 - 11)
            Chemist: [ 2, 2 ]
            MedicalDoctor: [ 3, 3 ]
            Paramedic: [ 2, 2 ]
            Surgeon: [ 1, 2 ]
            MedicalIntern: [ 4, 4 ] #intern, not counted
            Psychologist: [ 1, 1 ]
            #science (4)
            Scientist: [ 3, 3 ]
            Roboticist: [ 1, 1 ]
            ResearchAssistant: [ 4, 4 ] #intern, not counted
            #security (11 - 13)
            Warden: [ 1, 1 ]
            SecurityOfficer: [ 6, 8 ]
            Brigmedic: [ 1, 1 ]
            Detective: [ 1, 2 ] #good cop, bad cop
            SecurityCadet: [ 4, 4 ] #intern, not counted
            #supply (10 - 13)
            SalvageLead: [ 1, 1 ]
            SalvageSpecialist: [ 4, 4 ] #the salvagers yearn for the mines
            MiningSpecialist: [ 3, 3 ] #the miners... yearn for the mines...
            MailTech: [ 1, 2 ]
            CargoTechnician: [ 4, 6 ]
            #civilian (3 - 4+)
            Assistant: [ -1, -1 ]  #infinite, the tiders yearn for the mines
            Clown: [ 1, 2 ] # this might be fun!
            Mime: [ 1, 1 ]
            Musician: [ 1, 1 ]
            #silicon (3 - 5)
            Borg: [ 2, 4 ]
            StationAi: [ 1, 1 ]
            #law
            Magistrate: [ 1, 1 ]
            IAA: [ 2, 2 ]
            #representives (2)
            BlueShield: [ 1, 1 ]
            NanoTrasenRepresentative: [ 1, 1 ]
