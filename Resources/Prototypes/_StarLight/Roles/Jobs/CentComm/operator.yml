- type: job
  id: CentralCommandOperator
  name: job-name-centcommoperator
  description: job-description-centcomoperator
  playTimeTracker: JobCentralCommandOperator
  setPreference: false
  startingGear: CentcomOperatorGear
  icon: "JobIconCentCommOperator"
  rules: job-rules-corporate-aligned
  supervisors: job-supervisors-hos
  canBeAntag: false
  accessGroups:
  - AllAccess
  access:
  - CentralCommand

- type: startingGear
  id: CentcomOperatorGear
  equipment:
    jumpsuit: ClothingAltUniformJumpsuitCentcomOfficial
    back: ClothingBackpackSatchelCentcomm
    shoes: ClothingShoesBootsLaceup
    eyes: ClothingEyesGlassesCentComm
    gloves: ClothingHandsGlovesColorBlack
    id: CentCommOperatorPDA
    ears: ClothingHeadsetAltCentCom
    pocket1: WeaponPistolN1984
    pocket2: BoxFolderCentComClipboardEmpty
  storage:
    back:
    - RubberStampCentcom
    - MindShieldImplanter

