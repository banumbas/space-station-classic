    containers:
      storagebase: !type:AllSelector
        children:
        - id: ClothingHeadBase0121
        - id: ClothingNeckTieGeoffroyblack12
        - id: ClothingUniformDama235123
        - id: ClothingShoesBootsSalvage1208134

- type: entity
  parent: ClothingBackpackDuffelBundle
