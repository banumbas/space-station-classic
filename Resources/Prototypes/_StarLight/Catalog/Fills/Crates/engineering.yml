- type: entity
  id: CrateSupermatterFlatpack
  parent: CrateEngineeringSecure
  name: Supermatter Crate
  description: Supermatter, your solution for things regular matter can't handle.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: SupermatterFlatpack

- type: entity
  id: CrateTEGFlatpack
  parent: CrateEngineeringSecure
  name: TEG Crate
  description: A crate containing a flatpacked Thermo-Electric Generator.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: TEGCenterFlatpack
        - id: TEGCirculatorFlatpack
          amount: 2

- type: entity
  id: CrateEngineeringReflector
  parent: CrateEngineeringSecure
  name: Reflector Crate
  description: Reflector, for when you need to deflect your problems.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ReflectorFlatpack

- type: entity
  parent: CrateEngineeringSecure
  id: CrateRPD
  name: RPD crate
  description: A crate containing a single rapid piping device.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage:
        id: RPD

- type: entity
  parent: CrateEngineeringSecure
  id: CrateRPLD
  name: RPLD crate
