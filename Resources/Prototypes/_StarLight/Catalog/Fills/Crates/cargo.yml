- type: entity
  id: CrateMailBags
  parent: CrateGenericSteel
  name: Mailbag Crate
  description: Contains two mail bags, in case you lost the ones we gave you already.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: MailBag
          amount: 2

- type: entity
  id: CrateEmergencySpaceHazard
  parent: CrateGenericSteel
  name: space hazard suit crate
  description: For all your disastrous shifts.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ClothingOuterHardsuitSpaceHazard
        - id: ClothingMaskBreath
        - id: OxygenTankFilled
        - id: NitrogenTankFilled
