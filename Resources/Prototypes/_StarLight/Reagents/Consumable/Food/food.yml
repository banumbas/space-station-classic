- type: reagent
  id: RoyalJelly
  name: reagent-name-royaljelly
  desc: reagent-desc-royaljelly
  physicalDesc: reagent-physical-desc-opaque
  flavor: medicine
  color: "#9d42d5"
  metabolisms:
    Food:
      effects:
      - !type:HealthChange
        damage:
          groups:
            Brute: -2
            Burn: -2
            Toxin: -2
            Genetic: -2

# basically the same as protein, but having a separate chemical allows us to extract it from peas
- type: reagent
  id: Hummus
  name: reagent-name-hummus
  group: Foods
  desc: reagent-desc-hummus
  physicalDesc: reagent-physical-desc-chalky
  flavor: chalky
  color: "#94622d" # medium brown
  metabolisms:
    Food:
      effects:
      - !type:HealthChange
        probability: 0.25
        damage:
          groups:
            Brute: -0.8
      - !type:ModifyBloodLevel
        amount: 1
      - !type:SatiateHunger
  plantMetabolism:
  - !type:PlantAdjustNutrition
    amount: 1.5
  - !type:PlantAdjustHealth
    amount: 0.75
  pricePerUnit: 3
  