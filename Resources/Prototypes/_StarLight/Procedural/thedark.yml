- type: entity
  id: TheDarkForest
  parent: BaseDebris
  name: dark forest
  components:
    - type: PreventPilot
    - type: MapGrid
    - type: BlobFloorPlanBuilder
      floorTileset:
      - FloorDarkGrass
      - FloorDarkGrass
      - FloorDarkGrass
      - FloorDarkStone
      blobDrawProb: 0.5
      radius: 22
      floorPlacements: 56
    - type: SimpleFloorPlanPopulator
      entries:
        FloorDarkStone:
          - id: NothingEntity
            prob: 0.5
            orGroup: rock
          - id: WallRockDark
            prob: 0.5
            orGroup: rock
          - id: WallRockDarkBluespace
            prob: 0.05
            orGroup: rock
          - id: WallRockDarkPasma
            prob: 0.05
            orGroup: rock
        FloorDarkGrass:
          - id: NothingEntity
