- type: entity
  id: BaseTheDarkDebris
  parent: BaseDebris
  name: the dark debris
  abstract: true
  components:
    - type: PreventPilot
    - type: MapGrid
    - type: BlobFloorPlanBuilder
      floorTileset:
      - FloorDarkStone
      - FloorDarkStone
      - FloorDarkStone
      - FloorDarkGrass
      blobDrawProb: 0.5
      radius: 6
      floorPlacements: 16
    - type: SimpleFloorPlanPopulator
      entries:
        FloorDarkStone:
          - id: WallRockDark
            prob: 0.5
            orGroup: rock
          - id: WallRockDarkBluespace
            prob: 0.05
            orGroup: rock
          - id: WallRockDarkPasma
            prob: 0.05
            orGroup: rock
        FloorDarkGrass:
          - id: NothingEntity
            prob: 0.01
            orGroup: tree
          - id: ShadowTree
            prob: 0.01
            orGroup: tree
    - type: IFF
      flags: HideLabel
      color: "#795382"

- type: entity
  id: TheDarkDebrisSmall
