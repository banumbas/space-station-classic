- type: entity
  id: OrganAvaliStomach
  parent: OrganAnimalStomach
  suffix: Avali
  description: "The stomach of an avali, on closer inspection, actually consists of two stomachs."
  components:
  - type: Stomach
    specialDigestible:
      tags:
      - Meat
      - Pill
      - Crayon
      - Paper
      - AvianFood
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5

- type: entity
  id: OrganAvaliHeart
  parent: OrganHumanHeart
  suffix: Avali
  description: "The heart of an avali."
  components:
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [Avali]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic

- type: entity
  id: OrganAvaliLiver
  parent: OrganHumanLiver
  suffix: Avali
  categories: [ HideSpawnMenu ]
  components:
  - type: Metabolizer # The liver metabolizes certain chemicals only, like alcohol.
    maxReagents: 1
    metabolizerTypes: [Avali]
    groups:
    - id: Alcohol

- type: entity
  id: OrganAvaliKidneys
  parent: OrganHumanKidneys
  suffix: Avali
  categories: [ HideSpawnMenu ]
#Placeholder until sprited

- type: entity
  id: OrganAvaliLungs
  parent: OrganHumanLungs
  suffix: Avali
  categories: [ HideSpawnMenu ]
#Placeholder until sprited

- type: entity
  id: OrganAvaliEyes
  parent: OrganHumanEyes
  name: eyes
  suffix: Avali
  description: "The eyes of an Avali."
  components:
  - type: OrganVisualization
    layer: Eyes
    prototype: MobAvaliEyes