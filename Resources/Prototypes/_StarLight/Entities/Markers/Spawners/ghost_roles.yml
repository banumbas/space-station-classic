    - MindRoleBrighteye
    raffle:
      settings: default
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: _Starlight/Mobs/Species/Shadekin/parts.rsi
      state: full
