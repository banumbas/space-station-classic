- type: entity
  parent: GasFilter
  id: GasFilterInline
  name: inline gas filter
  description: Filters gases from a pipenet without splitting it in two.
  components:
    - type: Sprite
      sprite: _Starlight/Structures/Piping/Atmospherics/inlinegasfilter.rsi
      layers:
        - sprite: Structures/Piping/Atmospherics/pipe.rsi
          state: pipeTrinaryConnectors
          map: [ "enum.PipeVisualLayers.Pipe" ]
        - state: gasFilter
          map: [ "enum.SubfloorLayers.FirstLayer", "enabled" ]
    - type: GasFilter
      inlet: pipe
      outlet: pipe
    - type: NodeContainer
      nodes:
        pipe:
          !type:PipeNode
          nodeGroupID: Pipe
          pipeDirection: Longitudinal
        filter:
          !type:PipeNode
          nodeGroupID: Pipe
          pipeDirection: West
    - type: Construction
      graph: GasTrinaryStarlight
      node: inline_filter
