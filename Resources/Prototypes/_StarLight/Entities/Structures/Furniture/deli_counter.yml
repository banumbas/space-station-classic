- type: entity
  name: deli stand
  id: DeliStand
  parent: BaseStructureDynamic
  description: A counter for displaying food in a deli.
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _Starlight/Structures/Furniture/deli_stand.rsi
    layers: 
      - state: deli_stand
      - map: ["enum.StorageFillLayers.Fill"]
        visible: false
    noRot: true
    offset: 0, 0.25
    drawdepth: OverMobs
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.3,0.5,0.3"
        density: 55
        mask: # tables should collide with other tables
        - TableMask
        layer:
        - TableLayer
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger: # Excess damage, don't spawn entities
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
  - type: Storage
    grid:
    - 0,0,9,2
    quickInsert: true
    whitelist:
      components:
      - Edible
  - type: StorageContainerVisuals
    maxFillLevels: 3
    fillBaseName: fill
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: DnaSubstanceTrace