- type: entity
  parent: BaseGenerator
  id: DarkGenerator
  name: Dark Generator
  description: Somehow... this generate power... but only in the dark...
  suffix: 10kW
  components:
    - type: PowerSupplier
      voltage: Medium
      supplyRate: 10000
    - type: NodeContainer
      examinable: true
      nodes:
        output: !type:CableDeviceNode
          nodeGroupID: MVPower
    - type: Sprite
      sprite: _Starlight/Structures/Machines/darkmachines.rsi
      layers:
        - state: generator
        - state: generator_unlit
          shader: unshaded
    - type: PowerMonitoringDevice
      sprite: _Starlight/Structures/Machines/darkmachines.rsi
      state: generator
    - type: AmbientSound
      range: 5
      sound:
        path: /Audio/Ambience/Objects/buzzing.ogg
    - type: GuideHelp
      guides:
        - Power
    - type: Anchorable
      flags:
        - Anchorable
