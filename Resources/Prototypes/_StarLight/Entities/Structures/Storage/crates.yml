- type: entity
  parent: CrateCentralCommandSecure
  id: CrateCentralCommandSecureStrong
  name: central command crate
  suffix: Secure, Strong
  description: A large container for items. Made with plastitanium to drastically improve durability.
  components:
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 9000
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: MetalBreak