- type: entity
  parent: SLVendingMachine
  id: SLVendingMachineMining
  name: mining ticket machine
  components:
    - type: AccessReader
      access: [["Mining"]]
    - type: Sprite
      sprite: _Starlight/Structures/Machines/VendingMachines/mining.rsi
    - type: Store
      name: vendor-mining-ticket-machine
      categories:
        - MiningEquipment
        - MiningConsumeables
      currencyWhitelist:
        - SalvageTicket # Same currency as salvage vendor to promote sharing

- type: entity
  parent: VendingMachine
  id: VendingMachineAbductorDispenser
  name: alien dispenser
  description: Dispenses something weird.
  components:
    - type: VendingMachine
      pack: AbductorGlandInventory
      offState: icon
      brokenState: icon
      showPrices: false
      normalState: icon
      denyState: icon
      ejectDelay: 2
      forceRandom: RandomOrganDubious
    - type: Sprite
      sprite: _Starlight/Structures/abductor_dispencer.rsi
      layers:
      - state: "icon"
        map: ["enum.VendingMachineVisualLayers.Base"]
      - state: "unshaded"
        map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
    - type: WirelessNetworkConnection
      range: 200
    - type: AbductorDispencer

