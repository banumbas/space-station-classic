- type: entity
  parent: BaseMobSpeciesOrganic
  id: BaseMobLagomorph
  name: Urist McBnuuy
  abstract: true
  components:
  - type: Body
    prototype: Lagomorph
    requiredLegs: 2
  - type: Absorbable
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Lagomorphian
    understands:
    - GalacticCommon
    - Lagomorphian
  - type: StaminaSurge
  - type: Icon
    sprite: _Starlight/Mobs/Species/Lagomorph/parts.rsi
    state: full
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: HumanoidAppearance
    species: Lagomorph
    hideLayersOnEquip:
    - Hair
    - Snout
  - type: Hunger
    thresholds:
      Overfed: 210
      Okay: 165
      Peckish: 110
      Starving: 55
      Dead: 0
    baseDecayRate: 0.02
  - type: Thirst
    thresholds:
      OverHydrated: 610
      Okay: 465
      Thirsty: 310
      Parched: 155
      Dead: 0
  - type: Speech
    speechSounds: ALLagomorph
    speechVerb: Lagomorph
    allowedEmotes: ['Squee', 'Snort', 'LagomorphSneeze', 'LagomorphSnore', 'LagomorphStomp']
  - type: ChatListenerRange # way better at hearing, +2 to all
    voiceRange: 12
    whisperClearRange: 4
    whisperMuffledRange: 7
    allowExtendListenRange: true
  - type: Vocal
    sounds:
      Male: MaleLagomorph
      Female: FemaleLagomorph
      Unsexed: FemaleLagomorph
  - type: TypingIndicator
    proto: lagomorph
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Lagomorph
  - type: MeleeWeapon
    animation: WeaponArcClaw
    soundHit:
      collection: AlienClaw
    damage:
      types:
        Slash: 5
  - type: Sprite
    layers:
    - map: [ "enum.HumanoidVisualLayers.Chest" ]
    - map: [ "enum.HumanoidVisualLayers.Head" ]
    - map: [ "enum.HumanoidVisualLayers.Snout" ]
    - map: [ "enum.HumanoidVisualLayers.Eyes" ]
    - map: [ "enum.HumanoidVisualLayers.RArm" ]
    - map: [ "enum.HumanoidVisualLayers.LArm" ]
    - map: [ "enum.HumanoidVisualLayers.RLeg" ]
    - map: [ "enum.HumanoidVisualLayers.LLeg" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentBottom" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentTop" ]
    - map: ["jumpsuit"]
    - map: ["enum.HumanoidVisualLayers.LFoot"]
    - map: ["enum.HumanoidVisualLayers.RFoot"]
    - map: ["enum.HumanoidVisualLayers.LHand"]
    - map: ["enum.HumanoidVisualLayers.RHand"]
    - map: [ "gloves" ]
    - map: [ "shoes" ]
    - map: [ "ears" ]
