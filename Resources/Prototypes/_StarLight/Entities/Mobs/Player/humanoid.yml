## NTCC Default Settings

- type: randomHumanoidSettings
  id: EventHumanoidNTNC
  parent: EventHumanoidMindShielded
  components:
  - type: AutoImplant
    implants:
    - DeathRattleImplantCentcomm
    - RadioImplantCentcomm

## NTCC Blueshield

- type: entity
  name: NT-NC Consortium Blueshield
  suffix: Basic
  id: RandomHumanoidNTNCConsortiumBlueshieldSpawnerBasic
  components:
    - type: Sprite
      sprite: _Starlight/Markers/jobs.rsi
      state: obs
    - type: RandomHumanoidSpawner
      settings: NTNCConsortiumBlueshieldBasic

- type: entity
  name: NT-NC Consortium Blueshield
  suffix: Hardsuit
  id: RandomHumanoidNTNCConsortiumBlueshieldSpawnerEVA
  components:
    - type: Sprite
      sprite: _Starlight/Markers/jobs.rsi
      state: obs
    - type: RandomHumanoidSpawner
      settings: NTNCConsortiumBlueshieldEVA

- type: randomHumanoidSettings
  id: NTNCConsortiumBlueshieldBasic
  parent: EventHumanoidNTNC
  randomizeName: false
  components:
    - type: GhostRole
      name: ghost-role-information-ntnc-consortium-officer-name
      description: ghost-role-information-ntnc-consortium-officer-description
      rules: ghost-role-information-corporate-aligned-rules
      raffle:
        settings: default
      job: NTNCBlueshield
    - type: Loadout
      prototypes: [ NTNCBasicGear ]
      roleLoadout: [ RoleSurvivalStandard ]
    - type: RandomMetadata
      nameSegments:
        - NamesMilitaryFirstLeader
        - NamesMilitaryLast
      nameFormat: name-format-ert

- type: randomHumanoidSettings
  id: NTNCConsortiumBlueshieldEVA
  parent: EventHumanoidNTNC
  randomizeName: false
  components:
    - type: GhostRole
      name: ghost-role-information-ntnc-consortium-officer-name
      description: ghost-role-information-ntnc-consortium-officer-description
      rules: ghost-role-information-corporate-aligned-rules
      raffle:
        settings: default
      job: NTNCBlueshield
    - type: Loadout
      prototypes: [ NTNCHardsuitGear ]
      roleLoadout: [ RoleSurvivalStandard ]
    - type: RandomMetadata
      nameSegments:
        - NamesMilitaryFirstLeader
        - NamesMilitaryLast
      nameFormat: name-format-ert

# USSP
- type: entity
  id: RandomHumanoidSpawnerSSFMarine
  name: SSF Marine Soldier
  suffix: Admeme
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/OuterClothing/Hardsuits/sovietmarine.rsi
      state: icon
    - type: RandomMetadata
      nameSegments:
        - NamesSovietMarinesFirst
        - NamesSovietMarinesLast
      nameFormat: name-format-ert
    - type: RandomHumanoidSpawner
      settings: SSFMarine

- type: randomHumanoidSettings
  id: SSFMarine
  parent: EventHumanoid
  components:
    - type: GhostRole
      name: ghost-role-information-soviet-marine-name
      description: ghost-role-information-soviet-marine-desc
      rules: ghost-role-information-soviet-marine-rules
      raffle:
        settings: default
      mindRoles:
      - MindRoleSSF
    - type: Loadout
      prototypes: [ SSFMarineGear ]
    - type: RandomMetadata
      nameSegments:
        - NamesSovietMarinesFirst
        - NamesSovietMarinesLast
      nameFormat: name-format-ert
    - type: Revolutionary # change if you do soviet invasion gamemode
    - type: NpcFactionMember
      factions:
      - DungeonSoviet

## NTSf

- type: entity
  id: RandomHumanoidSpawnerNTSF
  name: NTSF Operative
  suffix: ERTRole, NTSF
  components:
    - type: Sprite
      sprite: _Starlight/Markers/jobs.rsi
      state: ntsficon
    - type: RandomMetadata
      nameSegments:
        - NamesMilitaryFirstLeader
        - NamesMilitaryLast
      nameFormat: name-format-ert
    - type: RandomHumanoidSpawner
      settings: NTSFoperative

- type: randomHumanoidSettings
  id: NTSFoperative
  parent: EventHumanoidCentcomm
  speciesBlacklist:
  - Arachnid
  - Diona
  - Reptilian
  - Resomi
  - Vox
  - Vulpkanin
  - Avali
  - Felionoid
  - Shadekin
  - Thaven
  components:
    - type: GhostRole
      name: ghost-role-information-nanotrasen-special-forces-name
      description: ghost-role-information-nanotrasen-special-forces-description
      rules: ghost-role-information-corporate-aligned-rules # Starlight
      raffle:
        settings: short
      mindRoles:
#      - MindRoleGhostRoleFamiliar  # DOTS - look at deleting this entire line, if we are reclassifying DS. Does this break stuff?
      - MindRoleGhostCorporateAligned # Starlight
      job: NanoTrasenSpecialForces
    - type: Loadout
      prototypes: [ NanoTrasenSpecialForcesGear ]
      roleLoadout: [ RoleSurvivalEVA ]
    - type: RandomMetadata
      nameSegments:
        - NamesMilitaryFirstLeader
        - NamesMilitaryLast
      nameFormat: name-format-ert


