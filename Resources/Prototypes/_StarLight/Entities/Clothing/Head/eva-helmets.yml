#EVA Helmet
- type: entity
  parent: ClothingHeadEVAHelmetBase
  id: ClothingHeadSoftsuitCBURN
  name: CBURN helmet
  description: A pressure resistant and fireproof hood worn by special cleanup units.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Head/Hardsuits/cburn.rsi
    layers:
    - state: icon
    - state: icon-unshaded
      shader: unshaded
    - state: light-overlay
      visible: false
      shader: unshaded
      map: [ "light" ]
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-head
      - state: equipped-head-unshaded
        shader: unshaded
      head-vox:
      - state: equipped-head-vox
      - state: equipped-head-unshaded-vox
        shader: unshaded
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    equipDelay: 3
    unequipDelay: 3

- type: entity
  parent: [ClothingHeadEVAHelmetBase, ClothingHeadHelmetArmoredBase, BaseTSFContraband]
  id: ClothingHeadHelmetTSF
  name: Federation marine combat helmet
  description: A powered combat helmet used by the Trans-Solar Marine Corps. Provides excellent protection in all areas, while a modern OCULUS array augments the wearer's vision.
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Head/Helmets/tsf.rsi
    - type: Clothing
      sprite: _Starlight/Clothing/Head/Helmets/tsf.rsi
      equipDelay: 3
      unequipDelay: 3
    - type: ShowJobIcons
    - type: ShowMindShieldIcons
    - type: EyeProtection
      protectionTime: 5
    - type: FlashImmunity

- type: entity
  parent: ClothingHeadHelmetTSF
  id: ClothingHeadHelmetTSFLeader
  name: Federation marine officer's combat helmet
  description: A powered combat helmet used by officers of the Trans-Solar Marine Corps. Provides excellent protection in all areas, while a next-gen OCULUS array augments the wearer's vision.
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Head/Helmets/tsfleader.rsi
    - type: Clothing
      sprite: _Starlight/Clothing/Head/Helmets/tsfleader.rsi
      equipSound: /Audio/Mecha/mechmove03.ogg
      unequipSound: /Audio/Mecha/mechmove03.ogg
      equipDelay: 3
      unequipDelay: 3

- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadBowlHelmet
  name: fish bowl helmet
  description: It looks like a fish bowl, but somehow it functions as an EVA helmet.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Head/Helmets/wizard_bowl.rsi
    layers:
    - state: icon
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-HELMET
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    equipDelay: 1
    unequipDelay: 1
  - type: BreathMask
  - type: Item
    size: Normal
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.01
    coolingCoefficient: 0.01
  - type: IngestionBlocker
  - type: Tag
    tags:
    - WhitelistChameleon
    - HelmetEVA
  - type: StaticPrice
    price: 1000
  - type: Pierceable
    level: Metal
  - type: Armor
    modifiers:
      coefficients:
        Heat: 0.95
        Radiation: 0.95

#Wizard "Robes"
- type: entity
  parent:  ClothingHeadEVAHelmetBase #, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHelmetsoftsuitWizard
  name: wizard void hood
  description: A bizarre gem-encrusted hood that radiates magical energies.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Head/Hoods/wizard.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/Head/Hoods/wizard.rsi
    equipSound:
      collection: storageRustle
    unequipSound: 
      collection: storageRustle
  # - type: PointLight
  #   color: "#ffadfb"
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: Tag
    tags:
    - CorgiWearable
    - WhitelistChameleon
