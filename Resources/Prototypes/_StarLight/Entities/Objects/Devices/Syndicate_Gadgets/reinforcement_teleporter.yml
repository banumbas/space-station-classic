- type: entity
  parent: ReinforcementRadio
  id: ReinforcementRadioSyndicateCyborgMedical # Reinforcement radio exclusive to nukeops uplink
  name: syndicate medical cyborg reinforcement radio
  description: Call in a medical cyborg, instantly!
  suffix: NukeOps
  components:
    - type: GhostRole
      name: ghost-role-information-syndicate-cyborg-medical-name
      description: ghost-role-information-syndicate-cyborg-description
      rules: ghost-role-information-silicon-rules
      mindRoles:
      - MindRoleGhostRoleSilicon
      raffle:
        settings: default
    - type: GhostRoleMobSpawner
      prototype: PlayerBorgSyndicateMedicalBattery

