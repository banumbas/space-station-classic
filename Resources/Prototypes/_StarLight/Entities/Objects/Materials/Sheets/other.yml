- type: entity
  parent: Paper
  id: SheetPrinter
  suffix: Full
  components:
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      SheetPrinter: 100
  - type: Stack
    stackType: SheetPrinter
    baseLayer: base
    layerStates:
    - paper
    - paper
    - paper
  - type: Sprite
    state: paper
    layers:
    - state: paper
      map: ["base"]
    - state: paper_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: Tag
    tags:
    - Document

- type: entity
  parent: SheetPrinter
  id: SheetPrinter1
  suffix: Single
  components:
  - type: Stack
    stackType: SheetPrinter
    count: 1
    
- type: entity
  abstract: true
  parent: BaseItem
  id: ClockworkBatteryBase
  description: A brass battery.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Clockwork/battery.rsi
  - type: Item
    size: Normal
  - type: StaticPrice
    price: 0
  - type: Tag
    tags:
    - Metal
    - Brass
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: ClockworkBatteryBase
  id: ClockworkBattery
  name: clockwork battery
  components:
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      ClockworkBattery: 100
  - type: Sprite
    state: item
    layers:
    - state: item
      map: ["base"]
  - type: Appearance