- type: entity
  parent: BaseItem
  id: BaseSlimeExtract
  abstract: true
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Specific/Xenobiology/test_slime_extract.rsi
      layers:
        - state: test_slime_extract
    - type: SolutionContainerManager
      solutions:
        container:
          maxVol: 150
    - type: MixableSolution
      solution: container
    - type: DrawableSolution
      solution: container
    - type: InjectableSolution
      solution: container
    - type: SolutionItemStatus
      solution: container
    - type: SlimeExtract
      containerName: container

- type: entity
  parent: BaseSlimeExtract
  id: GraySlimeExtract
  name: gray slime extract
  components:
    - type: Sprite
      color: "#999999ff"
    - type: SlimeExtract
      extractReactions:
        - requirements:
            Water: 1
          effects:
            - effect: !type:AddReagentToSolution
                reagent: Epinephrine
                solution: container
              scalingFactor: 1
              scalingOffset: 0
          shouldDelete: false
        - requirements:
            Blood: 1
          effects:
            - effect: !type:SpawnEntity
                entity: MonkeyCube
                number: 3
              scalingFactor: 0
              scalingOffset: 1
          shouldDelete: true
        - requirements:
            Plasma: 1
          effects:
            - effect: !type:SpawnEntity
                entity: XenobiologySlimeGray
                number: 1
              scalingFactor: 0
              scalingOffset: 1
          shouldDelete: true

- type: entity
  parent: BaseSlimeExtract
  id: OrangeSlimeExtract
  name: orange slime extract
  components:
    - type: Sprite
      color: "#f07a26ff"
    - type: SlimeExtract
      extractReactions:
        - requirements:
            Water: 5
          effects:
            - effect: !type:AddReagentToSolution
                reagent: OrangeSmokeCauser
                solution: container
              scalingFactor: 10
              scalingOffset: 0
          shouldDelete: true
        - requirements:
            Blood: 1
          effects:
            - effect: !type:AddReagentToSolution
                reagent: CapsaicinOil
                solution: container
              scalingFactor: 10
              scalingOffset: 0
          shouldDelete: false
        - requirements:
            Plasma: 1
          effects:
            - effect: !type:CreateGas
                gas: Plasma
              scalingFactor: 5
              scalingOffset: 0
            - effect: !type:CreateGas
                gas: Oxygen
              scalingFactor: 5
              scalingOffset: 0
            - effect: !type:AddHeat
