- type: entity
  parent: [AdvancedJetInjector, BaseSecurityContraband]
  id: TacticalJetInjector
  name: tactical jet injector
  description: A bold, tacticool, ultra high quality injector. Allows for a very fast injection, with a smaller capacity as a tradeoff. Guard it until your last breath.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Medical/corpsman_jetinjector.rsi
    layers:
    - state: jetinjector_base
      map: [ "enum.SolutionContainerLayers.Base" ]
    - state: jetinjector_filled1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: Item
    sprite: _Starlight/Objects/Specific/Medical/corpsman_jetinjector.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 10
  - type: SolutionContainerVisuals
    maxFillLevels: 2
  - type: Injector
    activeModeProtoId: TacticalJetInjectorDynamicMode
    allowedModes:
    - TacticalJetInjectorDynamicMode
    - TacticalJetInjectorInjectMode
  - type: StealTarget
    stealGroup: Hypospray

- type: entity
  name: gorlex hypospray
  parent: [BaseHypospray, BaseSyndicateContraband]
  description: An adaptation of the Gorlex Hypospray for cyborgs.
  id: SyndiBorgHypo
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/syndihypo.rsi
    layers:
      - state: hypo
        map: ["enum.SolutionContainerLayers.Base"]
      - state: hypo_fill1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: Objects/Specific/Medical/syndihypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 20
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    exactVolume: true
  - type: SolutionContainerVisuals
    maxFillLevels: 2
    fillBaseName: hypo_fill
    solutionName: hypospray
  - type: UseDelay
    delay: 0.5
