# Retractor

- type: entity
  name: abductor's retractor
  id: RetractorAbductor
  parent: Retractor
  description: A surgical tool used to hold open incisions.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi # Starlight
    state: abductor-retractor
  - type: Item
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    storedRotation: 90
  - type: SurgeryTool
    speed: 0.4
    startSound:
      path: /Audio/_Starlight/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_Starlight/Medical/Surgery/retractor2.ogg

- type: entity
  name: retractor
  id: RetractorCyber
  parent: Retractor
  description: A surgical tool used to hold open incisions.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Medical/surgery.rsi
    state: retractor
  - type: SurgeryTool
    speed: 0.4
    startSound:
      path: /Audio/_Starlight/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_Starlight/Medical/Surgery/retractor2.ogg
  - type: Tag
    tags:
      - CyberHandItem

- type: entity
  name: retractor
  id: RetractorRipper
  parent: Retractor
  description: A surgical tool used to hold open incisions.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Medical/surgery.rsi
    state: retractorripper
  - type: SurgeryTool
    speed: 1.2
    startSound:
      path: /Audio/_Starlight/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_Starlight/Medical/Surgery/retractor2.ogg
  - type: HeldSpeedModifier
    walkModifier: 1
    sprintModifier: 0.9
  - type: Tag
    tags:
      - CyberHandItem

