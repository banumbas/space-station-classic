        emptyLabel: borg-slot-chemical-containers-empty
        emptyRepresentative: Beaker
        whitelist:
          components:
          - FitsInDispenser
          tags:
          - ChemDispensable
    - item: Beaker
      hand:
        emptyLabel: borg-slot-chemical-containers-empty
        emptyRepresentative: Beaker
        whitelist:
          components:
          - FitsInDispenser
          tags:
          - ChemDispensable
    - item: Beaker
