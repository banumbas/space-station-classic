        enum.ToggleableVisuals.Enabled:
          enum.ToggleableVisuals.Layer:
            True: { visible: true }
            False: { visible: false }
    - type: Tag
      tags:
        - CyberHandItem

# Persephone
- type: entity
  id: CyberReagentGrinder
  parent: BaseItem
  name: integrated reagent grinder
  description: From BlenderTech. Will It Blend? Let's find out!
  suffix: grinder/juicer
  components:
