# Engineer
- type: entity
  name: cyber drill
  parent: PowerDrill
  id: PowerDrillCyber
  description: A simple powered hand drill.
  components:
  - type: Tag
    tags:
    - CyberHandItem
  - type: Sprite
    sprite: _Starlight/Objects/Tools/cyberling.rsi
    state: drill_screw
  - type: MultipleTool
    statusShowBehavior: true
    entries:
      - behavior: Screwing
        sprite:
          sprite: _Starlight/Objects/Tools/cyberling.rsi
          state: drill_screw
        useSound:
          path: /Audio/Items/drill_use.ogg
        changeSound:
          path: /Audio/Items/change_drill.ogg
      - behavior: Anchoring
        sprite:
          sprite: _Starlight/Objects/Tools/cyberling.rsi
