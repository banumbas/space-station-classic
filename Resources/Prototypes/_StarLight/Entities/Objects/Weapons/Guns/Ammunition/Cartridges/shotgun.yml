
# the ZOZ is too shitty to fire real ammo

- type: entity
  id: BaseShellShotgunToz
  name: 20 gauge shell
  parent: BaseCartridge
  abstract: true
  components:
  - type: Tag
    tags:
    - ShellShotgunToz
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Ammunition/Casings/shotgun_shell_toz.rsi
    layers:
    - state: base
      map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Appearance
  - type: SpentAmmoVisuals
    revealSpent: true # Starlight
    tip: true

- type: entity
  id: ShellShotgunToz
  name: 20 gauge shell
  parent: [ BaseShellShotgunToz, BaseSovietContraband ]
  components:
  - type: Sprite
    layers:
    - state: base
      map: [ "enum.AmmoVisualLayers.Base" ]
    - state: tip
      map: [ "enum.AmmoVisualLayers.Tip" ]
      color: "#FFFFFF"
    - state: spent
      map: [ "enum.AmmoVisualLayers.Spent" ]
      visible: false
  - type: CartridgeAmmo
    soundEject:
      collection: ShellEject
    proto: PelletShotgunTozSpreadTrace
