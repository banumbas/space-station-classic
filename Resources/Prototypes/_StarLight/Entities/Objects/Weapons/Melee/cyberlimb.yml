- type: entity
  name: energy chainsword
  parent: [BaseMeleeWeaponEnergy, BaseSecurityContraband]
  id: CyberEnergyChainsword
  description: Slam this into the individual you wish to destroy, mentally and physically.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Melee/cyberchainsaw.rsi
    layers:
    - state: cyberchainsawoff
    - state: cyberchainsaw
      color: "#FFFFFF"
      visible: false
      shader: unshaded
      map: [ "blade" ]
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
     path: /Audio/Weapons/chainsaw.ogg
     params:
       variation: 0.250
    activatedSoundOnHitNoDamage:
     path: /Audio/Weapons/chainsaw.ogg
     params:
       variation: 0.250
       volume: -10
    activatedSoundOnSwing:
     path: /Audio/Weapons/eblademiss.ogg
     params:
       variation: 0.125
    activatedDamage:
      types:
        Slash: 5
        Heat: 5
        Structural: 15
  - type: MeleeWeapon
    angle: 0
    wideAnimationRotation: -135
    attackRate: 4
    autoAttack: true
    damage:
      types:
        Blunt: 0.5
  - type: Item
    sprite: _Starlight/Objects/Weapons/Melee/cyberchainsaw.rsi
  # 🌟Starlight-start🌟
  - type: BoneSaw
  - type: SurgeryTool
    successRate: 0.6
    speed: 0.2
    startSound:
      path: /Audio/Weapons/chainsawwield.ogg
    endSound:
      path: /Audio/Weapons/chainsaw.ogg
  # 🌟Starlight-end🌟
  - type: Tag
    tags:
      - CyberHandItem
  - type: Reflect
    reflectProb: 0.1

#Mantis Blade
- type: entity
  name: mantis blade
  parent: [BaseItem, BaseSyndicateContraband]
  id: CyberMantisBlade
  description: A sharp blade that extended from your own arm, time to burn down a corporation.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Melee/cybermantisblade.rsi
    state: cybermantisblade
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 2.4
    autoAttack: false
    damage:
      types:
        Slash: 12
        Structural: 20
    soundHit:
      path: /Audio/Weapons/block_metal1.ogg
    soundNoDamage:
      path: /Audio/Weapons/punchmiss.ogg
    soundSwing:
      path: /Audio/Weapons/punchmiss.ogg
  - type: Item
  - type: Sharp
  - type: Tag
    tags:
      - CyberHandItem

# Zeus
- type: entity
  id: MeleeWeaponCyberEmpFist
  parent: BaseItem
  name: zeus fist
  description: Arm-mounted EMP capacitor, ready to disable an electrical device.
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Tools/cyberling.rsi
      layers:
        - state: zeusfist_off
          map: [ "enum.ToggleableVisuals.Layer" ]
    - type: MeleeWeapon
      soundHit:
        collection: Punch
      angle: 0
      animation: WeaponArcFist
      wideAnimation: WeaponArcFist
      attackRate: 1
      damage:
        types:
          Blunt: 5
    - type: ToggleCellDraw
    - type: PowerCellDraw
      useCharge: 715
    - type: ItemToggleMeleeWeapon
      activatedSoundOnHit:
        path: /Audio/Items/Defib/defib_zap.ogg
        params:
          variation: 0.250
      activatedSoundOnHitNoDamage:
        path: /Audio/Items/Defib/defib_zap.ogg
        params:
          variation: 0.250
          volume: -10
      activatedDamage:
        types:
          Blunt: 5
          Shock: 15
    - type: ContainerContainer
      containers:
        cell_slot: !type:ContainerSlot { }
    - type: PowerCellSlot
      cellSlotId: cell_slot
    - type: ItemSlots
      slots:
        cell_slot:
          whitelist:
            components:
              - PowerCell
            requireAll: true
          name: power-cell-slot-component-slot-name-default
          startingItem: PowerCellMedium
    - type: EmpOnMeleeHit
      range: 0.5
      energyConsumption: 50000
      disableDuration: 60
    - type: ItemToggle
      predictable: false
      soundActivate:
        collection: sparks
        params:
          variation: 0.250
      soundDeactivate:
        collection: sparks
        params:
          variation: 0.250
      soundFailToActivate:
        path: /Audio/Machines/button.ogg
        params:
          variation: 0.250
    - type: ItemTogglePrefix
      prefixOn: on
      prefixOff: off
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.ToggleableVisuals.Enabled:
            enum.ToggleableVisuals.Layer:
              True: {state: zeusfist_on}
              False: {state: zeusfist_off}
    - type: Tag
      tags:
        - CyberHandItem

- type: entity
  id: MeleeWeaponCyberStunFist
