        collection: sparks
        params:
          variation: 0.250
          volume: 5
      soundDeactivate:
        collection: sparks
        params:
          variation: 0.250
          volume: 5
      soundFailToActivate:
        path: /Audio/Machines/button.ogg
        params:
          variation: 0.250
          volume: 5
    - type: Stunbaton
      energyPerUse: 120
    - type: ItemToggleMeleeWeapon
