- type: entity
  id: nctdatachip
  parent: [Clothing, BaseCommandContraband]
  name: NCT Trainee Access Chip
  description: A small electronic access token that allows its user to copy the access of their Trainee. Only accessible by NT Career Trainers!
  components:
  - type: Clothing
    quickEquip: false
    slots:
    - idcard
    sprite: Objects/Misc/id_cards.rsi
  - type: Sprite
    sprite: _Starlight/Objects/Devices/nctdatachip.rsi
    layers:
    - state: base
    - state: enabled
      shader: unshaded
      visible: false
  - type: Item
    size: Small
    heldPrefix: default
    storedRotation: -90
  - type: Access
  - type: Tag
    tags:
    - DoorBumpOpener
  - type: NCTDataChip