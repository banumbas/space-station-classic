- type: entity
  parent: [ IDCardStandard, BaseCommandContraband ]
  id: MagistrateIDCard
  name: magistrate ID card
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Misc/id_cards.rsi
      layers:
        - state: silver
        - sprite: &starlight-icon-rsi _Starlight/Interface/Misc/job_icons.rsi
          offset: &icon-offset -0.09375, 0.0625 #3 pixels left, 2 pixels up
          state: Magistrate
    - type: PresetIdCard
      job: Magistrate

- type: entity
  parent: [ IDCardStandard, BaseCentcommContraband ]
  id: CentcomIDCardOperator
  name: centcomm operator ID card
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Misc/id_cards.rsi
    layers:
    - sprite: &id-rsi Objects/Misc/id_cards.rsi
      state: centcom
    - sprite: *id-rsi
      state: stripe_top
      color: &color-centcomm-top "#134975"
    - sprite: *id-rsi
      state: stripe_bottom
      color: &color-centcomm-bottom "#0d304d"
    - sprite: *starlight-icon-rsi
      offset: *icon-offset
      state: CentCommOperator
  - type: Item
    heldPrefix: blue
  - type: PresetIdCard
    job: CentralCommandOperator

