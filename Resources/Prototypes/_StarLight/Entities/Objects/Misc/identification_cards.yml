- type: entity
  parent: [ IDCardStandard, BaseSyndicateContraband ]
  id: CommanderIDCard
  name: syndicate commander ID card
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Misc/id_cards.rsi
      layers:
        - state: syndi
        - sprite: *starlight-icon-rsi
          offset: *icon-offset
          state: Commander
    - type: Access
      tags:
        - Maintenance
        - SyndicateAgent
        - NuclearOperative
    - type: AgentIDCard
    - type: ActivatableUI
      key: enum.AgentIDCardUiKey.Key
      inHandsOnly: true
    - type: UserInterface
      interfaces:
        enum.AgentIDCardUiKey.Key:
          type: AgentIDCardBoundUserInterface

