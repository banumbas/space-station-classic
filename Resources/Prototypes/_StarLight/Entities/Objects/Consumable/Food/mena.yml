# Middle Eastern Foods

# Raw Pita
- type: entity
  parent: FoodBakingBase
  id: FoodDoughPita
  name: pita dough
  description: A twice-flattened piece of wheat dough.
  components:
  - type: Item
    size: Normal
  - type: FlavorProfile
    flavors:
      - dough
      - chalky
      - halal
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/pita.rsi
    layers:
    - state: pitadough
  - type: Construction # made by rolling a dough rope a second time
    graph: DoughRope
    node: flattened
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 3
        reagents:
        - ReagentId: Nutriment
          Quantity: 2

# Pita
- type: entity
  parent: FoodBreadBase
  id: FoodBreadPita
  name: pita
  description: A flatbread with internal pocket. Best when eaten stuffed.
  components:
  - type: FlavorProfile
    flavors:
      - bread
      - halal
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/pita.rsi
    layers:
    - state: pita
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 8
        reagents:
        - ReagentId: Nutriment
          Quantity: 2

# Falafel
- type: entity
  parent: FoodInjectableBase
  id: FoodFalafel
  name: falafel
  description: A hearty pea-based mince. The vegan meatloaf of the Middle East.
  components:
  - type: FlavorProfile
    flavors:
      - chalky
      - savory
      - halal
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/falafel.rsi
    layers:
    - state: icon
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 16
        reagents:
        - ReagentId: Nutriment
          Quantity: 7
        - ReagentId: Hummus
          Quantity: 5
        - ReagentId: Protein
          Quantity: 2

# Hummus
- type: entity
  parent: FoodBowlBase
  id: FoodHummusDip
  name: hummus dip
  description: A hearty pea-based paste, served with strips of pita. The ultimate dip of the Middle East.
  components:
  - type: FlavorProfile
    flavors:
      - bread
      - chalky
      - creamy
      - halal
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/bowl.rsi
    layers:
      - state: bowl
      - state: hummus
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 15
        reagents:
        - ReagentId: Hummus
          Quantity: 10
        - ReagentId: TableSalt
          Quantity: 1
        - ReagentId: OilOlive
          Quantity: 1
        - ReagentId: Nutriment
          Quantity: 2

# (Chicken) Shawarma
- type: entity
  parent: FoodInjectableBase
  id: FoodShawarma
  name: chicken shawarma
  description: A pita loaded with hummus, tomato, onions, and a cutlet of chicken. Fresh!
  components:
  - type: FlavorProfile
    flavors:
      - bread
      - chicken
      - onion
      - tomato
      - chalky
      - creamy
      - halal
  - type: Edible
    transferAmount: 4
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/pita.rsi
    layers:
    - state: shawarma
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 40
        reagents:
        - ReagentId: Nutriment
          Quantity: 20
        - ReagentId: Hummus
          Quantity: 5
        - ReagentId: Protein
          Quantity: 2
        - ReagentId: Vitamin
          Quantity: 4
        - ReagentId: Allicin
          Quantity: 1

