# Turkish Delight
- type: entity
  parent: FoodInjectableBase
  id: FoodTurkishDelight
  name: uncut turkish delight
  description: A massive, wobbling gelatin dessert. May contains nuts.
  components:
  - type: FlavorProfile
    flavors:
      - nutty
      - jelly
      - halal
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/turkishdelight.rsi
    layers:
    - state: uncut
  - type: Edible
    transferAmount: 3
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 48
        reagents:
        - ReagentId: Sugar
          Quantity: 35
        - ReagentId: Nutriment
          Quantity: 5
  - type: SliceableFood
    count: 8
    slice: FoodTurkishDelightCube
  - type: Item
    size: Normal
    shape:
    - 0,0,2,1

- type: entity
