- type: entity
  parent: BaseEntitySpellAction
  id: ActionAnimateSpell
  name: Animate
  description: Bring an inanimate object to life!
  components:
  - type: Action
    useDelay: 0
    sound: !type:SoundPathSpecifier
      path: /Audio/Magic/staff_animation.ogg
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: spell_default
  - type: EntityTargetAction
    whitelist:
      components:
      - Animateable # Currently on: SeatBase, TableBase, ClosetBase, BaseMachine, ConstructibleMachine, BaseComputer, BaseItem, CrateGeneric, StorageTank, GasCanister
    blacklist:
      components:
      - MindContainer
      - NukeDisk
      - GravityGenerator
      - AnomalyGenerator
      - TegGenerator
      - TegCirculator
      - XenoArtifact
    event: !type:ChangeComponentsSpellEvent
      toAdd:
      - type: Animate
      - type: MindContainer
      - type: InputMover
      - type: MobMover
      - type: MovementSpeedModifier
      - type: HTN
        rootTask:
          task: SimpleHostileCompound
      - type: CombatMode
      - type: MeleeWeapon
        animation: WeaponArcPunch
        wideAnimation: WeaponArcPunch
        altDisarm: false
        soundHit: /Audio/Weapons/smash.ogg
        range: 1.2
        # Starlight-start: Increased from 0 to allow animated objects to attack in a wider arc
        angle: 60
        # Starlight-end
        # Starlight-start: Commented out old angle value
        # angle: 0.0
        # Starlight-end
        damage:
          types:
            Blunt: 10
      - type: NpcFactionMember
        factions:
        - Wizard
      - type: NoSlip
      - type: MovementAlwaysTouching
      - type: CanMoveInAir
      - type: Damageable
        damageContainer: ManifestedSpirit
        damageModifierSet: ManifestedSpirit
      # Starlight-start: Destructible component is now added dynamically by AnimateSpellSystem with HP based on entity size
      # - type: Destructible
      #   thresholds:
      #   - trigger:
      #       !type:DamageTrigger
      #       damage: 100
      #     behaviors:
      #     - !type:DoActsBehavior
      #       acts: ["Destruction"]
      #     - !type:PlaySoundBehavior
      #       sound:
      #         collection: MetalBreak
      # Starlight-end
      - type: Hands
      - type: CanEscapeInventory
      - type: MobCollision
      toRemove:
      - RequireProjectileTarget
      - BlockMovement
      - Item
      - MeleeRequiresWield
