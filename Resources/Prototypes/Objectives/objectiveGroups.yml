# Traitor
- type: weightedRandom
  id: TraitorObjectiveGroups
  weights:
    TraitorObjectiveGroupSteal: 1
    TraitorObjectiveGroupKill: 1
    TraitorObjectiveGroupState: 1 #As in, something about your character. Alive, dead, arrested, gained an ability...
    TraitorObjectiveGroupSocial: 0.25 #Involves helping/harming others without killing them or stealing their stuff, lowered because the chance of rolling this was enormous when its just one objective in the category
    TraitorObjectiveGroupStory: 0.85  # Starlight

- type: weightedRandom
  id: TraitorObjectiveGroupSteal
  weights:
    CaptainIDStealObjective: 1
    CMOHyposprayStealObjective: 1
#    CMOCrewMonitorStealObjective: 1 # Starlight, disabled in favor of collection objective
    RDHardsuitStealObjective: 0.75  #Starlight edit
    NukeDiskStealObjective: 0.5  #Starlight edit, you basically besome aos/kos once you have it
    MagbootsStealObjective: 1
    CorgiMeatStealObjective: 1
    ClipboardStealObjective: 1
    KnuckleDustersStealObjective: 1
    # Starlight start
    CaptainGunStealObjective: 0.75  #Starlight edit
    CaptainJetpackStealObjective: 0.75  #Starlight edit
    HandTeleporterStealObjective: 1  #Starlight edit
    RDDiplomaStealObjective: 0.75 #Starlight Unique Targets
    CMOLicenseStealObjective: 0.75 #Starlight Unique Targets
#    EnergyShotgunStealObjective: 0.5 #Starlight removed in favor of combined objective
    SecurityRareGunsStealObjective: 0.65 # Starlight, eshotgun + emagnum
    HOSWeaponStealObjective: 0.5 #Starlight Unique Targets
    HOPIDStealObjective: 1 # HoP's more exposed, but there's less copies of this ID usually
    PinpointerNuclearStealObjective: 1 # Fun if paired with the nuke disk objective
    AccessConfiguratorStealObjective: 1 # HoP and CE
    EncryptionKeyHybridStealObjective: 0.6 # QM/Salv Lead/Brigmed. Not that interesting, so low.
    CMOHardsuitStealObjective: 1 # I'm so sorry CMO
    CEHardsuitStealObjective: 1 # Where are you going to hide it?
    CEJetpackStealObjective: 1 # Probably wearing it right now
    HOSHardsuitStealObjective: 1 # Quite defensive.
    WardenHardsuitStealObjective: 1 # Not a member of command, yet has 3 steal targets.
    BrigmedicHardsuitStealObjective: 1 # You're not escaping.
    QMHardsuitStealObjective: 1 # Would you believe it was never an objective before?
    SalvLeadHardsuitStealObjective: 0.75 # Likely to be easy if Salvage actually gets better suits.
    CaptainHardsuitStealObjective: 0.75 # Good luck.
    NTRepHardsuitStealObjective: 0.75 # Usually in the bridge... hard to get to.
    NTRepBriefcaseSecureStealObjective: 0.75 # Same as most NT Rep stuff.
    BSOHardsuitStealObjective: 0.75 # Same as the above...
    BSOMagbootsStealObjective: 0.75 # Easier to hide, at least.
    BSOWeaponStealObjective: 0.75 # Blue Shield weapons. Includes the X-01 and SP8T.
    CorporateSecretsStealObjective: 0.75 #Starlight Unique Target
    CriminalReportsStealObjective: 0.75 #Starlight Unique Target
    SecureKnowledgeStealObjective:  0.75 #Starlight Unique Target
    # Starlight end
    

- type: weightedRandom
  id: TraitorObjectiveGroupKill
  weights:
    KillRandomPersonObjective: 1
    KillRandomHeadObjective: 0.25
    TeachRandomPersonObjective: 1 #Starlight Teach them a lesson
    TeachRandomHeadObjective: 0.25 # Starlight Teach them a lesson

- type: weightedRandom
  id: TraitorObjectiveGroupState
  weights:
    EscapeShuttleObjective: 1
    DieObjective: 0.2  #Starlight edit, its still massively low, around a 3% chance overall, up from under 0.9% and its a limited objective.
    #HijackShuttleObjective: 0.02

- type: weightedRandom
  id: TraitorObjectiveGroupSocial
  weights:
#    RandomTraitorAliveObjective: 1 - Removed because the objective was boring and didn't progress the round.
    RandomTraitorProgressObjective: 1

