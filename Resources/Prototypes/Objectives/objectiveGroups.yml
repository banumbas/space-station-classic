# Traitor
- type: weightedRandom
  id: TraitorObjectiveGroups
  weights:
    TraitorObjectiveGroupSteal: 1
    TraitorObjectiveGroupKill: 1
    TraitorObjectiveGroupState: 1 #As in, something about your character. Alive, dead, arrested, gained an ability...
    TraitorObjectiveGroupSocial: 0.25 #Involves helping/harming others without killing them or stealing their stuff, lowered because the chance of rolling this was enormous when its just one objective in the category
    TraitorObjectiveGroupStory: 1  # Starlight

- type: weightedRandom
  id: TraitorObjectiveGroupSteal
  weights:
    CaptainIDStealObjective: 1
    CMOHyposprayStealObjective: 1
    CMOCrewMonitorStealObjective: 1
    RDHardsuitStealObjective: 0.75  #Starlight edit
    NukeDiskStealObjective: 0.5  #Starlight edit, you basically besome aos/kos once you have it
    MagbootsStealObjective: 1
    CorgiMeatStealObjective: 1
    ClipboardStealObjective: 1
    KnuckleDustersStealObjective: 1
    CaptainGunStealObjective: 0.75  #Starlight edit
    CaptainJetpackStealObjective: 0.75  #Starlight edit
    HandTeleporterStealObjective: 1  #Starlight edit
    RDDiplomaStealObjective: 1 #Starlight Unique Targets
    CMOLicenseStealObjective: 1 #Starlight Unique Targets
    EnergyShotgunStealObjective: 0.5 #Starlight re-targeted
    Proto5xStealObjective: 0.5 #Starlight Unique Targets

- type: weightedRandom
  id: TraitorObjectiveGroupKill
  weights:
    KillRandomPersonObjective: 1
    KillRandomHeadObjective: 0.25
    TeachRandomPersonObjective: 1 #Starlight Teach them a lesson
    TeachRandomHeadObjective: 0.25 # Starlight Teach them a lesson

- type: weightedRandom
  id: TraitorObjectiveGroupState
  weights:
    EscapeShuttleObjective: 1
    DieObjective: 0.2  #Starlight edit, its still massively low, around a 3% chance overall, up from under 0.9% and its a limited objective.
    #HijackShuttleObjective: 0.02

- type: weightedRandom
  id: TraitorObjectiveGroupSocial
  weights:
#    RandomTraitorAliveObjective: 1 - Removed because the objective was boring and didn't progress the round.
    RandomTraitorProgressObjective: 1

