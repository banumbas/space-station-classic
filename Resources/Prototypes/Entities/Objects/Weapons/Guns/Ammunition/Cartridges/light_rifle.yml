- type: entity
  abstract: true
  parent: [ BaseCartridge, BaseSecurityContraband ]
  id: BaseCartridgeLightRifleSP
  name: cartridge (.30 rifle SP)
  components:
  - type: Tag
    tags:
    - CartridgeLightRifle
  - type: CartridgeAmmo
    proto: BulletLightRifleTraceSP
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals

- type: entity
  parent: BaseCartridgeLightRifleSP
  id: CartridgeLightRifleSP
  name: cartridge (.30 rifle SP)
  components:
  - type: CartridgeAmmo
    proto: BulletLightRifleTraceSP
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#3F47DB"

