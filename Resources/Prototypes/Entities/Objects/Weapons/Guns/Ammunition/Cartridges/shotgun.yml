    solutions:
      ammo:
        reagents:
        - ReagentId: Nocturine #🌟Starlight🌟
          Quantity: 5
  - type: SolutionTransfer
    maxTransferAmount: 3.5

- type: entity
  id: ShellShotgunImprovised
  name: improvised 12 gauge shell # Starlight change: .50 -> 12 gauge
  description: A homemade shotgun shell that shoots painful glass shrapnel. The spread is so wide that it couldn't hit the broad side of a barn.
  parent: [ BaseShellShotgun, BaseSecurityContraband ]
  components:
  - type: Tag
    tags:
    - ShellShotgun
    - ShellShotgunLight
  - type: Sprite
    layers:
      - state: improvised
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#555555"
      - state: spent
        map: [ "enum.AmmoVisualLayers.Spent" ]
        visible: false
  - type: Construction
    graph: ImprovisedShotgunShellGraph
    node: shell
  - type: CartridgeAmmo
    soundEject:
      collection: ShellEject
    proto: PelletShotgunImprovisedSpreadTrace

