- type: entity
  abstract: true
  parent: BaseCartridge
  id: BaseShellShotgun
  name: 12 gauge shotgun shell # Starlight change: .50 -> 12 gauge
  components:
  - type: Tag
    tags:
    - ShellShotgun
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/shotgun_shell.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Appearance
  - type: SpentAmmoVisuals
    revealSpent: true # Starlight
    tip: true

- type: entity
  parent: [ BaseShellShotgun, BaseSecurityBartenderContraband ]
  id: ShellShotgunBeanbag
  name: 12 gauge beanbag slug # Starlight change: .50 -> 12 gauge
  description: The standard cartridge used by most modern shotguns. Beanbag ammunition contains a single less-than-lethal projectile that can stun targets.
  components:
  - type: Tag
    tags:
    - ShellShotgun
    - ShellShotgunLight
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#149A1E"
      - state: spent
        map: [ "enum.AmmoVisualLayers.Spent" ]
        visible: false
  - type: CartridgeAmmo
    soundEject:
      collection: ShellEject
    proto: PelletShotgunBeanbagTrace

- type: entity
  parent: [ BaseShellShotgun, BaseSecurityContraband]
  id: ShellShotgunSlug
  name: 12 gauge slug # Starlight change: .50 -> 12 gauge
  description: The standard cartridge used by most modern shotguns. Slug ammunition contains a single high-density projectile effective at longer ranges than pellet ammunition.
  components:
  - type: Sprite
    layers:
      - state: slug
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip-long
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#252525"
      - state: spent-long
        map: [ "enum.AmmoVisualLayers.Spent" ]
        visible: false
  - type: CartridgeAmmo
    soundEject:
      collection: ShellEject
    proto: PelletShotgunSlugTrace

- type: entity
  parent: BaseShellShotgun
  id: ShellShotgunFlare
  name: 12 gauge flare # Starlight change: .50 -> 12 gauge
  description: The standard cartridge used by most modern shotguns. Flare ammunition contains a single brightly-burning projectile intended for illumination and signalling, rather than combat.
  components:
  - type: Tag
    tags:
    - ShellShotgun
    - ShellShotgunLight
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#FFFF0B"
      - state: flare
      - state: spent
        map: [ "enum.AmmoVisualLayers.Spent" ]
        visible: false
  - type: CartridgeAmmo
    proto: PelletShotgunFlare
    soundEject:
      collection: ShellEject

