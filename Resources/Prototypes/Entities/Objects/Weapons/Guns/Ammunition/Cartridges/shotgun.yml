- type: entity
  parent: [ BaseShellShotgun, BaseSecurityContraband ]
  id: ShellTranquilizer
  name: 12 gauge tranquilizer slug # Starlight change: .50 -> 12 gauge
  description: The standard cartridge used by most modern shotguns. Tranquilizer ammunition contains a single ballistic syringe loaded with a strong sedative that harmlessly puts targets to sleep.
  components:
  - type: Tag
    tags:
    - ShellShotgun
    - ShellShotgunLight
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#49CECE"
      - state: spent
        map: [ "enum.AmmoVisualLayers.Spent" ]
        visible: false
  - type: CartridgeAmmo
    proto: PelletShotgunTranquilizer
  - type: ChemicalAmmo
  - type: SolutionContainerManager
    solutions:
      ammo:
        reagents:
        - ReagentId: Nocturine #🌟Starlight🌟
          Quantity: 5
  - type: SolutionTransfer
    maxTransferAmount: 3.5

- type: entity
  parent: [ BaseShellShotgun, BaseSecurityContraband ]
  id: ShellShotgunImprovised
  name: improvised 12 gauge shell # Starlight change: .50 -> 12 gauge
  description: A homemade shotgun shell loaded with chunks of glass shrapnel. Surprisingly effective, but the spread is so wide that you couldn't hit the broad side of a barn.
  components:
  - type: Tag
    tags:
    - ShellShotgun
    - ShellShotgunLight
  - type: Sprite
    layers:
      - state: improvised
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#555555"
      - state: spent
        map: [ "enum.AmmoVisualLayers.Spent" ]
        visible: false
  - type: Construction
    graph: ImprovisedShotgunShellGraph
    node: shell
  - type: CartridgeAmmo
    soundEject:
      collection: ShellEject
    proto: PelletShotgunImprovisedSpreadTrace

- type: entity
