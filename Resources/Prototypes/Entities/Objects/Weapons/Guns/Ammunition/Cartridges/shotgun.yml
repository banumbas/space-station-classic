  id: ShellShotgunUranium
  name: 12 gauge uranium buckshot shell # Starlight change: .50 -> 12 gauge
  description: The standard cartridge used by most modern shotguns. Uranium ammunition replaces the lead core of the pellets with fissile material, irradiating targets from the inside.
  components:
  - type: Sprite
    layers:
      - state: slug
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip-long
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#252525"
      - state: depleted-uranium
      - state: spent-long
        map: [ "enum.AmmoVisualLayers.Spent" ]
        visible: false
  - type: CartridgeAmmo
    soundEject:
      collection: ShellEject
    proto: PelletShotgunUraniumSpreadTrace

