# A basic inheritable template for a gun that is wieldable and has the standard inaccuracy.
- type: entity
  id: BaseGunWieldable
  abstract: true
  components:
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    maxAngle: 0
    minAngle: 0
    angleIncreaseDivider: 2
    minAngleDivider: 2
    maxAngleDivider: 2
  - type: Gun
    minAngle: 20
    maxAngle: 30
