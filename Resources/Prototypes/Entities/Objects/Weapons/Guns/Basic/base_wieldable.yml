# A basic inheritable template for a gun that is wieldable and has the standard inaccuracy.
- type: entity
  id: BaseGunWieldable
  abstract: true
  components:
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -20
    maxAngle: -30
  - type: Gun
    minAngle: 21
    maxAngle: 32
  # starlight start
  - type: MeleeWeapon
    wideAnimationRotation: 90
    damage:
      types:
        Blunt: 8
    angle: 0
    animation: WeaponArcThrust
    soundHit:
      collection: MetalThud
  - type: MeleeRequiresWield
  - type: AltFireMelee
  # starlight end
