- type: entity
  name: handheld crew monitor
  categories: [ DoNotMap ]
  parent: [ PowerCellSlotMediumItem, BaseHandheldComputer, BaseGrandTheftContraband ] # Starlight: Medium battery
  # CMO-only bud, don't add more.
  id: HandheldCrewMonitor
  description: A hand-held crew monitor displaying the status of suit sensors.
  components:
  - type: Item
    heldPrefix: scanner
  # Starlight START
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Medical/handheld_cmo_crewmonitor.rsi
    layers:
      - state: frame
        map: ["enum.CrewMonitorLayers.Frame"]
      - state: powered
        map: [ "enum.CrewMonitorLayers.Powered" ]
        visible: true
      - state: alert
        map: ["enum.CrewMonitorLayers.Alert"]
        visible: false
  - type: Appearance
  - type: BatteryVisuals
  - type: GenericVisualizer
    visuals:
      enum.BatteryVisuals.State:
        enum.CrewMonitorLayers.Powered:
          Full: { visible: true, shader: unshaded }
          Neither: { visible: true, shader: unshaded }
          Empty: { visible: false }
      enum.CrewMonitorVisuals.Alert:
        enum.CrewMonitorLayers.Alert:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
  - type: PowerCellDraw
    useCharge: 15
  # Starlight END
  - type: ActivatableUI
    key: enum.CrewMonitoringUIKey.Key
  - type: UserInterface
    interfaces:
      enum.CrewMonitoringUIKey.Key:
        type: CrewMonitoringBoundUserInterface
  - type: CrewMonitoringConsole
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: CrewMonitor
  - type: WirelessNetworkConnection
    range: 500
  - type: StationLimitedNetwork
  - type: StaticPrice
    price: 500
  - type: Tag
    tags:
    - HighRiskItem
  - type: StealTarget
    stealGroup: CrewMonitorCollection

- type: entity
  id: HandheldCrewMonitorEmpty
  parent: HandheldCrewMonitor
  suffix: Empty
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        #Starlight Start
        blacklist:
          tags:
          - MechReactor
        #Starlight End
