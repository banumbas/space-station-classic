- type: entity
  name: ore bag
  id: OreBag
  parent: BaseStorageItem
  description: A robust bag for salvage specialists and miners alike to carry large amounts of ore. Magnetises any nearby ores when attached to a belt.
  components:
  - type: ItemToggle  # Starlight Edit - added toggle
    onUse: false
    onActivate: false  # Starlight Edit - move action to altVerb
    verbToggleOn: "Activate Magnet"
    verbToggleOff: "Deactivate Magnet"
    # Starlight Edit Start - Add activation sounds
    soundActivate:
      collection: sparks
      params:
        variation: 0.250
    soundDeactivate:
      collection: sparks
      params:
        variation: 0.250
  - type: AltUseToggle
    # Starlight Edit End
  - type: ComponentToggler
    components: 
    - type: MagnetPickup
      requiresEquipping: false  # Starlight Edit - make it work even without being equipped
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Mining/ore_bag.rsi
    state: icon
  - type: Clothing
    sprite: _Starlight/Objects/Specific/Mining/ore_bag.rsi
    quickEquip: false
    slots:
    - belt
  - type: Item
    size: Ginormous
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,9,3
    quickInsert: true
    areaInsert: true
    whitelist:
      tags:
        - ArtifactFragment
        - Ore
  - type: Dumpable
  # Starlight Edit Start - added visual indicator for magnet
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: "icon-on" }
          False: { state: "icon" }
  # Starlight Edit End

- type: entity
  parent: OreBag
  id: BorgOreBag
  name: integrated ore bag
  description: A large ore bag built into the frame of a mining cyborg.
  components:
    - type: Storage
      grid:
      - 0,0,9,5
