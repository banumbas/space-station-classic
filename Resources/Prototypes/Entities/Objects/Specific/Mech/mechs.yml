  - type: Mech
    equipmentWhitelist:
      tags:
      - CombatMech
      - PaddyMech
# 🌟Starlight-start🌟
  - type: Prying
    pryPowered: true
# 🌟Starlight-end🌟

- type: entity
  id: IndustrialMech
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: Mech
    equipmentWhitelist:
      tags:
      - IndustrialMech
# STARLIGHT BEGIN
  - type: MeleeThrowOnHit
    speed: 10
    distance: 1
# STARLIGHT END

- type: entity
  id: SpecialMech
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: Mech
    equipmentWhitelist:
      tags:
      - SpecialMech

- type: entity
  id: SmallMech
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: Mech
    equipmentWhitelist:
