- type: entity
  parent: BaseItem
  id: Error
  name: error
  description: Hmmmm. I may be at a Loss for words, but I think Something went wrong.
  components:
  - type: Sprite
    sprite: error.rsi
    state: error
  - type: Edible
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 26
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Tazinide #starlight
          Quantity: 15 #starlight | eating an error will shock you for 30 seconds
  - type: Slippery
    slipData:
      knockdownTime: 3
      launchForwardsMultiplier: 3
  - type: StepTrigger
    intersectRatio: 0.2
  - type: CollisionWake
    enabled: false
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.3,0.4,0.3"
        hard: false
        layer:
        - SlipLayer
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.3,0.4,0.3"
        density: 30
        mask:
        - ItemMask
  #starlight start | I'm at a loss for words :3
  - type: Item
    size: Small
    shape:
      - 0,0,0,1
      - 4,0,4,1
      - 6,1,6,1
      - 0,3,0,4
      - 2,3,2,4
      - 4,3,4,4
      - 5,4,6,4
  #starlight end
