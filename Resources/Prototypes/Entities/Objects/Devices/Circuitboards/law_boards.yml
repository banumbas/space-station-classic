- type: entity
  abstract: true
  parent: BaseElectronics
  id: BaseSiliconLawboard
  description: An electronics board containing a silicon lawset.
  components:
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    state: std_mod
  - type: SiliconLawProvider
    laws: NTDefault
    IsLawboard: true # Starlight
  - type: GuideHelp
    guides:
    - Lawsets
  - type: StaticPrice # Starlight: Made all lawboards sellable for at least 700
    price: 700

