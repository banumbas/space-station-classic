- type: entity
  id: StatusEffectBase
  abstract: true
  components:
  - type: StatusEffect
  - type: Sprite
    drawdepth: Effects
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  parent: StatusEffectBase
  id: MobStatusEffectBase
  abstract: true
  components:
  - type: StatusEffect
    whitelist:
      components:
      - MobState

# Things that should be removed by rejuvenation should parent to this
# Also blocks the status effect being added to godmode-ed entities.
- type: entity
  parent: MobStatusEffectBase
  id: MobStatusEffectDebuff
  abstract: true
  components:
  - type: RejuvenateRemovedStatusEffect

- type: entity
  parent: MobStatusEffectDebuff
  id: MobStandStatusEffectBase
  abstract: true
  components:
  - type: StatusEffect
    whitelist:
      components:
      - MobState
      - StandingState
      requireAll: true
    blacklist: # This blacklist exists because mob prototypes are smelly and everything needs a standing state component.
      tags:
      - KnockdownImmune

# The creature sleeps so heavily that nothing can wake him up. Not even its own death.
- type: entity
  parent: MobStatusEffectDebuff
  id: StatusEffectForcedSleeping
  name: status-effect-misc-forced-sleep # Starlight: Localize
  components:
  # Starlight START
  - type: StatusEffect
    whitelist:
      components:
        - MobState
    maximumDuration: 2m # <-- The only change relative to parent component definition
  # Starlight END
  - type: ForcedSleepingStatusEffect
  - type: StunnedStatusEffect
  - type: KnockdownStatusEffect

# This creature is asleep because it's disconnected from the game.
- type: entity
  parent: MobStatusEffectBase # Not even rejuvenate can cure SSD...
  id: StatusEffectSSDSleeping
  name: status-effect-misc-ssd-sleep # Starlight: Localize
  components:
  - type: ForcedSleepingStatusEffect
  - type: StunnedStatusEffect
  - type: KnockdownStatusEffect

# Blurs your vision and makes you randomly fall asleep
- type: entity
  parent: MobStatusEffectDebuff
  id: StatusEffectDrowsiness
  name: status-effect-misc-drowsiness # Starlight: Localize
  components:
  - type: DrowsinessStatusEffect
  # Starlight START
  - type: StatusEffect
    whitelist:
      components:
      - MobState
    maximumDuration: 3m # <-- The only change relative to parent component definition
  # Starlight END

# Adds drugs overlay
- type: entity
  parent: MobStatusEffectDebuff
  id: StatusEffectSeeingRainbow
  name: status-effect-misc-hallucinations # Starlight: Localize
  components:
  - type: SeeingRainbowsStatusEffect
  # Starlight START
  - type: StatusEffect
    whitelist:
      components:
        - MobState
    maximumDuration: 25m # <-- The only change relative to parent component definition
  # Starlight END

# Causes your vision to become blurry and gives me a headache.
- type: entity
  parent: MobStatusEffectDebuff
  id: StatusEffectWoozy
  name: status-effect-misc-woozy # Starlight: Localize
  components:
  - type: DrunkStatusEffect
  # Starlight START
  - type: StatusEffect
    whitelist:
      components:
        - MobState
    maximumDuration: 25m # <-- The only change relative to parent component definition
  # Starlight END

# Causes you to get drunk
- type: entity
  parent: [ StatusEffectWoozy, StatusEffectSlurred ]
  id: StatusEffectDrunk
  name: status-effect-misc-drunk # Starlight: Localize
