# Base

- type: entity
  id: SpawnPointJobBase
  parent: MarkerBase
  abstract: true
  suffix: Job Spawn
  components:
  - type: SpawnPoint
    spawn_type: Job
  - type: Sprite
    sprite: Markers/jobs.rsi

- type: entity
  name: observer spawn point
  id: SpawnPointObserver
  parent: MarkerBase
  components:
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
      - state: green
      - sprite: Mobs/Ghosts/ghost_human.rsi
        state: icon
    state: observer
  - type: SpawnPoint
    spawn_type: Observer

- type: entity
  name: latejoin spawn point
  id: SpawnPointLatejoin
  parent: SpawnPointJobBase
  components:
  - type: Sprite
    # Starlight Edit Start: Added layers and jobicon
    layers:
      - state: green
      - state: jobicon
    # Starlight Edit End: Added layers and jobicon
  - type: SpawnPoint
    spawn_type: LateJoin

- type: entity
  name: any job spawn point
  id: SpawnPointAnyJob # used for integration tests so we don't need to map every single job spawner on the test map
  parent: SpawnPointJobBase
  components:
  - type: Sprite
    # Starlight Edit Start: Added layers and jobicon
    layers:
      - state: green
      - state: jobicon
    # Starlight Edit End: Added layers and jobicon
  - type: SpawnPoint
    spawn_type: Job
    job_id: null # any job can spawn here

