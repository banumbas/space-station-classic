- type: entity
  parent: BaseMachinePowered
  id: FaxMachineBase
  name: long range fax machine
  description: Bluespace technologies on the application of bureaucracy.
  components:
  - type: Sprite
    sprite: Structures/Machines/fax_machine.rsi
    drawdepth: SmallObjects
    layers:
    - state: icon
      map: [ "enum.FaxMachineVisuals.VisualState" ]
  - type: Icon
    sprite: Structures/Machines/fax_machine.rsi
    state: icon
  - type: Appearance
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 25
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer
  - type: ActivatableUI
    key: enum.FaxUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
      enum.FaxUiKey.Key:
        type: FaxBoundUi
      enum.FaxMachineConfigureUiKey.Key: # Starlight
        type: FaxMachineConfigureBoundUserInterface # Starlight
  - type: StationAiWhitelist
  - type: ApcPowerReceiver
    powerLoad: 250
  - type: Faxecute
    damage:
      types:
        Blunt: 100
  - type: FaxMachine
    paperSlot:
      insertSound: /Audio/Machines/scanning.ogg
      ejectSound: /Audio/Machines/tray_eject.ogg
      whitelist:
        components:
          - FaxableObject #used to be PaperComponent - brainfood1183
      # Starlight-edit: removed blacklist
      #      blacklist:
      #        components:
      #          - CargoSlip

  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.FaxMachineVisuals.VisualState:
          True: { state: idle }
          False: { state: icon }
      enum.FaxMachineVisuals.VisualState:
        enum.FaxMachineVisuals.VisualState:
          Printing: { state: printing }
          Normal: {state: idle}
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      Paper: !type:ContainerSlot
  - type: DeviceNetworkRequiresPower
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: Fax
    transmitFrequencyId: Fax
  - type: RequireProjectileTarget

# Special
- type: entity
  parent: FaxMachineCentralCommandBase # Starlight
  id: FaxMachineCentcom
  #name: long range fax machine # Starlight: Inherit name
  suffix: "CC: Central Command" # Starlight
  components:
  # Starlight: No Sprite override
  - type: FaxMachine
    group: FaxGroupCentralCommand # Starlight
    intrinsicGroup: FaxGroupCentralCommand # Starlight
    order: 100 # Starlight
    name: "Central Command"
    notifyAdmins: true

- type: entity
  parent: FaxMachineSyndicateBase # Starlight
  id: FaxMachineSyndie
  #name: syndicate long range fax machine # Starlight: Inherit name
  suffix: "Syndicate: ERR*?*%!" # Starlight
  components:
  # Starlight: No Sprite override
  - type: FaxMachine
    name: "ERR*?*%!"
    group: FaxGroupSyndicate # Starlight
    order: 200 # Starlight
    responsePings: false
    notifyAdmins: true
  - type: Emagged
    emagType: Interaction

- type: entity
  parent: FaxMachineCommandBase # Starlight
  id: FaxMachineCaptain
  #name: captain long range fax machine # Starlight: Inherit name
  suffix: "CMD: Captain, NukeCodes" # Starlight
  components:
    - type: FaxMachine
      group: FaxGroupCommand # Starlight
      order: 200 # Starlight
      name: "Captain"
      receiveNukeCodes: true
    - type: StealTarget
      stealGroup: FaxMachineCaptain
