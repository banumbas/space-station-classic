- type: entity
  parent: ComputerSurveillanceWirelessCameraMonitor
  id: ComputerTelevision
  name: wooden television
  description: Finally, some decent reception around here...
  components:
  - type: Sprite
    noRot: true
    drawdepth: SmallObjects
    layers:
    - map: ["computerLayerBody"]
      state: television
    - map: ["computerLayerScreen"]
      state: detective_television
  - type: Computer
    board: ComputerTelevisionCircuitboard
  # Starlight Start
  - type: GenericVisualizer  # Override to prevent edge connection sprites
    visuals:
      enum.EdgeConnectionVisuals.ConnectionMask:
        console:
          None: { state: television}
  # Starlight End
  - type: PointLight
    radius: 2.0 #SL Edit
    energy: 1.5 #SL Edit
    color: "#b89f25"
    castShadows: false #SL lighting optimization
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 200
        mask:
          - TabletopMachineMask
        layer:
          - TabletopMachineLayer
