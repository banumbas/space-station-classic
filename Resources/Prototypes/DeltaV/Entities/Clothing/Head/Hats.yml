#Autodrobe
- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHatWrestlingMaskLuchaBlue
  name: blue lucha libre mask
  description: Don't touch the mask
  components:
    - type: Sprite
      sprite: DeltaV/Clothing/Head/Hats/WrestlerMaskLuchaBlue.rsi
    - type: HideLayerClothing
      slots:
        - Hair

- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHatWrestlingMaskLuchaRed
  name: red lucha libre mask
  description: The luchador never removes his mask
  components:
    - type: Sprite
      sprite: DeltaV/Clothing/Head/Hats/WrestlerMaskLuchaRed.rsi
    - type: HideLayerClothing
      slots:
        - Hair

#Duty officer
- type: entity
  parent: [ClothingHeadBase, BaseSecurityContraband]
  id: ClothingHeadHatDutyOfficerOrange
  name: duty officer's orange cap
  description: The orange hat signifies your superiority towards the poor inmates that have to stand you.
  components:
    - type: Sprite
      sprite: DeltaV/Clothing/Head/Hats/prisonguard.rsi

#HoP
- type: entity
