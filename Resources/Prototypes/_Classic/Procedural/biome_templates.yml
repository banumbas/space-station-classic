- type: biomeTemplate
  id: GrasslandsClassic
  layers:
    # Sparse vegetation
    - !type:BiomeDecalLayer
      allowedTiles:
        - ClassicGrass
      divisions: 2
      threshold: -0.50
      noise:
        seed: 0
        noiseType: Cellular
        frequency: 1
      decals:
        - BushDOne
        - BushDTwo
        - BushDThree
    - !type:BiomeDecalLayer
      allowedTiles:
        - ClassicGrass
      noise:
        seed: 0
        noiseType: OpenSimplex2
        frequency: 1
      divisions: 1
      threshold: 0.8
      decals:
        - FlowersBROne
        - FlowersBRTwo
        - FlowersBRThree
    # Dense vegetation
    - !type:BiomeDecalLayer
      allowedTiles:
      - ClassicGrass
      divisions: 1
      threshold: -0.35
      noise:
        seed: 0
        noiseType: Cellular
        frequency: 0.2
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        cellularDistanceFunction: Euclidean
        cellularReturnType: Distance2
      decals:
        - BushAOne
        - BushATwo
        - BushAThree
        - BushCOne
        - BushCTwo
        - BushCThree
    - !type:BiomeEntityLayer
      threshold: 0.5
      noise:
        seed: 0
        noiseType: OpenSimplex2
        fractalType: FBm
        frequency: 2
      allowedTiles:
        - ClassicGrass
      entities:
        - FloraTree
        - FloraTreeLarge
    # Rock formations
    - !type:BiomeEntityLayer
      allowedTiles:
        - ClassicGrass
        - ClassicDirt
      threshold: -0.30
      noise:
        seed: 0
        noiseType: Cellular
        frequency: 0.05
        lacunarity: 2
        fractalType: FBm
        octaves: 5
        cellularDistanceFunction: Euclidean
        cellularReturnType: Distance2
      entities:
        - WallRock
    - !type:BiomeDummyLayer
      id: Loot
    # Classic-Start
    - !type:BiomeEntityLayer
      threshold: 0.985
      noise:
        seed: 37
        noiseType: OpenSimplex2
        frequency: 0.65
      allowedTiles:
        - ClassicGrass
        - ClassicDirt
      entities:
        - ClassicGeyserOutletSteam
    # Classic-End
    # Water
    - !type:BiomeEntityLayer
      allowedTiles:
        - ClassicGrass
        - ClassicDirt
      threshold: 0.95
      noise:
        seed: 3
        noiseType: OpenSimplex2
        frequency: 0.003
        lacunarity: 1.50
        fractalType: Ridged
        octaves: 1
      entities:
        - ClassicWater
    # Fill remainder with dirt.
    - !type:BiomeTileLayer
      threshold: -1.0
      tile: ClassicDirt
    - !type:BiomeTileLayer
      threshold: -0.90
      tile: ClassicGrass
      noise:
        seed: 0
        frequency: 0.02
        fractalType: None
    # Water sand
    - !type:BiomeTileLayer
      tile: ClassicDirt
      threshold: 0.95
      noise:
        seed: 3
        noiseType: OpenSimplex2
        frequency: 0.003
        lacunarity: 1.50
        fractalType: Ridged
        octaves: 1
    # Rock formation sand
    - !type:BiomeTileLayer
      tile: ClassicDirt
      threshold: -0.30
      noise:
        seed: 0
        noiseType: Cellular
        frequency: 0.05
        lacunarity: 2
        fractalType: FBm
        octaves: 5
        cellularDistanceFunction: Euclidean
        cellularReturnType: Distance2
