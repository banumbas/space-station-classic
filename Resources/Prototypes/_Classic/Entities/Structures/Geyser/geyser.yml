- type: entity
  abstract: true
  id: ClassicGeyserOutletBase
  name: rusty geyser outlet
  description: A rusted pipe sunk deep into the planet crust.
  categories: [ ForkFiltered ]
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Transform
    anchored: true
    noRot: true
  - type: Sprite
    sprite: _Classic/Structures/Piping/pipe_geyser.rsi
    state: icon
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 200
        hard: false
        mask:
        - MachineMask

- type: entity
  parent: ClassicGeyserOutletBase
  id: ClassicGeyserOutletSteam
  suffix: Steam
  categories: [ ForkFiltered ]
  components:
  - type: ClassicGeyserOutlet
    mistPrototype: ClassicGeyserSteamMist
    flashPrototype: ClassicGeyserSteamFlash
    generatorSupply: 5000000
    generatorOutputDuration: 15
    minDormantTime: 35
    maxDormantTime: 70
    eruptionDuration: 8

- type: entity
  parent: ClassicGeyserOutletBase
  id: ClassicGeyserOutletPlasma
  suffix: Plasma, Snow
  categories: [ ForkFiltered ]
  components:
  - type: ClassicGeyserOutlet
    mistPrototype: ClassicGeyserPlasmaMist
    flashPrototype: ClassicGeyserPlasmaFlash
    leavesSnowScars: true
    generatorSupply: 12000000
    generatorOutputDuration: 21
    minDormantTime: 40
    maxDormantTime: 80
    eruptionDuration: 8

- type: entity
  parent: [ BaseMachine, ConstructibleMachine ]
  id: ClassicGeyserGenerator
  name: geyser generator
  description: A battered thermoelectric generator that drinks heat from geyser eruptions and pushes it into HV cables.
  categories: [ ForkFiltered ]
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
    noRot: true
  - type: Sprite
    sprite: _Classic/Structures/Power/Generation/geyser_generator.rsi
    state: generator
  - type: NodeContainer
    examinable: true
    nodes:
      output:
        !type:CableDeviceNode
        nodeGroupID: HVPower
  - type: PowerSupplier
    supplyRate: 0
    supplyRampRate: 50000000
    supplyRampTolerance: 1000000
    enabled: false
  - type: Machine
    board: ClassicGeyserGeneratorMachineCircuitboard
  - type: ClassicGeyserGenerator
  - type: PowerMonitoringDevice
    group: Generator
    loadNode: output
    sprite: _Classic/Structures/Power/Generation/geyser_generator.rsi
    state: generator
    collectionName: Geyser
  - type: Electrified
    onHandInteract: false
    onInteractUsing: false
    onBump: false
    requirePower: true
    highVoltageNode: output

- type: entity
  abstract: true
  id: ClassicGeyserMistBase
  categories: [ HideSpawnMenu, ForkFiltered ]
  components:
  - type: TimedDespawn
    lifetime: 8
  - type: Transform
    anchored: true
    noRot: true
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: _Classic/Effects/smoke.rsi
      state: smoke
      scale: 1.45, 1.45
      color: "#f0f6ffaa"
  - type: EffectVisuals
  - type: AnimationPlayer
  - type: ClassicTemperatureMist
    radius: 0.85
    heatPerSecond: 30000
    tickInterval: 1
    damage:
      types:
        Heat: 2
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  parent: ClassicGeyserMistBase
  id: ClassicGeyserSteamMist
  name: superheated steam
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: _Classic/Effects/smoke.rsi
      state: smoke
      scale: 1.45, 1.45
      color: "#f0f6ffaa"
  - type: ClassicTemperatureMist
    radius: 0.85
    heatPerSecond: 30000
    damage:
      types:
        Heat: 2

- type: entity
  parent: ClassicGeyserMistBase
  id: ClassicGeyserPlasmaMist
  name: overheated plasma haze
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: _Classic/Effects/smoke.rsi
      state: smoke
      scale: 1.55, 1.55
      color: "#c24dffcc"
  - type: PointLight
    enabled: true
    radius: 1.3
    energy: 1.2
    color: "#B84CFF"
  - type: ClassicTemperatureMist
    radius: 0.9
    heatPerSecond: 60000
    damage:
      types:
        Heat: 4

- type: entity
  id: ClassicGeyserSteamFlash
  categories: [ HideSpawnMenu, ForkFiltered ]
  components:
  - type: PointLight
    enabled: true
    radius: 3
    energy: 6
    color: "#DDF4FF"
  - type: LightFade
    duration: 0.8
  - type: TimedDespawn
    lifetime: 0.8

- type: entity
  id: ClassicGeyserPlasmaFlash
  categories: [ HideSpawnMenu, ForkFiltered ]
  components:
  - type: PointLight
    enabled: true
    radius: 4
    energy: 9
    color: "#A93DFF"
  - type: LightFade
    duration: 0.9
  - type: TimedDespawn
    lifetime: 0.9
