- type: entity
  id: FultonSensorTower
  parent: BaseMachinePowered
  name: fulton sensor tower
  description: A powered cargo sensor tower that authorizes cargo fulton sales nearby.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Classic/Structures/Machines/sensor_tower.rsi
    drawdepth: Mobs
    noRot: true
    offset: 0, 2
    layers:
    - state: sensor_off
      map: [ "base" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        base:
          True: { state: sensor }
          False: { state: sensor_off }
  - type: FultonSensorTower
    range: 10
  - type: PointLight
    enabled: false
    castShadows: false
    radius: 3
    energy: 2
    color: "#5ec8ff"
  - type: LitOnPowered
  - type: ApcPowerReceiver
    powerLoad: 350
  - type: Transform
    anchored: true
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          FultonSensorTowerBroken:
            min: 1
            max: 1
        offset: 0
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  id: FultonSensorTowerBroken
  parent: BaseMachine
  name: broken fulton sensor tower
  description: A damaged cargo sensor tower. It can be repaired with a welding tool.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Classic/Structures/Machines/sensor_tower.rsi
    drawdepth: Mobs
    noRot: true
    offset: 0, 2
    layers:
    - state: sensor_broken
  - type: Transform
    anchored: true
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Construction
    graph: FultonSensorTowerRepair
    node: broken

- type: constructionGraph
  id: FultonSensorTowerRepair
  start: broken
  graph:
  - node: broken
    entity: FultonSensorTowerBroken
    edges:
    - to: repaired
      steps:
      - tool: Welding
        doAfter: 8
      completed:
      - !type:SpawnPrototype
        prototype: FultonSensorTower
      - !type:DeleteEntity {}
  - node: repaired
    entity: FultonSensorTower
