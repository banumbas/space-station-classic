- type: entity
  parent: Grille
  id: ClassicGrilleWindow
  name: grille window
  description: A flimsy framework of iron rods.
  components:
    - type: Sprite
      drawdepth: Overdoors
      sprite: _Classic/Structures/Walls/window_grille.rsi
      layers:
        - state: electrified
          sprite: Effects/electricity.rsi
          map: ["enum.ElectrifiedLayers.Sparks"]
          shader: unshaded
          visible: false
    - type: Icon
      sprite: _Classic/Structures/Walls/window_grille.rsi
      state: full
    - type: IconSmooth
      key: walls
      base: wgrille
