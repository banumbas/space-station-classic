- type: entity
  id: ClassicWaterLilies
  parent: BaseStructureDynamic
  name: water lilies
  description: Wow, these are plants that don't grow on land, but on water! Nature is amazing.
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    snapCardinals: true
    drawdepth: Mobs
    sprite: _Classic/Structures/Nature/water_lilies.rsi
    layers:
      - state: small1
        map: ["random"]
  - type: Transform
    anchored: false
  - type: Physics
    canCollide: false
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 60
        mask:
        - HalfWallLayer
        layer:
        - MidImpassable
        - LowImpassable
  - type: RandomSprite
    available:
    - random:
        small1: ""
        small2: ""
        small3: ""
        small4: ""
        small5: ""
        small6: ""
        small7: ""
        small8: ""
        big1: ""
        big2: ""
        big3: ""
        big4: ""
        small_flower1: ""
        small_flower2: ""
        small_flower3: ""
        small_flower4: ""
        big_flower1: ""
        big_flower2: ""
        big_flower3: ""
        big_flower4: ""

