# Invisible supply pod delivery pad for cargo orders.
# This entity is invisible to normal players but visible to admins with "Show Spawns" enabled.
# Cargo orders are delivered via supply pods to this location.

- type: entity
  id: ClassicSupplyPodDeliveryPad
  name: SupplyPod Delivery Pad
  description: An invisible marker where supply pods deliver cargo orders. Only visible to admins.
  parent: MarkerBase
  suffix: SupplyPod Delivery
  components:
  - type: ClassicSupplyPodDeliveryPad
  - type: Sprite
    drawdepth: Overdoors
    sprite: Markers/cross.rsi
    state: blue
  - type: Clickable
  - type: InteractionOutline
