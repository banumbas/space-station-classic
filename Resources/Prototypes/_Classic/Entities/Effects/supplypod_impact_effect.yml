# Impact effect spawned when a supply pod lands.
# Provides a brief flash of light and rubble sprite at the landing location.
- type: entity
  id: ClassicSupplyPodImpactEffect
  name: impact effect
  categories: [ HideSpawnMenu ]
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    drawdepth: Effects
    sprite: _Classic/Structures/Storage/SupplyPods/supply_pod_default.rsi
    state: rubble_overlay
    color: "#FFFFFFFF"
  - type: TimedDespawn
    lifetime: 3
  - type: PointLight
    radius: 3
    energy: 5
    color: "#FFAA44"
  - type: AnimationPlayer
