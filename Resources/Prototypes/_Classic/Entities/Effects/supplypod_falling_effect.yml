# Client-side falling animation effect for supply pods.
# Spawned by ClassicSupplyPodSystem (client) when a ClassicSupplyPodFallEvent
# is received. The SpriteComponent uses supplypod_falling.rsi which contains
# the built-in falling animation (20 frames). The client sets the appropriate
# RSI state per visual variant. No manual AnimationPlayer is needed — the RSI
# animation plays automatically via the sprite layer.
- type: entity
  id: SupplyPodFallingEffect
  name: falling supply pod
  categories: [ HideSpawnMenu ]
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    noRot: true
    drawdepth: Overdoors
    sprite: _Classic/Effects/supplypod_falling.rsi
    state: default_falling_animation
  - type: TimedDespawn
    lifetime: 4 # Animation is ~2.18s (2s + 19*0.009s); pad to ensure it finishes
