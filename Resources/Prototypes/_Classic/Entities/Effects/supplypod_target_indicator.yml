- type: entity
  id: ClassicSupplyPodTargetIndicator
  name: supply pod beacon
  description: A warning marker indicating an incoming supply pod landing.
  categories: [ HideSpawnMenu, ForkFiltered ]
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    drawdepth: Effects
    sprite: _Classic/Effects/alert.rsi
    noRot: true
    state: alert_greyscale
    color: "#ff0000"
  - type: TimedDespawn
    lifetime: 5
