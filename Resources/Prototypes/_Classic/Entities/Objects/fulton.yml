- type: entity
  id: CargoFulton
  parent: BaseItem
  suffix: Full
  name: cargo fulton
  description: A fulton pack tuned to sell extracted cargo through an active sensor tower.
  categories: [ ForkFiltered ]
  components:
  - type: ClassicCargoFulton
    requiresSensorTower: true
  - type: Item
    size: Normal
    inhandVisuals:
      left:
      - state: inhand-left-fulton
      right:
      - state: inhand-right-fulton
  - type: UserInterface
    interfaces:
      enum.StackCustomSplitUiKey.Key:
        type: StackCustomSplitBoundUserInterface
  - type: Stack
    stackType: CargoFulton
    count: 10
  - type: Sprite
    drawdepth: SmallObjects
    sprite: Objects/Tools/fulton.rsi
    state: extraction_pack
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]

- type: entity
  id: CargoFulton1
  parent: CargoFulton
  name: cargo fulton
  suffix: One
  categories: [ ForkFiltered ]
  components:
  - type: Stack
    count: 1
