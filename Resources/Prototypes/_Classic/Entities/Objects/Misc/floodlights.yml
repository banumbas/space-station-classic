- type: entity
  parent: BaseStructure
  id: ClassicTallFloodlight
  name: tall floodlight
  description: A pillar of light in the darkness.
  categories: [ ForkFiltered ]
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Anchorable
    flags:
    - Anchorable
  - type: Sprite
    noRot: true
    sprite: _Classic/Objects/Misc/Lights/floodlightbig.rsi
    layers:
      - state: bigflood
      - state: bigfloodon
        visible: true
        map: [ "light" ]
    offset: "0.0,0.5"
    drawdepth: Mobs
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
  - type: PointLight
    enabled: true
    radius: 5.5
    netsync: false
    energy: 1
    color: "#fff9c1"
    mask: /Textures/_Classic/Effects/LightMasks/quad_cone.png
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 50
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Appearance
  - type: ToggleableVisuals
    spriteLayer: light
  - type: RequireProjectileTarget

- type: entity
  parent: ClassicTallFloodlight
  id: ClassicStreetlight
  name: streetlight
  categories: [ ForkFiltered ]
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        density: 50
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Sprite
    noRot: true
    sprite: _Classic/Objects/Misc/Lights/streetlight.rsi
    offset: 0.0,0.8
    layers:
      - state: street_on
        visible: true
        map: [ "light" ]
    drawdepth: Mobs
