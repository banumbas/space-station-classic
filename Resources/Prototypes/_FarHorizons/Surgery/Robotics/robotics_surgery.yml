- type: entity
  parent: SurgeryBase
  id: SurgeryRemovePlating
  name: Remove Outer Plating
  description: Removes the protective outer plating.
  components:
  - type: Surgery
    priority: -100
    steps:
    - SurgeryStepRemoveScrews
    - SurgeryStepUnweldJoints
    - SurgeryStepPryPlating
  - type: SurgerySpeciesCondition
    speciesBlacklist: []
    speciesWhitelist:
    - IPC

- type: entity
  parent: SurgeryBase
  id: SurgeryRestorePlating
  name: Restore Outer Plating
  description: Restores the protective outer plating.
  components:
  - type: Surgery
    priority: 100
    requirement:
    - SurgeryRemovePlating
    steps:
    - SurgeryStepPositionPlating
    - SurgeryStepRestoreScrews
    - SurgeryStepWeldJoints
  - type: SurgerySpeciesCondition
    speciesBlacklist: []
    speciesWhitelist:
    - IPC

- type: entity
  parent: SurgeryBase
  id: SurgeryAmputationRobot
  name: Amputation
  description: Surgical removal of a limb.
  components:
  - type: Surgery
    requirement:
    - SurgeryRemovePlating
    steps:
    - SurgeryStepRemoveInnerScrews
    - SurgeryStepExposeWiringConnections
    - SurgeryStepExposeCoolantChannels
    - SurgeryStepRobotAmputation
  - type: SurgerySpeciesCondition
    speciesBlacklist: []
    speciesWhitelist:
    - IPC
  - type: SurgeryPartCondition
    parts:
    - Arm
    - Hand
    - Leg
    - Foot
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/saw.rsi
    state: saw

- type: entity
  parent: SurgeryAmputationRobot
  id: SurgeryAmputationHeadRobot
  name: Amputation
  description: Surgical removal of a head.
  components:
  - type: Surgery
    requirement:
    - SurgeryRemovePlating
    steps:
    - SurgeryStepRemoveInnerScrews
    - SurgeryStepRemoveInnerPlating
    - SurgeryStepExposeWiringConnections
    - SurgeryStepExposeCoolantChannels
    - SurgeryStepUnweldSkull
  - type: SurgeryPartCondition
    parts:
    - Head
  - type: SurgerySpeciesCondition
    speciesBlacklist: []
    speciesWhitelist:
    - IPC

- type: entity
  parent: SurgeryBase
  id: SurgeryLimbAttachmentHeadRobot
  name: Limb Attachment Head
  description: Surgical attachment of a limb.
  components:
  - type: Surgery
    requirement:
    - SurgeryRemovePlating
    steps:
    - SurgeryStepExposeWiringConnections
    - SurgeryStepExposeCoolantChannels
    - SurgeryLimbAttachmentStep
    - SurgeryStepConnectWiringConnections
    - SurgeryStepConnectCoolantChannels
    - SurgeryStepRestoreInnerScrews
  - type: SurgerySpeciesCondition
    speciesBlacklist: []
    speciesWhitelist:
    - IPC
  - type: SurgeryLimbSlotCondition
    slot: head
  - type: Sprite
    sprite: Objects/Specific/Medical/medical.rsi
    state: medicated-suture

