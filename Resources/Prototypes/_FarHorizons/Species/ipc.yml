- type: species
  id: IPC
  name: species-name-ipc
  roundStart: true
  prototype: MobIPC
  sprites: MobIPCSprites
  defaultSkinTone: "#ffda93"
  markingLimits: MobIPCMarkingLimits
  dollPrototype: AppearanceIPC
  skinColoration: Hues
  customName: true
  roundstartCyberwareCapacity: 6
  sexes:
  - Male
  - Female
  - Unsexed

- type: speciesBaseSprites
  id: MobIPCSprites
  sprites:
    Head: MobIPCHead
    Snout: MobHumanoidAnyMarking
    Chest: MobIPCTorso
    HeadTop: MobHumanoidAnyMarking
    Eyes: MobIPCEyes
    LArm: MobIPCLArm
    RArm: MobIPCRArm
    LHand: MobIPCLHand
    RHand: MobIPCRHand
    LLeg: MobIPCLLeg
    RLeg: MobIPCRLeg
    LFoot: MobIPCLFoot
    RFoot: MobIPCRFoot

- type: markingPoints
  id: MobIPCMarkingLimits
  points:
    HeadTop:
      points: 1
      required: false
    Hair:
      points: 0
      required: false
    FacialHair:
      points: 0
      required: false
    Head:
      points: 1
      required: false
      defaultMarkings: [ MarkingStandardHead ]
    Eyes:
      points: 1
      required: false
    Chest:
      points: 1
      required: false
      defaultMarkings: [ MarkingStandardChest ]
    Legs: # Default arms continue to overlay. A fix would be easy if left and right legs were distinct marking categories, and if feet and legs were similarly so.
      points: 4
      required: false
    Arms: # Default arms continue to overlay. A fix would be easy if left and right arms were distinct marking categories, and if arms and hands were similarly so.
      points: 4
      required: false

- type: humanoidBaseSprite
  id: MobIPCEyes
  baseSprite:
    sprite: _FarHorizons/Mobs/Species/IPC/parts.rsi
    state: light

