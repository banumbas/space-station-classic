- type: body
  id: IPC
  name: "IPC"
  root: torso
  slots:
    head:
      part: HeadIPC
      connections:
      - torso
      organs: # No brain in head, brain is handled by IPCBrain component
        eyes: OrganIPCEyes
        tongue: OrganIPCTongue
        eye_implant: null
    torso:
      part: TorsoIPC
      connections:
      - right arm
      - left arm
      - right leg
      - left leg
      organs:
        heart: OrganIPCHeart
        cavity: null
    right arm:
      part: RightArmIPC
      connections:
      - right hand
    left arm:
      part: LeftArmIPC
      connections:
      - left hand
    right hand:
      part: RightHandIPC
    left hand:
      part: LeftHandIPC
    right leg:
      part: RightLegIPC
      connections:
      - right foot
    left leg:
      part: LeftLegIPC
      connections:
      - left foot
    right foot:
      part: RightFootIPC
    left foot:
      part: LeftFootIPC