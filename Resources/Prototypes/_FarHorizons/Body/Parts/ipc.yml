- type: entity
  id: PartIPC
  parent: [BaseItem, BasePart]
  name: "IPC body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Oil
        Quantity: 10

- type: entity
  id: TorsoIPC
  name: "IPC torso"
  parent: [PartIPC, BaseTorso]
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/IPC/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Oil
        Quantity: 20

- type: entity
  id: HeadIPC
  name: "IPC head"
