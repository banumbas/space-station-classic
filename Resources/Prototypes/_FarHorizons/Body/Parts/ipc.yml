        Quantity: 10

- type: entity
  id: LeftArmIPC
  name: "left IPC arm"
  parent: [PartIPC, BaseLeftArm]
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/IPC/parts.rsi
    state: "l_arm"
  - type: HumanoidEMPCompositeElement
    effect:
      dropItemsFrom:
      - body_part_slot_left hand
      damageAmount:
        types:
          Shock: 3
          Heat: 1

