- type: entity
  id: PartProtogen
  parent: [BaseItem, BasePart]
  name: protogen body part # Starlight, quotation marks removed
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: BatteryAcid # Starlight, juicy
        Quantity: 5 # Starlight
      - ReagentId: Blood
        Quantity: 10

- type: entity
  id: TorsoProtogen
  name: protogen torso # Starlight, quotation marks removed
  parent: [PartProtogen, BaseTorso]
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/Protogen/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: BatteryAcid # Starlight, juicy
        Quantity: 15 # Starlight
      - ReagentId: Blood
        Quantity: 20

- type: entity
  id: HeadProtogen
  name: protogen head # Starlight, quotation marks removed
  parent: [PartProtogen, BaseHead]
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/Protogen/parts.rsi
    state: "head_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 5
      - ReagentId: BatteryAcid # Starlight, juicy
        Quantity: 5 # Starlight
      - ReagentId: Blood
        Quantity: 10

