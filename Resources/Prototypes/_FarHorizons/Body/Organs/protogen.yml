- type: entity
  id: OrganProtogenStomach
  parent: [OrganAnimalStomach, BaseOrganStomach]
  name: biological reactor # Starlight, capitalization
  description: Some call it over-engineered, but it's vital to the function of a protogen. Turns organic matter into organic and electrical energy to power the protogen's cybernetics and flesh. #  Starlight, quotation marks removed
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/Protogen/organs.rsi
    state: stomach
  - type: Item
    size: Small
    heldPrefix: stomach
  - type: Stomach
    specialDigestible:
      tags:
      - RamChip
    isSpecialDigestibleExclusive: false
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5

- type: entity
  id: OrganProtogenLiver
  parent: [BaseProtogenOrgan, BaseOrganLiver]
  name: cybernetic liver # Starlight, capitalization
  description: Pairing suggestion, a side of fermented RAM sticks and a nice CPU. # Starlight, quotation marks removed
  components:
  - type: Sprite
    state: liver
  - type: Item
    size: Small
    heldPrefix: liver
  - type: Metabolizer
    maxReagents: 1
    metabolizerTypes: [Protogen]
    groups:
    - id: Alcohol
#      rateModifier: 0.1 # Starlight, not needed, makes them drunk forever.

- type: entity
  id: OrganProtogenKidneys
  parent: [BaseProtogenOrgan, BaseOrganKidneys]
  name: cybernetic kidneys # Starlight, capitalization
  description: Pumps toxins out of the bloodstream and serves as a minor biological battery for electrical components #  Starlight, quotation marks removed
  components:
  - type: Sprite
    layers:
    - state: kidney-l
    - state: kidney-r
  - type: Item
    size: Small
    heldPrefix: kidneys
  - type: Metabolizer
    maxReagents: 5
    metabolizerTypes: [Protogen]
    removeEmpty: true

