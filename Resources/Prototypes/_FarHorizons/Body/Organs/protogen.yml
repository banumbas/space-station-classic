# TODO - Sprite Avali Protogen organs. Basically the same as the blue ones but darker and yellow- 100% a cosmetic thing.

- type: entity
  id: BaseProtogenOrgan # Starlight, no Gibbable type, so we'll use this as the top
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/Protogen/organs.rsi
  - type: Organ
  - type: Edible
  - type: Extractable
    grindableSolutionName: organ
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: FlavorProfile
    flavors:
      - people
  - type: Tag
    tags:
      - Meat


- type: entity
  id: OrganProtogenBrain
  parent: [BaseOrganBrain, BaseProtogenOrgan] # Starlight UnGibbable -> BaseProtogenOrgan
  name: cybernetic brain # Starlight, capitalization
  description: The source of incredible, unending intelligence. 01201020 02102111 01201210 02121012 20121210 #  Starlight, quotation marks removed
  components:
  - type: Sprite
    state: brain

- type: entity
  id: OrganProtogenEyes
  parent: [BaseProtogenOrgan, BaseOrganEyes]
  name: cybernetic eyes # Starlight, capitalization
  description: It's still focusing on you.. Creepy. #  Starlight, quotation marks removed
  components:
  - type: Sprite
    layers:
    - state: eyeball-l
    - state: eyeball-r
  - type: Item
    size: Small
    heldPrefix: eyeballs
  - type: OrganVisualization
    layer: Eyes
    prototypes: # Starlight
          Default: MobHumanoidEyes # Starlight

- type: entity
  id: OrganProtogenTongue
  parent: [BaseProtogenOrgan, BaseOrganTongue]
  name: cybernetic tongue # Starlight, capitalization
  description: A completely glowing organ commonly used for lying or self-expression. Sometimes both. #  Starlight, quotation marks removed
  components:
  - type: Sprite
    state: tongue

- type: entity
  id: OrganProtogenTongueForked
  parent: [BaseProtogenOrgan, BaseOrganTongue]
  name: forked cybernetic tongue # Starlight, capitalization
  description: A completely glowing organ commonly used for lying or self-expression. Sometimes both. Now split in two. #  Starlight, quotation marks removed
  components:
  - type: Sprite
    state: tongueforked

- type: entity
  id: OrganProtogenEars
  parent: [BaseProtogenOrgan, BaseOrganEars]
  name: cybernetic ears # Starlight, capitalization
  description: Process audio at a higher quality than most humanoids, allowing for greater appreciation of techno music #  Starlight, quotation marks removed
  components:
  - type: Sprite
    state: ears

- type: entity
  id: OrganProtogenLungs
  parent: [BaseProtogenOrgan, BaseOrganLungs]
  name: cybernetic lungs # Starlight, capitalization
  description: Filters oxygen from an atmosphere, which is then sent into the bloodstream to be used as an electron carrier. Entirely cybernetic in nature, working in tandem with the visor's filtration system. #  Starlight, quotation marks removed
  components:
  - type: Sprite
    layers:
    - state: lung-l
    - state: lung-r
  - type: Item
    size: Small
    heldPrefix: lungs
  - type: Lung
  - type: Metabolizer
    removeEmpty: true
    solutionOnBody: false
    solution: Lung
    metabolizerTypes: [ Protogen ]
    groups:
    - id: Gas
      rateModifier: 100.0
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      Lung:
        maxVol: 100.0
        canReact: false
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5

- type: entity
  id: OrganProtogenHeart
  parent: [BaseProtogenOrgan, BaseOrganHeart]
  name: cybernetic heart # Starlight, capitalization
  description: Doesn't actually need to beat, simply mimics the movement to provide comfort for the user. #  Starlight, quotation marks removed
  components:
  - type: Sprite
    state: heart-on
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [Protogen]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic
  - type: Item
    size: Small
    heldPrefix: heart

