- type: entity
  name: Oil Pack
  description: Contains Oil. Pretty simple compared to other packs.
  parent: BaseHealingItem
  id: OilPack
  suffix: Full
  components:
  - type: Item
    heldPrefix: bloodpack
  - type: Tag
    tags:
    - OilPack
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/medical.rsi
    state: oilpack
  - type: Healing
    damageContainers:
      - IPC
    damage:
      types:
        Bloodloss: -3 #lowers bloodloss damage
    delay: 1.6
    modifyBloodLevel: 15 #restores about 5% blood per use on standard humanoids.
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: OilPack
    count: 10
  - type: StackPrice
    price: 10

- type: entity
  parent: OilPack
  id: OilPack1
  suffix: Single
  components:
  - type: Stack
    stackType: OilPack
    count: 1
