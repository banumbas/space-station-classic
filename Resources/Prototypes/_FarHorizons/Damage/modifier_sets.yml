- type: damageModifierSet
  id: StructuralReactorCasing # StructuralMetallicStrong(er), it's going to take more than a mere baseball bat to do any real damage
  coefficients:
    Blunt: 0.1          # you
    Slash: 0.1          # aint
    Piercing: 0.1       # gonna
    Shock: 0.2          # do
    Heat: 0.1           # shit
    Structural: 0.25
  flatReductions:
    Blunt: 10
    Slash: 10
    Piercing: 10
    Heat: 10
    Structural: 10
