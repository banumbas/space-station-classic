- type: entity
  parent: BaseGameRule
  id: Thief
  components:
  - type: ThiefRule
  - type: AntagObjectives
    objectives:
    - EscapeThiefShuttleObjective
  - type: AntagRandomObjectives
    sets:
    - groups: ThiefBigObjectiveGroups
      prob: 0.7
      maxPicks: 1
    - groups: ThiefObjectiveGroups
      maxPicks: 10
    maxDifficulty: 2.5
  - type: AntagSelection
    agentName: thief-round-end-agent-name
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Thief ]
      max: 6 # Starlight. Allows alpha to have more thieves without impacting beta.
      playerRatio: 21 # Starlight. Tweaks thief scaling a little, so that Beta can still have 3 but Alpha requires 126 instead of 120 for 6 thieves. (To account for the 6 thieves.)
      lateJoinAdditional: true
      allowNonHumans: true
      multiAntagSetting: NotExclusive
      startingGear: ThiefGear
      components:
      - type: Pacified
      - type: Thieving
        stripTimeReduction: 2
        stealthy: true
      mindRoles:
      - MindRoleThief
      briefing:
        sound: "/Audio/Misc/thief_greeting.ogg"
  - type: DynamicRuleCost
    cost: 75

- type: entity
  parent: BaseGameRule
  id: SLChangeling
  components:
  - type: SLChangelingRule
  - type: AntagSelection
    agentName: changeling-roundend-name
    definitions:
    - prefRoles: [ Changeling ]
      max: 6 # Starlight, same reasoning as the roundstart changeling change, for alpha.
      playerRatio: 21 # Starlight, to make sure Beta doesn't get more than 3 changelings as a submode. Same justification as Thieves.
      lateJoinAdditional: true
      allowNonHumans: false
      multiAntagSetting: None
      mindRoles:
      - MindRoleChangeling
      components:
        - type: ChangelingDevour
        - type: ChangelingIdentity
        - type: ChangelingTransform
      # Starlight-start
      tags:
        - CantBecomeRevolutionary
      # Starlight-end

- type: entity
  parent: BaseGameRule
  id: Vampire
  components:
  - type: VampireRule
  - type: AntagSelection
    agentName: vampire-roundend-name
    definitions:
    - prefRoles: [ Vampire ]
      max: 12 # Starlight. Full gamemode Vamps scale higher to account for scaling.
      playerRatio: 16 # Starlight. Accounting for scaling.
      lateJoinAdditional: true
      allowNonHumans: True
      multiAntagSetting: None
      mindRoles:
      - MindRoleVampire
      # Starlight-start
      tags:
        - CantBecomeRevolutionary # Same as lings, would be too strong.
    # Starlight-end

# Needs testing
- type: entity
  parent: BaseWizardRule
  id: SubWizard
  components:
  - type: AntagSelection
    agentName: wizard-round-end-name
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ Wizard ]
      max: 3 # Starlight. Less egregious than the full wizard mode.
      playerRatio: 55 # Starlight, ensures Beta only has 1 wizard. Also less egregious.
      spawnerPrototype: SpawnPointGhostWizard
      roleLoadout:
      - RoleSurvivalExtended
      briefing:
        text: wizard-role-greeting
        color: Turquoise
        # TODO: Need Wizard Start sound
        #sound: "/Audio/Ambience/Antag/wizard_start.ogg"
      startingGear: WizardBlueGear
      # TODO: WizardComp as needed
      components:
      - type: UniversalLanguageSpeaker # Starlight-edit: Languages
      - type: NpcFactionMember
        factions:
        - Wizard
      - type: RandomMetadata
        nameSegments:
        - NamesWizardFirst
        - NamesWizardLast
        nameFormat: name-format-wizard
      mindRoles:
      - MindRoleWizard
      # Starlight-start
      tags:
        - CantBecomeRevolutionary
      # Starlight-end

- type: entity
  parent: BaseGameRule
  id: Xenoborgs
  components:
  - type: XenoborgsRule
  - type: RuleGrids
  - type: GameRule
    minPlayers: 20 # Starlight - 30 -> 20
  - type: LoadMapRule
    gridPath: /Maps/Shuttles/mothership.yml
  - type: AntagMultipleRoleSpawner
    antagRoleToPrototypes:
      MothershipCore: [ MothershipCore ]
      Xenoborg: [ XenoborgEngi, XenoborgHeavy, XenoborgScout, XenoborgStealth ]
    pickAndTake: true
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ MothershipCore ]
      fallbackRoles: [ Xenoborg ]
      spawnerPrototype: SpawnPointGhostRoleMothershipCore
      # Starlight Start
      roleLoadout:
      - AntagMothership
      # Starlight End
      mindRoles:
      - MindRoleMothershipCore
    - prefRoles: [ Xenoborg ]
      fallbackRoles: [ MothershipCore ]
      spawnerPrototype: SpawnPointGhostRoleXenoborg
      # Starlight Start
      roleLoadout:
      - AntagXenoborg
      # Starlight End
      mindRoles:
      - MindRoleXenoborg
      min: 4
      max: 4
  - type: DynamicRuleCost
    cost: 200
