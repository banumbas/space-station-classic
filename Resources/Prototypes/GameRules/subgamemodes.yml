- type: entity
  parent: BaseGameRule
  id: Thief
  components:
  - type: ThiefRule
#  - type: AntagObjectives # Starlight start
#    objectives: # We won't be using this, we'll be taking it from GroupOuter instead so we can roll for Master Thief
#    - EscapeThiefShuttleObjective # Starlight end
  - type: AntagRandomObjectives
    sets:
#    - groups: ThiefBigObjectiveGroups # Starlight start
#      prob: 0.7
#      maxPicks: 1
    - groups: ThiefObjectiveGroupOuter # Replaced with outer group, so we can *finally* roll the escape objective more reliably.
      maxPicks: 10
    maxDifficulty: 3 # Starlight end. Ultrapop + ton of new targets means some objectives become really easy in the chaos.
  - type: AntagSelection
    agentName: thief-round-end-agent-name
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Thief ]
      max: 6 # Starlight
      playerRatio: 26 # Starlight. Beta has low sec, so we're going to allow the scaling to take a thief from them anyways, to scale Alpha better.
      lateJoinAdditional: true
      allowNonHumans: true
      multiAntagSetting: NotExclusive
      startingGear: ThiefGear
      components:
      - type: Pacified
      - type: Thieving
        stripTimeReduction: 2
        stealthy: true
      mindRoles:
      - MindRoleThief
      briefing:
        sound: "/Audio/Misc/thief_greeting.ogg"
  - type: DynamicRuleCost
    cost: 75

- type: entity
  parent: BaseGameRule
  id: SLChangeling
  components:
  - type: SLChangelingRule
  - type: AntagSelection
    agentName: changeling-roundend-name
    definitions:
    - prefRoles: [ Changeling ]
      max: 5 # Starlight, same reasoning as the roundstart changeling change, for alpha.
      playerRatio: 32 # Starlight. You should stop seeing 6 lings all the time now.
      lateJoinAdditional: true
      allowNonHumans: false
      multiAntagSetting: None
      mindRoles:
      - MindRoleChangeling
      components:
        - type: ChangelingDevour
        - type: ChangelingIdentity
        - type: ChangelingTransform
      # Starlight-start
      tags:
        - CantBecomeRevolutionary
  - type: DynamicRuleCost
    cost: 75
      # Starlight-end

- type: entity
  parent: BaseGameRule
  id: Vampire
  components:
  - type: VampireRule
  - type: AntagObjectives
    objectives:
    - VampireKillRandomPersonObjective
    - VampireDrainObjective
  - type: AntagRandomObjectives
    sets:
    - groups: VampireObjectiveGroupsStateOnly
      maxPicks: 1
    - groups: VampireObjectiveGroupsStealOnly
      maxPicks: 1
    maxDifficulty: 10
  - type: AntagSelection
    agentName: vampire-roundend-name
    selectionTime: IntraPlayerSpawn # Starlight. Only select vamps on round start
    definitions:
    - prefRoles: [ Vampire ]
      max: 10 # Starlight. Full gamemode Vamps scale higher to account for scaling.
      playerRatio: 20 # Starlight. Accounting for scaling. This is for the full vampire gamemode, so it can keep this value.
      lateJoinAdditional: true
      allowNonHumans: True
      multiAntagSetting: None
      mindRoles:
      - MindRoleVampire
      # Starlight-start
      tags:
        - CantBecomeRevolutionary # Same as lings, would be too strong.
    # Starlight-end

# Needs testing
- type: entity
  parent: BaseWizardRule
  id: SubWizard
  components:
  - type: AntagSelection
    agentName: wizard-round-end-name
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ Wizard ]
      max: 4 # Starlight. Less egregious than the full wizard mode. Increased mildly since main wizard gamemode is gone now.
      playerRatio: 55 # Starlight, ensures Beta only has 1 wizard. Also less egregious.
      spawnerPrototype: SpawnPointGhostWizard
      roleLoadout:
      - AntagWizard # Starlight
      briefing:
        text: wizard-role-greeting
        color: Turquoise
        sound: "/Audio/_Starlight/Ambience/Antag/wizard.ogg" # Starlight
      startingGear: WizardBlueGear
      # TODO: WizardComp as needed
      components:
      - type: UniversalLanguageSpeaker # Starlight-edit: Languages
      - type: NpcFactionMember
        factions:
        - Wizard
      - type: RandomMetadata
        nameSegments:
        - NamesWizardFirst
        - NamesWizardLast
        nameFormat: name-format-wizard
      mindRoles:
      - MindRoleWizard
      # Starlight-start
      tags:
        - CantBecomeRevolutionary
        - Wizard
      allowNonHumans: true
      # Starlight-end

- type: entity
  parent: BaseGameRule
  id: Xenoborgs
  components:
  - type: XenoborgsRule
  - type: RuleGrids
  - type: GameRule
    minPlayers: 20 # Starlight - 30 -> 20
  - type: LoadMapRule
    gridPath: /Maps/_Starlight/Shuttles/mothership.yml # Starlight-edit custom shuttle grid
  - type: AntagMultipleRoleSpawner
    antagRoleToPrototypes:
      MothershipCore: [ MothershipCore ]
      Xenoborg: [ XenoborgEngi, XenoborgHeavy, XenoborgScout, XenoborgStealth, XenoborgEngi, XenoborgHeavy, XenoborgScout, XenoborgStealth ] # Starlight. Yes, it  has to be written like this. No, I don't like it either.
    pickAndTake: true
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ MothershipCore ]
      fallbackRoles: [ Xenoborg ]
      spawnerPrototype: SpawnPointGhostRoleMothershipCore
      # Starlight Start
      roleLoadout:
      - AntagMothership
      # Starlight End
      mindRoles:
      - MindRoleMothershipCore
    - prefRoles: [ Xenoborg ]
      fallbackRoles: [ MothershipCore ]
      spawnerPrototype: SpawnPointGhostRoleXenoborg
      # Starlight Start
      roleLoadout:
      - AntagXenoborg
      # Starlight End
      mindRoles:
      - MindRoleXenoborg
      min: 4
      max: 8 # Starlight
      playerRatio: 15 # Starlight. 1 for every 15 players. Only counts readied up, so 8 at 100+ readied, meaning like 150+ pop.
  - type: DynamicRuleCost
    cost: 200
