# Species
- type: loadoutEffectGroup
  id: NitrogenBreather
  effects:
  - !type:SpeciesLoadoutEffect
    species:
    - SlimePerson
    - Vox
    - Cyclorite #🌟Starlight🌟

- type: loadoutEffectGroup
  id: OxygenBreather
  effects:
  - !type:SpeciesLoadoutEffect
    species:
    - Arachnid
    - Diona
    - Dwarf
    - Human
    - Moth
    - Reptilian
    - Vulpkanin # Starlight
    - Felionoid #🌟Starlight🌟
    - Resomi #🌟Starlight🌟
    - Avali #🌟Starlight🌟
    - Thaven # Starlight
    - Lagomorph # Starlight

# Starlight - exploiting the survival kit loadout group to add the cantrip spellbook
- type: loadoutEffectGroup
  id: ElfOxygenBreather
  effects:
  - !type:SpeciesLoadoutEffect
    species:
    - Elf 

- type: loadoutEffectGroup
  id: EffectSpeciesVox
  effects:
