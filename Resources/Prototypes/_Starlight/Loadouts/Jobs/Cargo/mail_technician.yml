# Senior Time
- type: loadoutEffectGroup
  id: SeniorMailTechnician
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobMailTech
      time: 216000 # 60 hrs

# Star Time
- type: loadoutEffectGroup
  id: StarOfMail
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobMailTech
      time: 360000 # 100 hrs

