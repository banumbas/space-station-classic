# Assistants Time
- type: loadoutEffectGroup
  id: HonoredAssistant
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobPassenger
      time: 10h # silly reward for people who play Assistant a lot

# Head of Assistants (for grey mantle)
- type: loadoutEffectGroup
  id: MasterGrey
  effects:
