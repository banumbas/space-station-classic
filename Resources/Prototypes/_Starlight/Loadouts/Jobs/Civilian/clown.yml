# Skilled Time
- type: loadoutEffectGroup
  id: SkilledClown
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobClown
      time: 54000 # 15 hrs

- type: loadoutEffectGroup
  id: ApprenticeClown
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobClown
      time: 21600 # 6 hrs

# Jumpsuits
- type: loadout
  id: ClownFormalJumpsuit
  effects:
  - !type:GroupLoadoutEffect
    proto: SkilledClown
  equipment:
    jumpsuit: ClothingUniformJumpsuitClownFormal

