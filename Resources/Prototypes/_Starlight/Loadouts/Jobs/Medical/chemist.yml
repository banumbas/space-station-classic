# Skilled (Beaker) Time
- type: loadoutEffectGroup
  id: SkilledChemist
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobChemist
      time: 54000 # 15 hrs

# Senior Time
- type: loadoutEffectGroup
  id: SeniorChemist
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobChemist
      time: 216000 # 60 hrs

# Star Time
- type: loadoutEffectGroup
