# Skilled Time
- type: loadoutEffectGroup
  id: SkilledBrigmedic
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobBrigmedic
      time: 54000 # 15 hrs

# Senior Time
- type: loadoutEffectGroup
  id: VeteranBrigmedic
