# Accessory Time
- type: loadoutEffectGroup
  id: NoviceOfficer
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobSecurityOfficer
      time: 18000 # 5 hrs

- type: loadoutEffectGroup
  id: SkilledOfficer
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobSecurityOfficer
      time: 54000 # 15 hrs

- type: loadoutEffectGroup
  id: EliteOfficer
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobSecurityOfficer
      time: 360000 # 100 hrs!!!

# Non-Lethal Weapons
- type: loadout
  id: SecurityDominator
