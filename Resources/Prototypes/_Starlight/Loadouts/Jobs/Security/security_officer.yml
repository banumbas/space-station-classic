# Sidearm Options
- type: loadout
  id: SecurityMk58
  dummyEntity: WeaponPistolMk58HighCapacity
  storage:
    back:
      - WeaponPistolMk58HighCapacity
      - MagazinePistolHighCapacitySP

- type: loadout
  id: SecurityPistolEnforcer
  dummyEntity: WeaponPistolEnforcer
  storage:
    back:
    - WeaponPistolEnforcer
    - MagazinePistolSP

- type: loadout
  id: SecurityRevolverDispatcher
  effects:
    - !type:GroupLoadoutEffect
      proto: SkilledOfficer
  dummyEntity: WeaponRevolverDispatcher
  storage:
    back:
      - WeaponRevolverDispatcher
      - SpeedLoaderMagnumSP
      - SpeedLoaderMagnumSP

- type: loadout
  id: SecurityPistolDP
  effects:
    - !type:GroupLoadoutEffect
      proto: SeniorOfficer
  dummyEntity: WeaponPistolDP
  storage:
    back:
      - WeaponPistolDP
      - MagazinePistol40SP

- type: loadout
  id: SecurityMk58Gold
  effects:
    - !type:GroupLoadoutEffect
      proto: EliteOfficer
  dummyEntity: WeaponPistolGoldenMk58HighCapacity
  storage:
    back:
      - WeaponPistolGoldenMk58HighCapacity
      - MagazinePistolHighCapacitySPGolden

