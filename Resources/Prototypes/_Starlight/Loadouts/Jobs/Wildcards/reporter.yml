- type: loadoutEffectGroup
  id: RisingReporter
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobReporter
      time: 36000 #10 hrs
- type: loadoutEffectGroup
  id: SeniorReporter
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobReporter
      time: 216000 #60 hrs

# Journalist
- type: loadout
  id: JournalistJumpsuit
  equipment:
    jumpsuit: ClothingUniformJumpsuitJournalist
  effects:
  - !type:GroupLoadoutEffect
    proto: SeniorReporter

- type: loadout
  id: JournalistJumpskirt
  equipment:
    jumpsuit: ClothingUniformJumpskirtJournalist
  effects:
  - !type:GroupLoadoutEffect
    proto: SeniorReporter

- type: loadout
  id: ReporterHeadphonesGeneric
  equipment:
    head: ClothingMultipleHeadphones

- type: loadout
  id: ReporterHeadphonesJob
  equipment:
    head: ClothingMultipleHeadphonesReporter

- type: loadout
  id: ReporterHeadphonesHighEnd
  equipment:
    head: ClothingMultipleHeadphonesHighEnd
  effects:
  - !type:GroupLoadoutEffect
    proto: RisingReporter

- type: loadout
  id: DigiboardMassMedia
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobReporter
      time: 20h # 20 hours of breaking all of the news in half.
  storage:
    back:
    - DigiboardMassMedia

- type: loadout
  id: HoloReporterPin
  effects:
    - !type:JobRequirementLoadoutEffect
      requirement:
        !type:RoleTimeRequirement
        role: JobReporter
        time: 10h
  storage:
    back:
      - HoloReporterPin
