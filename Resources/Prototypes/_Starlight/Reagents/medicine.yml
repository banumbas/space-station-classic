- type: reagent
  id: Vodkizine
  name: reagent-name-vodkizine
  parent: BaseAlcohol
  desc: reagent-desc-vodkizine
  physicalDesc: reagent-physical-desc-strong-smelling
  flavor: vodka
  color: "#fcf7f955"
  recognizable: true
  metamorphicSprite:
    sprite: Objects/Consumable/Drinks/ginvodkaglass.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 4
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 2
      - !type:AdjustReagent
        reagent: Ethanol
        amount: 0.2
    Medicine:
      effects:
      - !type:HealthChange
        damage:
          groups:
            Burn: -4
            Brute: -4


- type: reagent
  id: Amoxla
  name: reagent-name-amoxla
  group: Medicine
  desc: reagent-desc-amoxla
  physicalDesc: reagent-physical-desc-opaque
  # Starlight Edits
  contrabandSeverity: Minor
  allowedDepartments:
  - Medical
  # Starlight End
  flavor: medicine
  color: "#51c38c"
  metabolisms:
    Medicine:
      effects:
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Avali, Resomi, Vox ]
        damage:
          types:
            Asphyxiation: -3.5
            Bloodloss: -3
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: HeartbreakerToxin
          min: 1
        reagent: HeartbreakerToxin
        amount: -3
      - !type:HealthChange
        conditions:
          - !type:ReagentCondition
            reagent: Amoxla
            min: 25
        damage:
          types:
            Asphyxiation: 5
            Cold: 3
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Avali, Resomi, Vox ]
          inverted: true
        damage:
          types:
            Poison: 1.5 #Ammonia is toxic injected directly into bloodstream
            Asphyxiation: 1
            Bloodloss: 0.5
      - !type:ModifyBloodLevel
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Avali, Resomi, Vox ]
        amount: 3
        # Starlight-Start: Cyclorite Metabolism
      - !type:AdjustReagent # Amoxla for Cyclorites is a toxin not medicine
        conditions:
          - !type:ReagentCondition
            reagent: Amoxla
            min: 0.26
          - !type:MetabolizerTypeCondition
            type: [ Cyclorite ]
        reagent: Amoxla
        amount: 0.25
        # Starlight-End

- type: reagent
  id: BoneGel
  group: Medicine
  name: reagent-name-bonegel
  desc: reagent-desc-bonegel
  physicalDesc: reagent-physical-desc-opaque
  flavor: medicine
  color: "#dadada"
  metabolisms:
    Medicine:
      effects:
      - !type:GenericStatusEffect
        key: Drunk
        time: 1.0
        type: Remove
      - !type:HealthChange
        damage:
          types:
            Poison: 1.5 # You don't want to drink bonegel, because it's for bones and joints
      # Starlight-Start: Cyclorite Metabolism
      - !type:AdjustReagent
        conditions:
          - !type:MetabolizerTypeCondition
            type: [ Cyclorite ]
        reagent: BoneGel
        amount: -0.5
        # Starlight-End

