  physicalDesc: reagent-physical-desc-devil-juice
  allowedDepartments:
    - Medical
  flavor: perfid
  metabolisms:
    Poison:
      effects:
        - !type:HealthChange
          damage:
            types:
              Poison: 1.5
              Cellular: 1
