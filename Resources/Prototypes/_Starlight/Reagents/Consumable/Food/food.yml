# Based on norepinephric acid
# (adding a separate substance prevents it from being used normally)
- type: reagent
  id: BlindingStew
  name: reagent-name-blindingstew
  group: Foods
  desc: reagent-desc-blindingstew
  physicalDesc: reagent-physical-desc-clumpy
  contrabandSeverity: Major
  flavor: punishment
  color: "#7d7d3c" # ew
  metabolisms:
    Poison:
      effects:
      - !type:PopupMessage
        type: Local
        messages:
        - blindingstew-effect-eye-pain
        - blindingstew-effect-eye-burn
        - blindingstew-effect-hair
        probability: 0.08
      - !type:PopupMessage
        visualType: MediumCaution
        type: Local
        messages:
        - blindingstew-effect-darkness
        - blindingstew-effect-punished
        conditions:
        - !type:ReagentCondition
          reagent: BlindingStew
          min: 20
        probability: 0.03
      - !type:GenericStatusEffect
        key: TemporaryBlindness
        component: TemporaryBlindness
        conditions:
        - !type:ReagentCondition
          reagent: BlindingStew
          min: 20
  pricePerUnit: 3
  footstepSound:
    collection: FootstepSlime
    params:
      volume: 6

