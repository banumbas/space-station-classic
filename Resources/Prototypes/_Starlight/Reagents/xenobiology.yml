- type: reagent
  id: RegenerativeJelly
  name: reagent-name-regenerative-jelly
  group: Medicine
  desc: reagent-desc-regenerative-jelly
  physicalDesc: reagent-physical-desc-soothing
  flavor: medicine
  color: "#a579b5"
  metabolisms:
    Medicine:
      effects:
        - !type:EvenHealthChange
          damage:
            Burn: -2
            Toxin: -2
            Airloss: -2
            Brute: -2
        # Starlight-Start: Cyclorite Metabolism
        - !type:AdjustReagent
          conditions:
          - !type:MetabolizerTypeCondition
            type: [ Cyclorite ]
          reagent: RegenerativeJelly
          amount: -0.5
        # Starlight-End

