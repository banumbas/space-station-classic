- type: species
  id: Elf
  name: species-name-elf
  roundStart: true
  prototype: MobElf
  sprites: MobElfSprites
  markingLimits: MobElfMarkingLimits
  dollPrototype: MobElfDummy
  skinColoration: Hues
  maleFirstNames: NamesFirstElfMale
  femaleFirstNames: NamesFirstElfFemale
  lastNames: NamesLastElf
  naming: FirstLast
  customName: true
  roundstartCyberwareCapacity: 5
  minAge: 30
  youngAge: 120
  oldAge: 2700
  maxAge: 10000

# The lack of a layer means that
# this person cannot have round-start anything
# applied to that layer. It has to instead
# be defined as a 'custom base layer'
# in either the mob's starting marking prototype,
# or it has to be added in C#.
- type: speciesBaseSprites
  id: MobElfSprites
  sprites:
    Tail: MobHumanoidAnyMarking
    Special: MobHumanoidAnyMarking
    Head: MobElfHead
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobElfTorso
    Eyes: MobHumanoidEyes
    HeadTop: MobHumanoidAnyMarking
    LArm: MobElfLArm
    RArm: MobElfRArm
    LHand: MobElfLHand
    RHand: MobElfRHand
    LLeg: MobElfLLeg
    RLeg: MobElfRLeg
    LFoot: MobElfLFoot
    RFoot: MobElfRFoot

- type: markingPoints
  id: MobElfMarkingLimits
  points:
    Special:
      points: 0
      required: false
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Snout:
      points: 1
      required: false
    Tail:
      points: 0
      required: false
    HeadTop:
      points: 1 # earrings have to be in a different category to avoid conflicts with default ears
      required: true
      defaultMarkings: [ ElfLongEarsUpwards ]
    UndergarmentTop:
      points: 1
      required: false
    UndergarmentBottom:
      points: 1
      required: false
    Chest:
      points: 4 #SL Edit 2->4
      required: false
    Legs:
      points: 4 #SL Edit 2->4
      required: false
    Arms:
      points: 4 #SL Edit 2->4
      required: false

