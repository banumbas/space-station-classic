- type: species
  id: ProtoElf
  name: subspecies-name-protoelf
  roundStart: true
  prototype: MobProtoElf
  sprites: MobProtoElfSprites
  defaultSkinTone: "#ffda93"
  markingLimits: MobProtoHumanMarkingLimits
  dollPrototype: AppearanceProtoElf
  skinColoration: Hues
  roundstartCyberwareCapacity: 6
  subspeciesOf: Protogen
  subspeciesName: subspecies-name-protoelf
  loadout: ProtogenLoadout
  lastNames: NamesLastElf
  naming: FirstLast
  customName: true
  minAge: 30
  youngAge: 100
  oldAge: 300
  maxAge: 400


# The lack of a layer means that
# this person cannot have round-start anything
# applied to that layer. It has to instead
# be defined as a 'custom base layer'
# in either the mob's starting marking prototype,
# or it has to be added in C#.
- type: speciesBaseSprites
  id: MobProtoElfSprites
  sprites:
    Tail: MobHumanoidAnyMarking
    Special: MobHumanoidAnyMarking
    Head: MobElfHead
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobElfTorso
    Eyes: MobHumanoidEyes
    HeadTop: MobHumanoidAnyMarking
    LArm: MobElfLArm
    RArm: MobElfRArm
    LHand: MobElfLHand
    RHand: MobElfRHand
    LLeg: MobElfLLeg
    RLeg: MobElfRLeg
    LFoot: MobElfLFoot
    RFoot: MobElfRFoot
    FaceCover: MobHumanoidAnyMarking
    FaceCoverCover: MobHumanoidAnyMarking
    BodyCover: MobHumanoidAnyMarking
    BodyCoverCover: MobHumanoidAnyMarking

- type: markingPoints
  id: MobProtoElfMarkingLimits
  points:
    FaceCover:
      points: 1
      required: true
      defaultMarkings: [ ProtogenVisorRound ]
    FaceCoverCover:
      points: 1
      required: true
      defaultMarkings: [ ProtogenLEDFaceRound ]
    BodyCover:
      points: 1
      required: true
      defaultMarkings: [ ProtogenMediumArmor ]
    BodyCoverCover:
      points: 1
      required: true
      defaultMarkings: [ ProtogenLights ]
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Snout:
      points: 1
      required: false
    Tail:
      points: 1
      required: false
    HeadTop:
      points: 1 # earrings have to be in a different category to avoid conflicts with default ears
      required: true
      defaultMarkings: [ ElfLongEarsUpwards ]
    Head:
      points: 2
      required: false
    Chest:
      points: 4
      required: false
    Legs:
      points: 4
      required: false
    Arms:
      points: 4
      required: false
    UndergarmentTop:
      points: 1
      required: false
    UndergarmentBottom:
      points: 1
      required: false
