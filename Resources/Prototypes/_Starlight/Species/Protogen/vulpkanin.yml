- type: species
  id: ProtoVulp
  name: subspecies-name-protovulp
  roundStart: true
  prototype: MobProtoVulp
  sprites: MobProtoVulpSprites
  defaultSkinTone: "#ffda93"
  markingLimits: MobProtoVulpMarkingLimits
  dollPrototype: AppearanceProtoVulp
  skinColoration: Hues
  customName: true
  roundstartCyberwareCapacity: 6
  subspeciesOf: Protogen # This is alternative version of other species. It will only be displayed in subspecies list
  subspeciesName: subspecies-name-protovulp
  loadout: ProtogenLoadout
  minHeight: 0.9
  defaultHeight: 1
  maxHeight: 1.2
  standardSize: 170
  standardWeight: 75
  standardDensity: 110

- type: speciesBaseSprites
  id: MobProtoVulpSprites
  sprites:
    Hair: MobHumanoidAnyMarking
    Head: MobProtoVulpHead
    Eyes: MobProtogenEyes #looks odd, but this just removes eyes since they're replaced by the LEDs.
    Snout: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobProtoVulpTorso
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    LArm: MobProtoVulpLArm
    RArm: MobProtoVulpRArm
    LHand: MobProtoVulpLHand
    RHand: MobProtoVulpRHand
    LLeg: MobVulpkaninLLeg
    RLeg: MobVulpkaninRLeg
    LFoot: MobVulpkaninLFoot
    RFoot: MobVulpkaninRFoot
    FaceCover: MobHumanoidAnyMarking
    FaceCoverCover: MobHumanoidAnyMarking
    BodyCover: MobHumanoidAnyMarking
    BodyCoverCover: MobHumanoidAnyMarking

- type: markingPoints
  id: MobProtoVulpMarkingLimits
  points:
    FaceCover:
      points: 1
      required: true
      defaultMarkings: [ ProtoVulpVisor ]
    FaceCoverCover:
      points: 1
      required: true
      defaultMarkings: [ ProtoVulpLEDFace ]
    BodyCover:
      points: 1
      required: true
      defaultMarkings: [ ProtoVulpMediumArmor ]
    BodyCoverCover:
      points: 1
      required: true
      defaultMarkings: [ ProtoVulpLights ]
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 0
      required: false
    Snout:
      points: 1
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ ProtogenTail ]
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [ FoxEar ]
    Head:
      points: 3
      required: false
    Legs:
      points: 6
      required: false
    Arms:
      points: 6
      required: false
    UndergarmentTop:
      points: 1
      required: false
    UndergarmentBottom:
      points: 1
      required: false

