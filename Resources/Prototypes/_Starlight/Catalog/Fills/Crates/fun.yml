- type: entity
  id: CrateFunSuperSynth
  parent: CrateGenericSteel
  name: super synthesizer crate
  description: Contains one Super Synthesizer instrument. Groovy!
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: SuperSynthesizerInstrument

- type: entity
  id: CrateFunPinata
  parent: CrateGenericSteel
  name: pinata crate
  description: Contains one Clown Pinata and a bat to beat it with.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ClownPinata
        - id: BaseBallBat

- type: entity
  name: moproach kit crate
  description: A box with one moproach kit that provides you with two moproaches.
  id: CrateFunMoproach
  parent: CratePlastic
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: MoproachBox

- type: entity
  name: twinpointer kit crate
  description: Contains one twinpointer kit for all your bidirectional wayfinding needs.
  id: CrateFunTwinPointer
  parent: CrateGenericSteel
  components:
    - type: EntityTableContainerFill
      containers:
        entity_storage: !type:AllSelector
          children:
            - id: TwinPointerKit
              amount: 1

- type: entity
  id: CrateFunMegaShark
  parent: CrateGenericSteel
  name: mega shark crate
  description: One absolutely massive, huggable shark plushie. Perfect for those who need a BIG friend!
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: PlushieLargeSoftShark

- type: entity
  id: CrateSaltLamp
  parent: CrateGenericSteel
  name: salt lamp plushie crate
  description: Contains one small salt lamp plushie and one large salt lamp plushie. Perfect for adding a cozy ambiance to any room.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: PlushieSaltLampLarge
        - id: PlushieSaltLampSmall
