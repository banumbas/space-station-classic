- type: entity
  id: CrateSupermatterFlatpack
  parent: CrateEngineeringSecure
  name: supermatter crate
  description: Supermatter, your solution for things regular matter can't handle.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: SupermatterFlatpack

- type: entity
  id: CrateTEGFlatpack
  parent: CrateEngineeringSecure
  name: TEG Crate
  description: A crate containing a flatpacked Thermo-Electric Generator.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: TEGCenterFlatpack
        - id: TEGCirculatorFlatpack
          amount: 2

- type: entity
  id: CrateEngineeringReflector
