- type: entity
  id: CrateStarterXenobiology
  parent: CrateScienceSecure
  name: xenobiology starter crate
  description: Contains a gray slime extract and a box of monkey cubes to get you started on your xenobiology adventures. Or because you really messed up. Oh, and a camera tagger. Don't let any spies get their hands on that thing.
  components:
    - type: EntityTableContainerFill
      containers:
        entity_storage: !type:AllSelector
          children:
            - id: GraySlimeExtract
            - id: MonkeyCubeBox
            - id: XenobiologyConsoleCameraTagger
