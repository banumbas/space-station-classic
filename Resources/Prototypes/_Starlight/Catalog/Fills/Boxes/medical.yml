- type: entity
  name: small beaker box
  parent: BoxCardboard
  id: BoxBeakerSmall
  description: A box containing four small beakers.
  components:
  - type: Storage
    grid:
    - 0,0,3,1
    maxItemSize: Normal
  - type: Item
    shape:
    - 0,0,3,1
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: Beaker
          amount: 4
  - type: Sprite
    layers:
      - state: box
      - state: beaker

