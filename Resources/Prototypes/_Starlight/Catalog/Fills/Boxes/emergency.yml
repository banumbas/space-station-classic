- type: entity
  parent: BoxSurvival
  id: BoxSurvivalNonBreather
  description: It's a box with survival supplies for those with no need to breathe.
  suffix: Nonbreather
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: EmergencyMedipen
        - id: FoodSnackNutribrick
        - id: DrinkWaterBottleFull
  - type: Sprite
    layers:
    - state: internals
    - state: shadekin

- type: entity
  parent: BoxSurvivalNonBreather
  id: BoxSurvivalNonBreatherExtended
  description: It's a box with survival supplies for those with no need to breathe. This one is labelled to contain double rations.
  suffix: Nonbreather, Extended
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: EmergencyMedipen
          amount: 2
        - id: FoodSnackNutribrick
          amount: 2
        - id: DrinkWaterBottleFull

- type: entity
  parent: BoxSurvivalNonBreather
  id: BoxHugNonBreather
  description: A special box for sensitive people who don't need to breathe.
  suffix: Emergency, Nonbreather
  components:
  - type: Sprite
    layers:
    - state: box_hug
    - state: shadekin

