    weight: 1.5
    earliestStart: 45
    # reoccurrenceDelay: 90
    # minimumPlayers: 40
    # maxOccurrences: 1
    duration: 20
    occursDuringRoundEnd: false
  - type: MalignRiftSpawnRule
