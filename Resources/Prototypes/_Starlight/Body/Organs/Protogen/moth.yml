- type: entity
  id: OrganProtoMothStomach
  parent: [OrganAnimalStomach, BaseOrganStomach]
  name: moth biological reactor
  suffix: Proto-Moth
  description: Some call it over-engineered, but it's vital to the function of a protogen. Turns organic matter into organic and electrical energy to power the protogen's cybernetics and flesh. #  Starlight, quotation marks removed
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/Protogen/organs.rsi
    state: stomach
  - type: Item
    size: Small
    heldPrefix: stomach
  - type: Stomach
    specialDigestible:
      tags:
      - ClothMade
      - RamChip
    isSpecialDigestibleExclusive: false
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: OrganDamage
    damage:
      types:
        Poison: 130
        Cellular: 30 # 1.5x cellular, since it can make it impossible to revive them with the half healing they get
        Bloodloss: 20
        Caustic: 20
        Radiation: 10
