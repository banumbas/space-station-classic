- type: entity
  id: SentientProtoSlimeCore
  parent: SentientSlimeCore
  name: augmented sentient slime core
  suffix: Proto-Slime
  description: "The source of incredible, unending gooeyness."
  components:
    - type: Stomach
      specialDigestible:
        tags:
        - RamChip
      isSpecialDigestibleExclusive: false
    - type: Metabolizer
      maxReagents: 6
      metabolizerTypes: [ Slime, Animal ]
      removeEmpty: true
      groups:
        - id: Food
        - id: Drink
        - id: Alcohol
          rateModifier: 2.5
    - type: SolutionContainerManager
      solutions:
        stomach:
          maxVol: 50.0
        organ:
          reagents:
          - ReagentId: Slime
            Quantity: 10

- type: entity
  id: OrganProtoSlimeHeart
  parent: OrganSlimeHeart
  name: augmented slime circulator
  suffix: Proto-Slime
  description: "A little circulator what makes the fluid move through the slime body."
  components:
  - type: Metabolizer
    maxReagents: 6
    metabolizerTypes: [ Slime, Protogen ]
    removeEmpty: true
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic
  - type: OrganDamage
    damage:
      types:
        Shock: 130
        Cellular: 30 # 1.5x cellular, since it can make it impossible to revive them with the half healing they get
        Bloodloss: 20
        Caustic: 20
        Radiation: 10

- type: entity
  id: OrganProtoSlimeLungs
  parent: OrganSlimeLungs
  name: augmented slime gas sacs
  suffix: Proto-Slime
  description: "Collects nitrogen, which slime cells use for maintenance."
  components:
  - type: OrganDamage
    damage:
      types:
        Asphyxiation: 130
        Cellular: 30 # 1.5x cellular, since it can make it impossible to revive them with the half healing they get
        Bloodloss: 20
        Radiation: 30

- type: entity
  id: OrganProtoSlimePeepoids
  parent: OrganSlimePeepoids
  name: augmented peepoids
  suffix: Proto-Slime
  description: "Primitive and goopy, but more or less just as good as the human equivalent."
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Slime/organs.rsi
    state: peepoids
  - type: Item
    size: Small
    heldPrefix: peepoids
  - type: OrganVisualization
    layer: Eyes
    prototypes:
      Default: MobHumanoidEyes
  - type: OrganDamage
    damage:
      types:
        Poison: 10
        Cellular: 15 # 1.5x cellular, since it can make it impossible to revive them with the half healing they get
        Bloodloss: 10
        Radiation: 10
        Caustic: 10

- type: entity
  id: OrganProtoSlimeSlurpoid
  parent: OrganSlimeSlurpoid
  name: augmented slurpoid
  suffix: Proto-Slime
  description: "It has all the consistency of gelatin."
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Slime/organs.rsi
    state: slurpoid
  - type: OrganDamage
    damage:
      types:
        Poison: 10
        Cellular: 15 # 1.5x cellular, since it can make it impossible to revive them with the half healing they get
        Bloodloss: 10
        Radiation: 10
        Caustic: 10
