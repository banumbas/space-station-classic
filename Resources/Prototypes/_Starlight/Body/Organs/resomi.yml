- type: entity
  id: OrganResomiEyes
  parent: OrganHumanEyes
  name: resomi eyes
  suffix: Resomi
  description: "Resomi eyes have great night vision for hunting prey in maintenance tunnels, but are very sensitive to bright flashes."
  components:
  - type: OrganVisualization
    layer: Eyes
    prototypes:
      Default: MobResomiEyes
  - type: FunctionalOrgan
    comps:
    - type: NightVision
      disabilityBlockable: true
    - type: FlashModifier
      modifier: 2

- type: entity # Starlight
  id: OrganResomiHeart
  parent: OrganHumanHeart
  name: resomi heart
  suffix: Resomi
  description: "The heart of a Resomi."
  components:
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [Resomi]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Resomi/organs.rsi
    state: heart-on

- type: entity
  id: OrganResomiLiver
  parent: OrganHumanLiver
  name: resomi liver
  suffix: Resomi
  description: "The liver of a Resomi."
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Resomi/organs.rsi
    state: liver

- type: entity
  id: OrganResomiKidneys
  parent: OrganHumanKidneys
  name: resomi kidney
  suffix: Resomi
  description: "The kidneys of a Resomi."
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Resomi/organs.rsi
    layers:
      - state: kidney-l
      - state: kidney-r

- type: entity
  id: OrganResomiLungs
  parent: OrganHumanLungs
  name: resomi lungs
  suffix: Resomi
  description: "The lungs of a Resomi."
  components:
  - type: Metabolizer
    removeEmpty: true
    solutionOnBody: false
    solution: "Lung"
    metabolizerTypes: [ Resomi, Human ] #They get both so they can still breathe oxygen without us needing to add Resomi everywhere Human is listed
    groups:
    - id: Gas
      rateModifier: 100.0
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Resomi/organs.rsi
    layers:
      - state: lung-l
      - state: lung-r

- type: entity
  id: OrganResomiBrain
  parent: OrganHumanBrain
  name: resomi brain
  suffix: Resomi
  description: "Where Resomi think evil thoughts."
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Resomi/organs.rsi
    state: brain

- type: entity
  id: OrganResomiStomach
  parent: OrganHumanStomach
  name: resomi stomach
  suffix: Resomi
  description: "The dual chamber stomach of a Resomi."
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Resomi/organs.rsi
    state: stomach
