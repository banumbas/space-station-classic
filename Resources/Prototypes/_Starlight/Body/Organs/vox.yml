- type: entity # starlight start
  parent: OrganHumanBrain
  id: OrganVoxBrain
  name: vox cortical stack
  suffix: Vox
  description: "A cortical stack from a vox, time to find a new sleeve."
  components:
  - type: BorgBrain
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
    layers:
      - state: brain
      - state: brain-unshaded
        shader: unshaded
  - type: SolutionContainerManager
    solutions:
      organ:
        maxVol: 10
        reagents:
        - ReagentId: Silicon
          Quantity: 10
      food:
        maxVol: 20
        reagents:
        - ReagentId: Licoxide
          Quantity: 20
  - type: FlavorProfile
    flavors:
      - metallic # starlight end

- type: entity
  id: OrganVoxLungs
  parent: OrganHumanLungs
  name: vox lungs
  description: "The blue, anaerobic lungs of a vox, they intake nitrogen to breathe. Any form of gaseous oxygen is lethally toxic if breathed in."
  suffix: Vox
  components:
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
  - type: Metabolizer
    metabolizerTypes: [ Vox ]
  - type: Lung
    alert: LowNitrogen
  - type: Item
    size: Small
    heldPrefix: lungs

- type: entity
  parent: OrganHumanStomach
  id: OrganVoxStomach
  name: vox stomach
  suffix: Vox
  description: "A stomach that smells of ammonia."
  components:
  - type: Metabolizer #Skreeeee!
    metabolizerTypes: [Vox]
  - type: Stomach
#Bird vs tags
    specialDigestible:
      tags:
      - Trash
    isSpecialDigestibleExclusive: false
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi

- type: entity
  parent: OrganHumanLiver
  id: OrganVoxLiver
  name: vox liver
  suffix: Vox
  description: "Smells flammable."
  components:
  - type: Metabolizer
    metabolizerTypes: [Vox]
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
  # Starlight start
  - type: OrganDamage
    damage:
      types:
        Poison: 280
        Cellular: 40
        Bloodloss: 40
        Caustic: 40
        Radiation: 60
  # Starlight end

- type: entity
  parent: OrganHumanHeart
  id: OrganVoxHeart
  name: vox heart
  suffix: Vox
  description: "The strange heart of a vox."
  components:
  - type: Metabolizer
    metabolizerTypes: [Vox]
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi

- type: entity
  parent: OrganHumanKidneys
  id: OrganVoxKidneys
  name: vox kidneys
  suffix: Vox
  description: "Smells flammable."
  components:
  - type: Metabolizer
    metabolizerTypes: [Vox]
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi

- type: entity
  id: OrganVoxEyes
  parent: OrganHumanEyes
  name: vox eyes
  suffix: Vox
  components:
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
  # Starlight Start
  - type: OrganVisualization
    layer: Eyes
    prototypes:
      Default: MobVoxEyes
  # Starlight End
  - type: Item
    size: Small
    heldPrefix: eyeballs
# Starlight End

- type: entity
  id: OrganVoxTongue
  parent: OrganHumanTongue
  name: vox tongue
  suffix: Vox
  description: "A fleshy muscle mostly used for screaming."
  components:
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
  - type: Item
    size: Small
