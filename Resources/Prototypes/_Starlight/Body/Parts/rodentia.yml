- type: entity
  id: PartRodentia
  parent: [BaseItem, BasePart]
  name: "rodentia body part"
  abstract: true
  components:
    - type: Damageable
      damageContainer: Biological
    - type: BodyPart
    - type: ContainerContainer
      containers:
        bodypart: !type:Container
          ents: []
    - type: StaticPrice
      price: 100
    - type: Tag
      tags:
        - Trash
    - type: Extractable
      juiceSolution:
        reagents:
          - ReagentId: Fat
            Quantity: 1
          - ReagentId: Blood
            Quantity: 5

- type: entity
  id: TorsoRodentia
  name: "rodentia torso"
  parent: [PartRodentia, BaseTorso]
  components:
    - type: Sprite
      sprite: _Starlight/Mobs/Species/Rodentia/parts.rsi
      state: "torso_m"
    - type: Icon
      sprite: _Starlight/Mobs/Species/Rodentia/parts.rsi
      state: "torso_m"
    - type: BodyPart
      partType: Torso
    - type: Extractable
      juiceSolution:
        reagents:
          - ReagentId: Fat
            Quantity: 1
          - ReagentId: Blood
            Quantity: 5

- type: entity
