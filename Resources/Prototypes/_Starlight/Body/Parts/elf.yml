# pointy ears, slenderer torso (todo)

- type: entity
  id: PartElf
  parent: [BaseItem, BasePart]
  name: "elf body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

- type: entity
  id: TorsoElf
  name: "elf torso"
  parent: [PartElf, BaseTorso]
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Elf/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: Blood
        Quantity: 20

