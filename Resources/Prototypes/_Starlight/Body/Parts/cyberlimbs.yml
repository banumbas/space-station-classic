- type: entity
  id: PartCyber
  parent: [BaseItem, BasePart]
  name: "cyber body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Iron
        Quantity: 30
  - type: Item
    size: Large
    shape:
      - 0,0,0,1

- type: entity
  id: LeftArmCyber
  name: "left cyber arm"
  parent: [PartCyber, BaseLeftArm]
  components:
    - type: BaseLayerId
      layers:
        Default: CyberLArm
        Resomi: ResomiCyberLArm
    - type: Sprite
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_arm"
    - type: Icon
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_arm"
    - type: WithAttachedBodyParts
      parts:
        left hand: LeftHandCyber
    - type: RoundstartImplantable
      cost: 1
    - type: HumanoidEMPCompositeElement
      effect:
        stunAmount: 1.0
        dropItemsFrom:
        - body_part_slot_left hand
        damageAmount:
          types:
            Shock: 10

