# Cargo Legs
- type: entity
  id: LeftLegCyberCargo
  name: "left cargo cyber leg"
  parent: [PartCyber, BaseLeftLeg]
  description: Wait a moment... This is just an older model of cyberleg someone strapped a pouch to!
  components:
    - type: BaseLayerId
      layers:
        Default: CyberLLegCargo
        Resomi: ResomiCyberLLegCargo
    - type: Sprite
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_leg_cargo"
    - type: Icon
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_leg_cargo"
    - type: MovementBodyPart
      sprintSpeed : 4.05
      maxDensity: 155
    - type: WithAttachedBodyParts
      parts:
        left foot: LeftFootCyber
    - type: FootstepModifier
      footstepSoundCollection:
        path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
        params:
          volume: 0.1
    - type: LimbWithAction
      action: ActionOpenStorageLeftLeg
    - type: StorageOrgan
      organAction: ActionOpenStorageLeftLeg
      actionKey: LeftLeg
    - type: Storage
      clickInsert: false
      showVerb: false
      openOnActivate: false
      grid:
      - 0,0,1,2
      maxItemSize: Large
      blacklist:
        components:
          - BodyPart
          - Organ
    - type: PrivateStorage
      accessDelay: 3.0
      accessPopup: "cargo-leg-left-storage-accessing"
    - type: ContainerContainer
      containers:
        storagebase: !type:Container
          ents: []
    - type: UserInterface
      interfaces:
        enum.StorageUiKey.Key:
          type: StorageBoundUserInterface

