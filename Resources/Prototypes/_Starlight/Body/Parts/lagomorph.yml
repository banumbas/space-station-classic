- type: entity
  id: PartLagomorph
  parent: [BaseItem, BasePart]
  name: "lagomorph body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

- type: entity
  id: TorsoLagomorph
  name: "lagomorph torso"
  parent: [PartLagomorph, BaseTorso]
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Lagomorph/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: Blood
        Quantity: 20

- type: entity
