# ProtoElf
- type: damageModifierSet
  id: ProtoElf
  coefficients:
    Shock: 1.15 # They can counter some of the shock, magic resistance.
    Heat: 1.15 # They can share this with thaven, they've got similar enough body types.
    Cold: 0.7 # Bog standard cold resist.
    Poison: 0.75
    Blunt: 1.25 # blunt's gonna be fatal to them
# Cellular resist gone, half body machine is fighting against magic skin.

