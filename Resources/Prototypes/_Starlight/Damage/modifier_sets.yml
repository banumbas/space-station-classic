- type: damageModifierSet
  id: SlimeFireproofPotionEffect
  coefficients:
    Heat: -10.0

# terminator's flesh damage set
# we want it to be tanky, but it should be pretty easy to gib it into endoskeleton form
- type: damageModifierSet
  id: CyberneticFlesh
  coefficients:
    Blunt: 0.5
    Slash: 0.5
    Piercing: 0.5
    # fire and lasers
    Heat: 0.7
    Cold: 0.25
    Caustic: 0.25
    # doesnt have organs to poison
    Poison: 0.0
    Cellular: 0.0

# terminator's endoskeleton damage set
- type: damageModifierSet
  id: Cybernetic
  coefficients:
    # bonk
    Blunt: 0.7
    # alloy too hard to cut
    Slash: 0.0
    # pew
    Piercing: 0.1
    # no burning anymore
    Heat: 0.1
    # its a robot
    Cold: 0.0
    Caustic: 0.0
    Poison: 0.0
    Cellular: 0.0
    Radiation: 0.0
  flatReductions:
    # can't punch the endoskeleton to death
    Blunt: 5
    Slash: 5
    Piercing: 5
