- type: entity
  parent: [Paper, BaseMajorContraband]
  id: InfernalContract
  name: infernal contract
  description: The more you look at it, the more you feel like it is gazing back at you...
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Misc/infernal_contract.rsi
      layers:
      - state: paper_invalid
      - state: paper_words
        map: ["enum.PaperVisualLayers.Writing"]
        visible: true
      - state: paper_stamp-generic
        map: ["enum.PaperVisualLayers.Stamp"]
        visible: false
    - type: PaperVisuals
      backgroundImagePath: "/Textures/_Starlight/Interface/Paper/paper_background_dark.svg.96dpi.png"
      backgroundPatchMargin: 16.0, 16.0, 16.0, 16.0
      contentMargin: 16.0, 16.0, 16.0, 16.0
    - type: InfernalContract
    - type: ParsablePaper
      requiredPatterns:
      # Must have verbatim clause warning signator
      - "(?<=I understand that there is no way to retrieve these sacrifices. If I offer my soul, \\[bold\\]I understand that upon my demise my soul will fall into the fires of hell. My body will not be able to be resurrected, cloned, or brought back to life in any way.\\[/bold\\]).*"
      requestedValuePatterns:
        sacrifices: (?i)i offer the following:\s*((?:\n\s*[•\-\.\+]\s*.+)+)
        benefits: (?i)in exchange for:\s*((?:\n\s*[•\-\.\+]\s*.+)+)
