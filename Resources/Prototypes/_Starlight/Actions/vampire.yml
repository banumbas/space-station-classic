- type: entity
  parent: BaseAction
  id: ActionVampireRejuvenateII
  name: Rejuvenate II
  description: Removes any and all stuns, restores stamina. Purges poisons and heals you over time.
  components:
    - type: Action
      useDelay: 30
      itemIconStyle: NoItem
      priority: 4
      checkCanInteract: false
      checkConsciousness: false
      icon:
        sprite: _Starlight/Vampire/actions_vampire.rsi
        state: rejuvinate
    - type: InstantAction
      event: !type:VampireRejuvenateIIActionEvent
        reagentPurgeAmount: 10
