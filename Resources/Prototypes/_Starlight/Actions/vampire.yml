# Base abilities

- type: entity
  parent: BaseAction
  id: ActionVampireToggleFangs
  name: Toggle Fangs
  description: Extend or retract your fangs to drink blood from victims.
  components:
    - type: Action
      useDelay: 2 # Toggle
      itemIconStyle: NoItem
      priority: 1
      icon:
        sprite: _Starlight/Vampire/actions_vampire.rsi
        state: fangs_retracted
      iconOn:
        sprite: _Starlight/Vampire/actions_vampire.rsi
        state: fangs_extended
    - type: InstantAction
      event: !type:VampireToggleFangsActionEvent {}
    - type: VampireAction
      bloodToUnlock: 0
      bloodCost: 0

- type: entity
  parent: BaseAction
  id: ActionVampireGlare
  name: Glare
  description: Stare down nearby targets to paralyze and mute them.
