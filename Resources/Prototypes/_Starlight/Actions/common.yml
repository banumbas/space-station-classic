- type: entity
  id: ActionToggleCyberLimb
  name: Toggle Limb
  description: Toggle Limb.
  components:
    - type: Action
      useDelay: 1
      icon:
        sprite: _Starlight/Interface/Actions/actions_cyber.rsi
        state: cyber-hand-left
      itemIconStyle: BigItem
    - type: InstantAction
      event: !type:ToggleLimbEvent

- type: entity
  id: ActionToggleCyberHandLeft
  name: Toggle Hand.
  description: Toggle the left hand
  components:
    - type: Action
      useDelay: 1
      icon:
        sprite: _Starlight/Interface/Actions/actions_cyber.rsi
        state: cyber-hand-left
      itemIconStyle: BigItem
    - type: InstantAction
      event: !type:ToggleLimbEvent

- type: entity
  id: ActionToggleCyberHandRight
  name: Toggle Hand.
  description: Toggle the right hand
  components:
    - type: Action
      useDelay: 1
      icon:
        sprite: _Starlight/Interface/Actions/actions_cyber.rsi
        state: cyber-hand-right
      itemIconStyle: BigItem
    - type: InstantAction
      event: !type:ToggleLimbEvent


- type: entity
  parent: BaseAction
  id: ActionOpenStorageLeftLeg
  name: Toggle Storage Organ
  description: Opens or closes the storage attached to your left leg
  components:
  - type: Action
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Clothing/Back/Satchels/smuggler.rsi
      state: icon
    useDelay: 1
  - type: InstantAction
    event: !type:OpenStorageOrganEvent
      key: LeftLeg

- type: entity
  parent: BaseAction
  id: ActionOpenStorageRightLeg
  name: Toggle Storage Organ
  description: Opens or closes the storage attached to your right leg
  components:
  - type: Action
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Clothing/Back/Satchels/smuggler.rsi
      state: icon
    useDelay: 1
  - type: InstantAction
    event: !type:OpenStorageOrganEvent
      key: RightLeg