- type: entity
  parent: BaseAction
  id: ActionToggleDome
  name: Toggle energy dome
  description: Turn the energy barrier on or off.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: BigAction
    priority: -10
    icon:
      sprite: Objects/Weapons/Melee/e_shield.rsi
      state: eshield-on
    useDelay: 1
  - type: InstantAction
    event: !type:ToggleActionEvent
