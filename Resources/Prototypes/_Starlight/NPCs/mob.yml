- type: htnCompound
  id: SimpleAvoidanceCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeAvoidanceCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound

- type: htnCompound
  id: SimpleWebAvoidanceCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeAvoidanceCompound
    - tasks:
        - !type:HTNCompoundTask
          task: WebOrIdleCompound
