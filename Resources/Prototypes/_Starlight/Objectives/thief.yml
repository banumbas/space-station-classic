# Thief Collection
# Various crewmonitors
- type: entity
  parent: BaseThiefStealObjective # Not parenting collection since BSO/Brigmed aren't mapped, but is completable with CMO/Para
  id: CrewMonitorStealCollectionObjective
  components:
  - type: NotJobRequirement
    jobs: [ MedicalDoctor, Paramedic, ChiefMedicalOfficer, MedicalIntern, Surgeon, Chemist, Psychologist, Brigmedic, BlueShield ]
  - type: StealCondition
    stealGroup: CrewMonitorCollection
    minCollectionSize: 2 # Easiest to take from the 2 parameds, but you'll still have to get into Medical somehow, or find them in the wild.
    maxCollectionSize: 3 # Good luck.
  - type: Objective
    difficulty: 1

