- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseTerminatorObjective
  components:
  - type: Objective
    difficulty: 1
    issuer: objective-issuer-terminator
  - type: RoleRequirement
    roles:
    - TerminatorRole

- type: entity
  parent: [BaseTerminatorObjective, BaseKillObjective]
  id: TerminatorExterminateObjective
  name: Secure our future.
  description: Follow your programming and kill the target.
  components:
  - type: PickSpecificPerson
  - type: KillPersonCondition
    requireDead: true
  - type: TargetObjective
    title: objective-condition-kill-head-title

- type: entity
  parent: BaseTerminatorObjective
  id: TerminatorSelfDestructObjective
  name: Self destruct
  description: Prevent your advanced technology from falling into enemy hands.
  components:
  - type: DieCondition
  - type: Objective
    icon:
      sprite: Mobs/Ghosts/ghost_human.rsi
      state: icon