# MedTak
- type: entity
  parent: IDCardStandard
  id: MedTakIDCard
  abstract: true
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/MedTak/Objects/id_cards.rsi
  - type: IdCard
  - type: Access
    tags:
      - MedTak
      - Maintenance
  - type: Tag
    tags:
    - DoorBumpOpener
  - type: NanoChatCard
    listNumber: false

- type: entity
  parent: MedTakIDCard
  id: MedTakIDCardTeamLead
  name: MedTak team leader ID card
  components:
  - type: Sprite
    layers:
      - state: medtak
      - sprite: &starlight-icon-rsi _Starlight/Admeme/MedTak/Interface/job_icons.rsi
        offset: &icon-offset -0.09375, 0.0625
        state: MedTakLeader
  - type: IdCard
    jobTitle: job-name-medtak-leader
    jobIcon: JobIconMedTakLeader

