- type: entity
  parent: DeathRattleImplant
  id: TrackingImplantMedTak
  name: MedTak beacon
  description: This implant will inform the nearest MedTak unit should the user fall into critical condition or die.
  abstract: true
  components:
    - type: IconImplant
      icon: MedTakOperator
      iconType: MedTak
    - type: RattleOnTrigger
      radioChannel:
      - MedTak
    - type: SuitSensor
      faction: MedTak
      randomMode: false
      controlsLocked: true
      mode: SensorCords
      activationContainer: "implant"
    - type: DeviceNetwork
      deviceNetId: Wireless
      transmitFrequencyId: SuitSensor
    - type: StationLimitedNetwork
      allowNonStationPackets: true
    - type: WirelessNetworkConnection
      range: 1500

- type: entity
  parent: TrackingImplantMedTak
  id: TrackingImplantMedTakBronze
  name: MedTak bronze beacon
  categories: [ HideSpawnMenu ]
  components:
    - type: IconImplant
      icon: MedTakBronze
    - type: RattleOnTrigger
      messages:
        Critical: rattle-on-trigger-medtak-bronze-critical
        Dead: rattle-on-trigger-medtak-bronze-dead

