- type: entity
  parent: [BaseHypospray, BaseMedTakContraband]
  id: MedTakHypo
  name: MedTak hypojet
  description: A high quality injector for rapid administration of chemicals, compatibile with most standard hardsuit injection ports.
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/MedTak/Objects/hypo.rsi
    layers:
      - state: hypo
        map: ["enum.SolutionContainerLayers.Base"]
      - state: hypo_fill1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: _Starlight/Admeme/MedTak/Objects/hypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 15
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: hypo_fill
    solutionName: hypospray
