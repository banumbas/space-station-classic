# Chemical case
- type: entity
  id: BottleCaseMedTak
  parent: [ BaseBottleCase, BaseMedTakContraband ]
  name: chemical case
  description: A reinforced case with padded slots for bottles.
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/Objects/MedTak/cases.rsi
    layers:
    - state: bottlecase
    - state: bottle1
      map: ["bottle1"]
      visible: false
    - state: bottle2
      map: ["bottle2"]
      visible: false
    - state: bottle3
      map: ["bottle3"]
      visible: false
    - state: bottle4
      map: ["bottle4"]
      visible: false
    - state: bottle5
      map: ["bottle5"]
      visible: false
    - state: bottle6
      map: ["bottle6"]
      visible: false
    - state: bottle7
      map: ["bottle7"]
      visible: false
    - state: bottle8
      map: ["bottle8"]
      visible: false
  - type: Item
    sprite: _Starlight/Admeme/Objects/MedTak/cases.rsi
    size: Small
    shape:
    - 0,0,1,1
  - type: ExplosionResistance
    damageCoefficient: 0

# MedKit
- type: entity
  parent: Medkit
  id: MedkitCombatMedTak
  name: MedTak combat kit
  description: An operator's personal medical kit.
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/Objects/MedTak/medkit.rsi
    state: medkit
  - type: Item
    sprite: _Starlight/Admeme/Objects/MedTak/medkit.rsi
    heldPrefix: medtak
    size: Normal

# Injector pack
- type: entity
  parent: [ BasePenPack, BaseMedTakContraband ]
  id: PenPackMedTak
  name: autoinjector pack
  suffix: MedTak, Filled
  description: A pouch loaded with autoinjectors.
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/Objects/MedTak/cases.rsi
    state: injectorpack
  - type: Item
    size: Small
    sprite: _Starlight/Admeme/Objects/MedTak/cases.rsi
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: EmergencyMedipen
          amount: 2
        - id: PunctAutoInjector
        - id: CombatMedipen
        - id: PyraAutoInjector
        - id: AirlossAutoInjector


# Surgical Kit
- type: entity
  name: advanced surgical kit
  suffix: MedTak, Filled
  description: A compact kit of surgical tools.
  parent: [ BaseSurgicalKit, BaseMedTakContraband ]
  id: SurgicalKitMedTak
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/Objects/MedTak/cases.rsi
    state: surgerykit
  - type: Item
    size: Normal
    shape:
    - 0,0,2,1
    sprite: _Starlight/Admeme/Objects/MedTak/cases.rsi
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,4,2
    - 1,3,4,3
    whitelist:
       tags:
        - Brutepack
       components:
        - SurgeryTool
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: MedicatedSuture
        - id: BoneGel
        - id: BoneSetterAdvanced
        - id: HemostatAdvanced
        - id: RetractorAdvanced
        - id: Drill
        - id: ScalpelLaser
        - id: SawAdvanced

# I don't think this needs its own file
- type: entity
  parent: BoxFolderBaseEmpty
  id: BoxFolderMedTak
  suffix: MedTak invoices
  components:
  - type: Sprite
    layers:
    - state: folder-colormap
      color: "#880606"
    - state: folder-base
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: PaperMedTak
          amount: 10
