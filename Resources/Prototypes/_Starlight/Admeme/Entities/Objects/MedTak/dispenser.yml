- type: entity
  parent: PlumbingSmartDispenser
  id: PlumbingSmartDispenserMedTakFilled
  name: Smart dispenser
  description: A smart dispenser prefilled with a broad set of medical reagents.
  suffix: Filled
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/Objects/MedTak/dispenser.rsi
    noRot: true
    layers:
    - state: dispenser
    - state: dispenser-screen
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: SolutionContainerManager
    solutions:
      fridge:
        maxVol: 50000
        canReact: false
        reagents:
        - ReagentId: Dylovene
          Quantity: 200
        - ReagentId: Hyronalin
          Quantity: 200
        - ReagentId: Diphenhydramine
          Quantity: 200
        - ReagentId: Arithrazine
          Quantity: 200
        - ReagentId: Bicaridine
          Quantity: 200
        - ReagentId: Lacerinol
          Quantity: 200
        - ReagentId: Puncturase
          Quantity: 200
        - ReagentId: Bruizine
          Quantity: 200
        - ReagentId: Dermaline
          Quantity: 200
        - ReagentId: Pyrazine
          Quantity: 200
        - ReagentId: Insuzine
          Quantity: 200
        - ReagentId: Leporazine
          Quantity: 200
        - ReagentId: Sigynate
          Quantity: 200
        - ReagentId: Amoxla
          Quantity: 200
        - ReagentId: DexalinPlus
          Quantity: 200
        - ReagentId: Saline
          Quantity: 200
        - ReagentId: TranexamicAcid
          Quantity: 200
        - ReagentId: Inaprovaline
          Quantity: 200
        - ReagentId: Epinephrine
          Quantity: 200

- type: entity
  parent: PlumbingSmartDispenserMedTakFilled
  id: PlumbingSmartDispenserMedTakWallmountFilled
  name: Wallmount dispenser
  description: A wallmount smart dispenser filled with a broad set of medical reagents.
  suffix: Filled
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/Objects/MedTak/dispenser.rsi
    noRot: false
    layers:
    - state: wallmount
    - state: wallmount-screen
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: WallMount
  - type: Physics
    canCollide: false
  - type: PlumbingSmartDispenser
    solutionName: fridge
    maxPerReagent: 100
  - type: SolutionContainerManager
    solutions:
