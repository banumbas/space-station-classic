# Blackstar Operative Ghost Role
# Admin spawns RandomHumanoidSpawnerBlackstarOperative via the Spawn Entities panel.
# Ghosts claim the role and spawn fully equipped.

- type: entity
  id: RandomHumanoidSpawnerBlackstarOperative
  name: Blackstar Dreadwalker
  suffix: Admeme
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/Scarlet/wardlord.rsi
    state: icon
  - type: RandomMetadata
    nameSegments:
    - NamesBlackstarLast
    nameFormat: name-format-blackstar-dreadwalker
  - type: RandomHumanoidSpawner
    settings: BlackstarOperative

- type: entity
  id: RandomHumanoidSpawnerBlackstarLegionnaire
  name: Blackstar Legionnaire
  suffix: Admeme
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/Scarlet/wardlord.rsi
    state: icon
  - type: RandomMetadata
    nameSegments:
    - NamesBlackstarLegionnaireLast
    nameFormat: name-format-blackstar-legionnaire
  - type: RandomHumanoidSpawner
    settings: BlackstarLegionnaire

- type: entity
  id: RandomHumanoidSpawnerBlackstarBlackguard
  name: Blackstar Blackguard
  suffix: Admeme
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/Scarlet/wardlord.rsi
    state: icon
  - type: RandomMetadata
    nameSegments:
    - NamesBlackstarBlackguardLast
    nameFormat: name-format-blackstar-blackguard
  - type: RandomHumanoidSpawner
    settings: BlackstarBlackguardSettings

- type: entity
  id: RandomHumanoidSpawnerBlackstarInitiate
  name: Blackstar Initiate
  suffix: Admeme
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/Scarlet/wardlord.rsi
    state: icon
  - type: RandomHumanoidSpawner
    settings: BlackstarInitiateSettings

- type: randomHumanoidSettings
  id: BlackstarOperative
  parent: EventHumanoid
  components:
  - type: GhostRole
    name: ghost-role-information-blackstar-operative-name
    description: ghost-role-information-blackstar-operative-description
    rules: ghost-role-information-antagonist-rules
    raffle:
      settings: default
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
  - type: AntagImmune
  - type: NoObjectiveTarget
  - type: Loadout
    prototypes: [ BlackstarOperativeGear ]
  - type: RandomMetadata
    nameSegments:
    - NamesBlackstarLast
    nameFormat: name-format-blackstar-dreadwalker
  - type: NpcFactionMember
    factions:
    - Blackstar

- type: randomHumanoidSettings
  id: BlackstarLegionnaire
  parent: EventHumanoid
  components:
  - type: GhostRole
    name: ghost-role-information-blackstar-legionnaire-name
    description: ghost-role-information-blackstar-legionnaire-description
    rules: ghost-role-information-antagonist-rules
    raffle:
      settings: default
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
  - type: AntagImmune
