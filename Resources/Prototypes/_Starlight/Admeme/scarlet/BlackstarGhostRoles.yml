  - type: RandomMetadata
    nameSegments:
    - NamesBlackstarLegionnaireLast
    nameFormat: name-format-blackstar-legionnaire
  - type: NpcFactionMember
    factions:
    - Blackstar

- type: randomHumanoidSettings
  id: BlackstarBlackguardSettings
  parent: EventHumanoid
  components:
  - type: GhostRole
    name: ghost-role-information-blackstar-blackguard-name
