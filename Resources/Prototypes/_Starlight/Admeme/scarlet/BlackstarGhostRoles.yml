# Dreadwalker — heavy combat, breach kit, high ammo load
- type: startingGear
  id: BlackstarOperativeGear
  equipment:
    head: ClothingHeadHelmetBlackstar
    mask: ClothingMaskGasSwat
    outerClothing: ClothingOuterHardsuitBlackstar
    jumpsuit: ClothingUniformJumpsuitColorBlack
    gloves: ClothingHandsGlovesCombat
    shoes: ClothingShoesBootsJackFilled
    back: ClothingBackpackSatchel
    belt: ClothingBeltMilitaryWebbing
    id: BlackstarDreadwalkerPDA
    ears: ClothingHeadsetAltBlackstar
    eyes: ClothingEyesGlassesBlackstar
    pocket1: WeaponTaser
    pocket2: PinpointerUniversal
    suitstorage: WeaponRiflePrometheus
  storage:
    back:
    - RegenerativeMesh
    - MedicatedSuture
    - PunctAutoInjector
    - BurnAutoInjector
    - JawsOfLife
    - WelderIndustrialAdvanced
    - DoubleEmergencyOxygenTankFilled
    - DoubleEmergencyNitrogenTankFilled
    - FlashlightSeclite
    - PowerCellHyper
    - DrinkWaterBottleFull
    - FoodSnackNutribrick
    belt:
    - WeaponLaserSvalinn
    - MagazineRifleSP
    - MagazineRifleSP
    - MagazineRifleSP
    - MagazineRifleSP
    - GrenadeFlashBang
    - GrenadeFlashBang
    - Handcuffs

