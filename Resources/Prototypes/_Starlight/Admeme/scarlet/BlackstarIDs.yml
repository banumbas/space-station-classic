# Blackstar ID Cards
- type: entity
  parent: IDCardStandard
  id: BlackstarIDCard
  name: Blackstar ID card
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Misc/id_cards.rsi
      layers:
        - state: mercenary
        - sprite: _Starlight/Interface/Misc/job_icons.rsi
          offset: -0.09375, 0.0625
          state: Blackstar
    - type: IdCard
      jobTitle: job-name-blackstar
      jobIcon: JobIconBlackstar
    - type: Access
      tags:
        - Blackstar

