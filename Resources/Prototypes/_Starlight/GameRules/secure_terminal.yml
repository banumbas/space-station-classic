# Gamerules
- type: entity
  parent: BaseGameRule
  id: ERTChaplainSpawn
  components:
    - type: StationEvent
    - type: AntagRandomSpawn
    - type: AntagLoadProfileRule
    - type: AntagSelection
      definitions:
        - spawnerPrototype: SpawnPointGhostERTChaplain
          pickPlayer: false
          startingGear: ERTChaplainGearEVA
          roleLoadout:
            - RoleSurvivalMilitaryDouble
          components:
            - type: BibleUser
            - type: RandomMetadata
              nameSegments:
                - NamesMilitaryLast
              nameFormat: name-format-ert-specialist
            - type: AutoImplant
              implants:
                - MindShieldImplant
                - DeathRattleImplantCentcomm
            - type: SpawnOnTrigger
              proto: ERTChaplainSpawnEffect
            - type: TriggerOnSpawn
          mindRoles:
            - MindRoleGhostCorporateAligned

- type: entity
  parent: BaseGameRule
  id: WarOpsERTSpawn
  components:
    - type: StationEvent
    - type: RuleGrids
    - type: LoadMapRule
      gridPath: /Maps/_Starlight/Shuttles/SecureTerminal/WarOpsDroppod.yml
    - type: FTLToStationRule
      hyperspaceTime: 300

