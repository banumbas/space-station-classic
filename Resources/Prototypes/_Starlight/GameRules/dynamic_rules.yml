- type: entity
  parent: BaseGameRule
  id: SLDynamicRule
  components:
  - type: GameRule
    minPlayers: 15 # Realistically you won't get many good gamemodes rolling with less than 15 players.
  - type: DynamicRule
    startingBudgetMin: 250 # 200's a bit too low, can't even roll most minor antags alongside anything but traitor.
    startingBudgetMax: 550
    maxRuleInterval: 1500
    minRuleInterval: 900
    table: !type:AllSelector
      children:
      # Major Rules
      - !type:GroupSelector
        conditions:
        - !type:RoundDurationCondition
          max: 5 # 5 seconds, really just here to ensure it rolls roundstart and then doesn't roll again
        children:
        - id: Traitor
          weight: 42.5
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
        - id: Nukeops
          weight: 12.5
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
          - !type:PlayerCountCondition
            min: 20
        - id: Revolutionary
          weight: 12.5
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
          - !type:PlayerCountCondition
            min: 15
        - id: CosmicCult
          weight: 12.5
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
          - !type:PlayerCountCondition
            min: 20
        - id: Zombie
          weight: 10
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
          - !type:PlayerCountCondition
            min: 20
        - id: WizardDuel
          weight: 10
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
          - !type:PlayerCountCondition
            min: 35
        #- id: Xenoborgs
        #  weight: 10
        #  conditions:
        #  - !type:HasBudgetCondition
        #  - !type:MaxRuleOccurenceCondition
        #  - !type:PlayerCountCondition
        #    min: 20
        #- id: TerrorSpidersSpawn
        #  weight: 10
        #  conditions:
        #  - !type:HasBudgetCondition
        #  - !type:MaxRuleOccurenceCondition
        #  - !type:PlayerCountCondition
        #    min: 50
      # Minor Rules
      - !type:GroupSelector
        conditions:
        - !type:RoundDurationCondition
          max: 5 # 5 seconds, really just here to ensure it rolls roundstart and then doesn't roll again
        children:
        - id: Thief
          prob: 0.4
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
        - id: VampireLess
          prob: 0.15
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
        - id: SLChangeling
          prob: 0.15
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
        - id: SiliconLiberation
          prob: 0.15
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
        - id: SubWizard
          prob: 0.05
          conditions:
          - !type:HasBudgetCondition
          - !type:PlayerCountCondition
            min: 40
          - !type:MaxRuleOccurenceCondition
        - id: Devil
          prob: 0.05
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
      # Dynamic Multiantag, can spawn at the start, or midround. This is the actual intended purpose of Dynamic. Exciting, no? Run across the sky!
      - !type:GroupSelector
        children:
        - id: TraitorLess
          weight: 20
          prob: 0.50 # Have a 50% chance to fail to add the gamemode, even if it wins the roll. Mostly a failsafe so the actual midrounds can trigger, but also to stop them from always rolling even if cost rolls high. We don't want things to be predictable, no?
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
        - id: Nukeops
          weight: 9
          prob: 0.50
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
          - !type:PlayerCountCondition
            min: 20
        - id: Revolutionary
          weight: 9
          prob: 0.50
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
          - !type:PlayerCountCondition
            min: 15
        - id: CosmicCult
          weight: 9
          prob: 0.50
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
          - !type:PlayerCountCondition
            min: 20
        - id: WizardDuel
          weight: 5
          prob: 0.50
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
          - !type:PlayerCountCondition
            min: 35
        #- id: SubXenoborgs
        #  weight: 5
        #  prob: 0.50
        #  conditions:
        #  - !type:HasBudgetCondition
        #  - !type:MaxRuleOccurenceCondition
        #  - !type:PlayerCountCondition
        #    min: 20
        #- id: TerrorSpidersSpawn
        #  weight: 5
        #  prob: 0.50
        #  conditions:
        #  - !type:HasBudgetCondition
        #  - !type:MaxRuleOccurenceCondition
        #  - !type:PlayerCountCondition
        #    min: 50
        - id: ThiefLess
          weight: 8
          prob: 0.50
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
        - id: VampireLess
          weight: 6
          prob: 0.50
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
        - id: SLChangelingLess
          weight: 6
          prob: 0.50
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
        - id: SiliconLiberation
          weight: 8
          prob: 0.50
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
        - id: SubWizard
          weight: 5
          prob: 0.50
          conditions:
          - !type:HasBudgetCondition
          - !type:PlayerCountCondition
            min: 40
          - !type:MaxRuleOccurenceCondition
        - id: Devil
          weight: 5
          prob: 0.50
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
      # Midround rules
      - !type:GroupSelector
        conditions:
        - !type:RoundDurationCondition
          min: 300 # minimum 5 minutes
        children:
        - id: SleeperAgents
          weight: 15
          conditions:
          - !type:HasBudgetCondition
          - !type:RoundDurationCondition
            min: 1500 # 25 minutes
        - id: DragonSpawn
          weight: 15
          conditions:
          - !type:HasBudgetCondition
          - !type:RoundDurationCondition
            min: 1800 # 30 minutes
        - id: NinjaSpawn
          weight: 20
          conditions:
          - !type:HasBudgetCondition
          - !type:RoundDurationCondition
            min: 1800 # 30 minutes
        - id: ParadoxCloneSpawn
          weight: 20
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
            max: 2 # We don't want this showing up too often as it's got high weight and isn't that interesting, so only 2.
          - !type:RoundDurationCondition
            min: 1200 # 20 minutes
        - id: ParadoxCrisisSpawn
          weight: 10
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
            max: 2
          - !type:RoundDurationCondition
            min: 1800 # 30 minutes
        - id: LoneOpsSpawn
          weight: 5
          conditions:
          - !type:HasBudgetCondition
          - !type:PlayerCountCondition
            min: 20
          - !type:RoundDurationCondition
            min: 3000 # 50 minutes
        - id: WizardSpawn
          weight: 1
          conditions:
          - !type:HasBudgetCondition
          - !type:PlayerCountCondition
            min: 40
          - !type:RoundDurationCondition
            min: 1800 # 30 minutes
        - id: AbductorsSpawn
          weight: 15
          conditions:
          - !type:HasBudgetCondition
          - !type:PlayerCountCondition
            min: 10
          - !type:RoundDurationCondition
            min: 900 # 15 minutes
        - id: Brighteye
          weight: 1
          conditions:
          - !type:HasBudgetCondition
          - !type:PlayerCountCondition
            min: 20
          - !type:RoundDurationCondition
            min: 900 # 15 minutes
        - id: EeepEvent
          weight: 1
          conditions:
          - !type:HasBudgetCondition
          - !type:PlayerCountCondition
            min: 30
          - !type:RoundDurationCondition
            min: 1200 # 20 minutes
