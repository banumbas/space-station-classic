- type: entity
  id: BrighteyeCondition
  categories: [HideSpawnMenu]
  abstract: true
  components:
    - type: RailroadCard
      iconColor: "#d3d3d3"
      color: "#6c15ae"
      image: /Textures/_Starlight/Railroading/shadekin.png
      showObjective: true
    - type: Conditions
      conditions:
        - !type:SubjectMindAntagCondition
          whitelist:
            - Brighteye

