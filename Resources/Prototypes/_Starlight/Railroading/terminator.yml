- type: entity
  id: RRCardTerminate
  parent: CrewCondition
  categories: [ HideSpawnMenu ]
  components:
  - type: RailroadCard
    title: rr-terminate
    icon: ""
    iconColor: "#fd3f3f" # Antag
    color: "#6c15ae"
    image: /Textures/_Starlight/Railroading/terminate.png
    description: rr-terminate-desc
  - type: RailroadMessageOnChosen
    messages:
    - message: rr-terminate-message
      wrapped: rr-terminate-wrapped-message
      color: "#fa2626"
  - type: RailroadTerminatorOnChosen
  - type: RailroadTimerTask
    duration: 1800
  - type: RailroadSurviveTask
  - type: RailroadDonationReward
    amount: # 30 min survival, against a very strong enemy
      min: 400
      max: 600
