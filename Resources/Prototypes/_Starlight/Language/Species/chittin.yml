- type: language
  id: Chittin
  icon: LanguageIconChittin
  chatPrefix: chi
  speech:
    requireSpeech: false
    color: "#c64c05"
    messageWrapOverrides:
      Speak: chat-sign-language-message-wrap
      Whisper: chat-chittin-whisper-wrap
    speechVerbOverrides:
      - chat-speech-verb-chittin-1
      - chat-speech-verb-chittin-2
      - chat-speech-verb-chittin-3
  obfuscation:
    !type:ReplacementObfuscation
    replacement:
    - Click
    - Clack
    - Click click
    - Clack clack
    - Click clack
    - Clack click
