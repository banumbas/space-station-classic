- type: entity
  parent: Acidifier
  id: XenoborgAcidifier
  name: acid
  description: Dissolves a xenoborg chassis into a puddle of acid.
  components:
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/Effects/Fluids/splat.ogg
      params:
        variation: 0.1

- type: entity
  id: GearAcidifier
  name: acid
  description: Melts your gear into a puddle of yuck!
  components:
  - type: Transform
    anchored: True
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: /Textures/Effects/acidifier.rsi
    state: acid
  - type: Fixtures
    fixtures:
      portalFixture:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.48,0.25,0.48"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        hard: false
  - type: TimedDespawn
    lifetime: 2.4
