- type: entity
  id: EffectTerminatorChronospace
  categories: [ HideSpawnMenu ]
  components:
  - type: PointLight
    radius: 10.5
    energy: 15
    color: "#18abf5"
  - type: TimedDespawn
    lifetime: 2
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/Effects/Lightning/lightningbolt.ogg
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: Effects/chronofield.rsi
      state: chronofield
  - type: AnimationPlayer
  - type: EffectVisuals
  - type: Tag
    tags:
    - HideContextMenu
