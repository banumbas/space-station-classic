    drawdepth: Effects
    sprite: _Starlight/Effects/bullet_hole.rsi
    state: bullet_hole
  - type: EffectVisuals
  - type: Tag
    tags:
      - HideContextMenu
  - type: AnimationPlayer
  
- type: entity
  id: ImpactSparksEffect
  categories: [ HideSpawnMenu ]
