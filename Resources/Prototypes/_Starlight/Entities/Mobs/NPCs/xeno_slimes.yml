- type: entity
  id: XenobiologySlimeBase
  parent:
    - MobRespirator
    - MobAtmosStandard
    - SimpleSpaceMobBase
  abstract: true
  description: I don't think you should be seeing this.
  components:
    - type: Sprite
      drawdepth: Mobs
      sprite: _Starlight/Mobs/XenoSlimes/slimes.rsi
      layers:
        - state: eyes_default
          shader: unshaded
          color: "#333333"
        - state: base1
    - type: RandomSprite
      available: 
        - 0: #replaces layer 0 (eyes) with a random one and uses the "Black" color pallete
            eyes_angry: Black
            eyes_cat: Black
            eyes_clown: Black
            eyes_default: Black
            eyes_freak: Black
            eyes_mischief: Black
            eyes_pins: Black
            eyes_shocked: Black
            eyes_smug: Black
            eyes_squint: Black
    - type: Hunger
      baseDecayRate: 1
    - type: Slime
      damageOnEat:
        types:
          Cellular: 5
      nutritionOnHit: 10
      mutationChance: 0.25
      mutationOnMaxSplit: XenobiologySlimeRainbow
    - type: HTN
      rootTask:
        task: SlimeMainCompound
    - type: TemperatureDamage
      coldDamage:
        types:
          Cold: 10.0

- type: entity
  name: gray xenobiology slime
  id: XenobiologySlimeGray
