- type: entity
  name: space koi
  id: BaseMobKoi
  parent: BaseMobCarp
  description: Result of hundreds of years of selective breeding and genetic engineering, a friendly and colourful variant of the common space carp
  abstract: true
  components:
    - type: HTN
      rootTask:
        task: IdleCompound
    - type: NpcFactionMember
      factions:
      - SimpleNeutral
    - type: Sprite
      drawdepth: Mobs
      sprite: _Starlight/Mobs/Aliens/Kois/gold_black.rsi
      layers:
      - map: [ "enum.DamageStateVisualLayers.Base" ]
        state: alive
    - type: DamageStateVisuals
      states:
        Alive:
          Base: alive
        Dead:
          Base: dead
    - type: MeleeWeapon
      damage:
        types:
          Slash: 5
    - type: Tag
      tags:
        - DoorBumpOpener
        - CannotSuicide
    - type: StaticPrice
      price: -800
    - type: Butcherable
      spawned:
        - id: FoodMeatKoiFish
          amount: 2
        - id: MaterialToothSpaceCarp1
          amount: 1
          maxAmount: 4

