- type: entity
  parent: MobCorgiSmart
  id: MobCorgiSmartNoGalcom
  suffix: Speech Limited
  components:
  - type: LanguageKnowledge
    speaks:
    - Dog
    understands:
    - Dog
    - Canilunzt
    - GalacticCommon
- type: entity
  parent: MobCorgiSmartNoGalcom
  id: MobCorgiSmartGhostrole
  suffix: Speech Limited, Ghostrole
  components:
  - type: GhostRole
    allowMovement: true
    allowSpeech: true
    makeSentient: true
    name: ghost-role-information-smartcorgi-name
    description: ghost-role-information-smartcorgi-description
  - type: GhostTakeoverAvailable

- type: entity
  name: monkey
  suffix: Advanced
  id: MobMonkeyAdvanced
  parent: [MobBaseAncestor, BaseSpeciesPickupable]
  description: New church of neo-darwinists actually believe that EVERY animal evolved from a monkey. Tastes like pork, and killing them is both fun and relaxing.
  components:
  - type: NameIdentifier
    group: Monkey
  - type: Speech
    speechSounds: Monkey
    speechVerb: Monkey
  - type: SentienceTarget
    flavorKind: station-event-random-sentience-flavor-primate
  - type: AlwaysRevolutionaryConvertible
  - type: GhostRole
    prob: 0.05
    makeSentient: true
    name: ghost-role-information-monkey-advanced-name
    description: ghost-role-information-monkey-advanced-description
    rules: ghost-role-information-nonantagonist-rules
  - type: GhostTakeoverAvailable
  - type: Clumsy
    gunShootFailDamage:
      types:
        Blunt: 5
        Piercing: 4
        Heat: 3
    catchingFailDamage:
      types:
        Blunt: 1
    clumsySound:
      path: /Audio/Animals/monkey_scream.ogg
  - type: Tag
    tags:
      - Monkey
  - type: Body
    prototype: AdvancedPrimate
  - type: Inventory
    templateId: advancedmonkey
    speciesId: monkey
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Animals/displacements.rsi
            state: jumpsuit-monkey
      belt:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Animals/displacements.rsi
            state: belt-monkey
      gloves:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Animals/displacements.rsi
            state: hand-monkey

- type: entity
  name: kobold
  suffix: Advanced
  id: MobKoboldAdvanced
  parent: MobBaseKobold
  description: Cousins to the sentient race of lizard people, kobolds blend in with their natural habitat and are as nasty as monkeys; ready to pull out your hair and stab you to death.
  components:
  - type: GhostRole
    prob: 0.05
    makeSentient: true
    name: ghost-role-information-kobold-advanced-name
    description: ghost-role-information-kobold-advanced-description
    rules: ghost-role-information-nonantagonist-rules
  - type: Clumsy
    gunShootFailDamage:
      types:
        Blunt: 2
        Piercing: 7
        Heat: 3
    catchingFailDamage:
      types:
        Blunt: 1
    clumsySound:
      path: /Audio/Voice/Reptilian/reptilian_scream.ogg
  - type: Body
    prototype: AdvancedPrimate
    requiredLegs: 1
  - type: Inventory
    templateId: advancedmonkey
    speciesId: monkey
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Animals/displacements.rsi
            state: jumpsuit-kobold
      belt:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Animals/displacements.rsi
            state: belt-kobold
      gloves:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Animals/displacements.rsi
            state: hand-kobold

