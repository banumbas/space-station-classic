- type: entity
  parent: [BaseSpeciesPickupable, BaseMobProtogen]
  id: BaseMobProtoFelionoid
  name: Urist McFelinster
  abstract: true
  components:
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Machine
    - Nekomimetic
    understands:
    - GalacticCommon
    - Machine
    - Nekomimetic
    - Cat
  - type: HumanoidAppearance
    species: ProtoFelionoid
    hideLayersOnEquip:
    - Hair
  - type: Icon
    sprite: _FarHorizons/Mobs/Species/Proto-Feline/parts.rsi
    state: fullcat
  - type: Body
    prototype: ProtoFelionoid
    requiredLegs: 2
  - type: OwOAccent
  - type: MobThresholds
    thresholds:
      0: Alive
      85: Critical
      150: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      51: 0.7 # 60%
      68: 0.5 # 80%
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeat
      amount: 3
  - type: Damageable
    damageContainer: Hybrid
    damageModifierSet: ProtoFelionoid
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#7a8bf2"
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    attackRate: 2
    damage:
      types:
        Slash: 3
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
      Acidic: [ Touch, Ingestion ]
    reactions:
    - reagents: [ Water, SpaceCleaner ]
      methods: [ Touch ]
      effects:
      - !type:WashCreamPie
      - !type:Emote
        emote: Hisses
        showInChat: false
  - type: Vocal
    sounds:
      Male: ProtoFelionoidMSounds
      Female: ProtoFelionoidFSounds
      Unsexed: ProtoFelionoidMSounds
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - Felionoid
    - ProtoFelionoid
    - SiliconEmotesFH
    - NotLabelable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.30
        density: 110
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Wagging
  - type: Inventory
    speciesId: felionoid # Change when there's unique sprites
    templateId: protogen
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Felionoid/displacement.rsi
            state: jumpsuit
      eyes:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Felionoid/displacement.rsi
            state: eyes
      gloves:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Felionoid/displacement.rsi
            state: hand
      head:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Felionoid/displacement.rsi
            state: head
      back:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Felionoid/displacement.rsi
            state: back
      ears:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Felionoid/displacement.rsi
            state: ears
      shoes:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Felionoid/displacement.rsi
            state: shoes

