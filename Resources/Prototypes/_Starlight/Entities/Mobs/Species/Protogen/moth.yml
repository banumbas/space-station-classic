- type: entity
  save: false
  name: Urist McFluffster
  parent: [BaseMobProtogen, BaseSpeciesPickupableLarge]
  id: BaseMobProtoMoth
  abstract: true
  components:
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Machine
    - Moffic
    understands:
    - GalacticCommon
    - Machine
    - Moffic
    - Mothroach
  - type: Jump
    action: JumpMoth
  - type: Absorbable
  - type: HumanoidAppearance
    species: ProtoMoth
    hideLayersOnEquip:
    - HeadTop
    - Hair
  - type: Icon
    sprite: _FarHorizons/Mobs/Species/Proto-Moth/parts.rsi
    state: full
  - type: Body
    prototype: ProtoMoth
    requiredLegs: 2
  - type: Damageable
    damageContainer: Hybrid
    damageModifierSet: ProtoMoth
  - type: ZombieAccentOverride
    accent: zombieMoth
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeat
      amount: 5
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: InsectBlood
        Quantity: 300
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#808A51"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: MothAccent
  - type: MovementSpeedModifier
    baseWeightlessAcceleration: 1.5
    baseWeightlessFriction: 1
    baseWeightlessModifier: 1
  - type: Flammable
    damage:
      types:
        Heat: 4.5
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 46
  - type: TemperatureDamage
    heatDamageThreshold: 320
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold : 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 3 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      289: 0.9
      275: 0.8
      250: 0.7
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    layers:
      - map: [ "enum.HumanoidVisualLayers.Chest" ]
