- type: entity
  save: false
  parent: [BaseMobProtogen, BaseSpeciesPickupableLarge]
  id: BaseMobProtoThaven
  name: Urist McEarster
  abstract: true
  components:
  - type: LanguageKnowledge
    speaks:
      - GalacticCommon
      - Machine
      - Thaveyan
    understands:
      - GalacticCommon
      - Machine
      - Thaveyan
      - Carptongue
  - type: Icon
    sprite: _FarHorizons/Mobs/Species/Proto-Thaven/parts.rsi
    state: full
  - type: ThavenMoods
  - type: Respirator
    damage:
      types:
        Asphyxiation: 2
    damageRecovery:
      types:
        Asphyxiation: -1.0
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    scale: 1, 1.05
  - type: Body
    prototype: ProtoThaven
    requiredLegs: 2
  - type: HumanoidAppearance
    species: ProtoThaven
    hideLayersOnEquip:
    - Hair
  - type: MeleeWeapon
    attackRate: 0.55
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 0
  - type: StaminaDamageOnHit
    damage: 18
  - type: Butcherable
    butcheringType: Spike
    spawned:
      - id: FoodThavenMeat
        amount: 5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 120
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Damageable
    damageContainer: Hybrid
    damageModifierSet: ProtoThaven
  - type: Inventory
    templateId: protogen
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Thaven/displacement.rsi
            state: jumpsuit
      head:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Thaven/displacement.rsi
            state: head
      eyes:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Thaven/displacement.rsi
            state: eyes
      ears:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Thaven/displacement.rsi
            state: head
      mask:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Thaven/displacement.rsi
            state: mask
      neck:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Thaven/displacement.rsi
            state: neck
      outerClothing:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Thaven/displacement.rsi
            state: outerclothing_hardsuit
      gloves:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Thaven/displacement.rsi
            state: hands


