- type: entity
  parent: BaseMobProtogen
  id: BaseMobProtoLagomorph
  name: Urist McLagomorphster
  abstract: true
  components:
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Machine
    - Lagomorphian
    understands:
    - GalacticCommon
    - Machine
    - Lagomorphian
  - type: StaminaSurge
  - type: Zoomies
  - type: Wagging
  - type: Icon
    sprite: _Starlight/Mobs/Species/Lagomorph/parts.rsi # This needs to be replaced with Protolagos in the future.
    state: full
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: Damageable
    damageContainer: Hybrid
    damageModifierSet: ProtoLagomorph
  - type: Body
    prototype: ProtoLagomorph
    requiredLegs: 2
  - type: HumanoidAppearance
    species: ProtoLagomorph
    hideLayersOnEquip:
    - Hair
    - Snout
  - type: Hunger
    thresholds:
      Overfed: 210
      Okay: 165
      Peckish: 110
      Starving: 55
      Dead: 0
    baseDecayRate: 0.02
  - type: Thirst
    thresholds:
      OverHydrated: 610
      Okay: 465
      Thirsty: 310
      Parched: 155
      Dead: 0
  - type: Speech
    speechVerb: Robotic
    speechSounds: Borg
    allowedEmotes: ['Chirp', 'Hisses', 'Squish', 'Bubble', 'Pop', 'Bubble', 'Pop', 'Purr', 'Growl', 'Trill', 'Scree', 'Call', 'Squawk', 'Bark', 'Snarl', 'Whine', 'Howl', 'Yip', 'Mew', 'Meow', 'Liss', 'Lurr', 'Rattle', "Marr", "Wurble", 'Chitter', 'Squeak', 'Click', 'Beep', 'Ping', 'Buzz', 'Buzz-Two', 'Chime', 'Honk', 'ThavenHum', 'ThavenGlub', 'Squee', 'Snort', 'LagomorphSneeze', 'LagomorphSnore', 'LagomorphStomp']
  - type: BodyEmotes
    soundsId: LagomorphBodyEmotes
  - type: ChatListenerRange # way better at hearing, +2 to all
    voiceRange: 12
    whisperClearRange: 4
    whisperMuffledRange: 7
    allowExtendListenRange: true
  - type: Inventory
    speciesId: lagomorph #to be replaced with proto[species] when new sprites are made
    templateId: protogen
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Lagomorph/displacement.rsi
            state: jumpsuit
      outerClothing:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Lagomorph/displacement.rsi
            state: jumpsuit
  - type: MeleeWeapon
    animation: WeaponArcClaw
    soundHit:
      collection: AlienClaw
    damage:
      types:
        Slash: 5
  - type: Sprite
    layers:
    - map: [ "enum.HumanoidVisualLayers.Chest" ]
    - map: [ "enum.HumanoidVisualLayers.Head" ]
    - map: [ "enum.HumanoidVisualLayers.Snout" ]
    - map: [ "enum.HumanoidVisualLayers.Eyes" ]
    - map: [ "enum.HumanoidVisualLayers.FaceCover" ]
    - map: [ "enum.HumanoidVisualLayers.FaceCoverCover" ]
    - map: [ "enum.HumanoidVisualLayers.RArm" ]
    - map: [ "enum.HumanoidVisualLayers.LArm" ]
    - map: [ "enum.HumanoidVisualLayers.RLeg" ]
    - map: [ "enum.HumanoidVisualLayers.LLeg" ]
    - map: [ "enum.HumanoidVisualLayers.BodyCover" ]
    - map: [ "enum.HumanoidVisualLayers.BodyCoverCover" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentBottom" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentTop" ]
    - map: ["jumpsuit"]
    - map: ["enum.HumanoidVisualLayers.LFoot"]
    - map: ["enum.HumanoidVisualLayers.RFoot"]
    - map: ["enum.HumanoidVisualLayers.LHand"]
    - map: ["enum.HumanoidVisualLayers.RHand"]
    - map: [ "gloves" ]
    - map: [ "shoes" ]
    - map: [ "ears" ]
    - map: [ "eyes" ]
    - map: [ "outerClothing" ] # Starlight
    - map: [ "belt" ]
    - map: [ "id" ]
    - map: [ "back" ]
    - map: [ "neck" ]
    - map: [ "enum.HumanoidVisualLayers.SnoutCover" ]
    - map: [ "enum.HumanoidVisualLayers.FacialHair" ]
    - map: [ "enum.HumanoidVisualLayers.HeadSide" ] # For dewlap
    - map: [ "enum.HumanoidVisualLayers.Hair" ]
