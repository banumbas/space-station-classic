- type: entity
  save: false
  name: Urist McHands The Proto-Dwarf
  parent: [BaseMobProtogen, BaseSpeciesPickupable]
  id: BaseMobProtoDwarf
  abstract: true
  components:
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Machine
    - Grumbakul
    understands:
    - GalacticCommon
    - Machine
    - Grumbakul
  - type: MobThresholds
    thresholds:
      0: Alive
      110: Critical
      220: Dead
  - type: Absorbable
  - type: Icon
    sprite: _FarHorizons/Mobs/Species/Proto-Humie/parts.rsi
    state: full
  - type: Respirator
    damage:
      types:
        Asphyxiation: 2
    damageRecovery:
      types:
        Asphyxiation: -1.0
  - type: Damageable
    damageContainer: Hybrid
    damageModifierSet: ProtoDwarf
  - type: Body
    prototype: ProtoDwarf
    requiredLegs: 2
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        # they r smaller
        density: 120
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: ReplacementAccent
    accent: dwarf
  - type: HumanoidAppearance
    species: ProtoDwarf
    hideLayersOnEquip:
    - Hair
  - type: Inventory
    templateId: protogen
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - NotLabelable
    - SiliconEmotesFH
    - Protogen
    - Dwarf
    - ProtoDwarf

- type: entity
  parent: [BaseProtogenAppearance, BaseSpeciesDummy]
  id: AppearanceProtoDwarf
  categories: [ HideSpawnMenu ]
  components:
  - type: HumanoidAppearance
    species: ProtoDwarf
  - type: Inventory
    templateId: protogen
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
