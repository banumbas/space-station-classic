- type: entity
  save: false
  name: Urist McPlantster
  parent: [BaseMobProtogen, BaseSpeciesPickupableHuge]
  id: BaseMobProtoDiona
  abstract: true
  components:
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Machine
    - Sylvan
    understands:
    - GalacticCommon
    - Machine
    - Sylvan
  - type: Vocal
    sounds:
      Male: ProtoDionaMSounds
      Female: ProtoDionaFSounds
      Unsexed: ProtoDionaMSounds
  - type: Absorbable
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - Protogen
    - Diona
    - ProtoDiona
    - SiliconEmotesFH
    - NotLabelable
  - type: HumanoidAppearance
    species: ProtoDiona
  - type: Hunger
    baseDecayRate: 0.0083
  - type: Thirst
    baseDecayRate: 0.0083
  - type: Icon
    sprite: _FarHorizons/Mobs/Species/Proto-Dionae/parts.rsi
    state: full
  - type: Body
    prototype: ProtoDiona
    requiredLegs: 2
  - type: BodyEmotes
    soundsId: DionaBodyEmotes
  - type: Damageable
    damageContainer: Hybrid
    damageModifierSet: ProtoDiona
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#cd7314"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: Butcherable
    butcheringType: Spike
    spawned:
      - id: FoodMeatPlant
        amount: 5
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Sap
        Quantity: 300
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
      Acidic: [Touch, Ingestion]
    reactions:
    - reagents: [Water, SpaceCleaner]
      methods: [Touch]
      effects:
      - !type:WashCreamPie
    # Starlight:
    - reagents: [ ElfDiethylamine ]
      methods: [ Touch, Ingestion ]
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: -1
            Caustic: -0.5
            Genetic: -0.05
            Radiation: -0.05
    - reagents: [ PlantBGone ]
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        damage:
          types:
            Blunt: 0.05
            Slash: 0.05
            Piercing: 0.075
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "diona-hurt-by-herbicide-popup" ]
        probability: 0.66
    - reagents: [ WeedKiller ]
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 0.125
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "diona-hurt-by-herbicide-popup" ]
        probability: 0.66
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 300 #weighs more than humans because wood
        restitution: 0.0
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: IgnoreKudzu
  - type: IgniteOnHeatDamage
    fireStacks: 1
    maxFireStacks: 3
    threshold: 30
  - type: GibAction
    actionPrototype: DionaGibAction
    allowedStates:
    - Dead
  - type: Inventory
    templateId: protodiona
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: Rootable
  - type: NpcFactionMember
    factions:
    - NanoTrasen
    - Floral
  - type: MobThresholds
    thresholds:
      0: Alive
      125: Critical
      250: Dead

- type: entity
  parent: [BaseProtogenAppearance, BaseSpeciesDummy]
  id: AppearanceProtoDiona
  categories: [ HideSpawnMenu ]
  components:
  - type: HumanoidAppearance
    species: ProtoDiona
  - type: Inventory
    templateId: protodiona
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
