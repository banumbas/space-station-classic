- type: entity
  save: false
  name: Urist McRat
  parent: [BaseMobSpeciesOrganic, BaseSpeciesPickupable, BaseInventoryRodentia]
  id: BaseMobRodentia
  abstract: true
  components:
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Squeakish
    understands:
    - GalacticCommon
    - Squeakish
    - Mouse
  - type: Absorbable
  - type: Hunger
  - type: Icon
    sprite: _Starlight/Mobs/Species/Rodentia/parts.rsi
    state: rodentia
  - type: Body
    prototype: Rodentia
    requiredLegs: 2
  - type: Thirst
  - type: MouthStorage
    mouthProto: CheekStorage
    openStorageAction: ActionOpenMouthStorage
    spitDamageThreshold: 3
  - type: Butcherable
    butcheringType: Spike
    spawned:
      - id: FoodMeat
        amount: 3
  - type: MobThresholds
    thresholds:
      0: Alive
      85: Critical
      170: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      51: 0.7  # 60% - like felionoids
      68: 0.5  # 80% - like felionoids
  - type: TypingIndicator
    proto: rodentia
  - type: Speech
    speechVerb: Rodentia
    speechSounds: Squeak
    allowedEmotes: ['Squeak']
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.30
        density: 110
        restitution: 0.0
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: Sprite # Drawlayers. Top to bottom in order I believe.
    netsync: false
    layers:
    - map: [ "enum.HumanoidVisualLayers.Chest" ]
    - map: [ "enum.HumanoidVisualLayers.Head" ]
    - map: [ "enum.HumanoidVisualLayers.Snout" ]
    - map: [ "enum.HumanoidVisualLayers.Eyes" ]
    - map: [ "enum.HumanoidVisualLayers.RArm" ]
    - map: [ "enum.HumanoidVisualLayers.LArm" ]
    - map: [ "enum.HumanoidVisualLayers.RLeg" ]
    - map: [ "enum.HumanoidVisualLayers.LLeg" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentBottom" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentTop" ]
    - map: [ "jumpsuit" ]
    - map: [ "enum.HumanoidVisualLayers.LFoot" ] # Starlight: Layering fix
    - map: [ "enum.HumanoidVisualLayers.RFoot" ] # Starlight: Layering fix
    - map: [ "enum.HumanoidVisualLayers.LHand" ]
    - map: [ "enum.HumanoidVisualLayers.RHand" ]
    - map: [ "gloves" ]
    - map: [ "shoes" ] # Starlight start: Layering fix
    - map: [ "ears" ]
    - map: [ "eyes" ]
    - map: [ "outerClothing" ]
    - map: [ "belt" ]
    - map: [ "id" ]
    - map: [ "back" ]
    - map: [ "neck" ] # Starlight end: Layering fix
    - map: [ "enum.HumanoidVisualLayers.SnoutCover" ]
    - map: [ "enum.HumanoidVisualLayers.FacialHair" ]
    - map: [ "enum.HumanoidVisualLayers.Hair" ]
    - map: [ "enum.HumanoidVisualLayers.HeadSide" ]
    - map: [ "enum.HumanoidVisualLayers.HeadTop" ]
    - map: [ "enum.HumanoidVisualLayers.Tail" ]
    - map: [ "mask" ]
    - map: [ "head" ]
    - map: [ "pocket1" ]
    - map: [ "pocket2" ]
    - map: [ "enum.HumanoidVisualLayers.Handcuffs" ] # Starlight start: Layering fix
      color: "#ffffff"
      sprite: Objects/Misc/handcuffs.rsi
      state: body-overlay-2
      visible: false # Starlight end: Layering fix
    - map: [ "clownedon" ]
      sprite: "_Starlight/Effects/creampie.rsi"
      state: "creampie_rodentia"
      visible: false
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Vocal
    sounds:
      Male: MaleRodentia
      Female: FemaleRodentia
      Unsexed: MaleRodentia
  - type: AlwaysTriggerMousetrap
  - type: CrawlUnderObjects
    actionProto: ActionToggleSneakMode
  - type: Tag
    tags:
      - CanPilot
      - FootstepSound
      - DoorBumpOpener
      - AnomalyHost
      - Rodentia
      - NotLabelable
  - type: Item
    size: Huge
    allowDirectHandPickup: false
    shape:
      - 0, 0, 5, 3
  - type: VisualPickupable
    offsetFront: -0.16, -0.12
    offsetBack: -0.16, 0.05
  - type: Rummager
  - type: HumanoidAppearance
    species: Rodentia
    undergarmentTop: UndergarmentTopTanktopRodentia
    undergarmentBottom: UndergarmentBottomBoxersRodentia
    hideLayersOnEquip:
    - Hair
    - HeadTop
    - HeadSide
    - Snout
    markingsDisplacement:
      Hair:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Rodentia/displacement.rsi
            state: hair
      FacialHair:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Rodentia/displacement.rsi
            state: facialhair
  - type: DamageVisuals
    thresholds: [ 10, 30, 50, 70]
    targetLayers:
      - "enum.HumanoidVisualLayers.Chest"
      - "enum.HumanoidVisualLayers.Head"
      - "enum.HumanoidVisualLayers.LArm"
      - "enum.HumanoidVisualLayers.LLeg"
      - "enum.HumanoidVisualLayers.RArm"
      - "enum.HumanoidVisualLayers.RLeg"
    damageOverlayGroups:
      Brute:
        sprite: _Starlight/Mobs/Effects/Rodentia/brute_damage.rsi
        color: "#CC0000"
      Burn:
        sprite: _Starlight/Mobs/Effects/Rodentia/burn_damage.rsi
  - type: FireVisuals
    sprite: _Starlight/Mobs/Effects/onfire.rsi
    normalState: Resomi_minor_burning # Yes this is intentional, it works fine for rodentia.
    alternateState: Rodentia_burning
