- type: entity
  parent: [BaseMobSpeciesOrganic, BaseSpeciesPickupableHuge]
  id: BaseMobCyclorite
  abstract: true
  components:
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Terrum
    understands:
    - GalacticCommon
    - Terrum
  - type: Absorbable
  - type: Hunger
  - type: Icon
    sprite: _Starlight/Mobs/Species/Cyclorite/parts.rsi
    state: cyclorite
  # - type: CycloriteVision
  - type: NightVision
  - type: Thirst
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman # TODO: Make Sprite for butchered rock steak
      amount: 10
  - type: HumanoidAppearance
    species: Cyclorite
    hideLayersOnEquip:
    - Hair
    - Snout
  - type: Body
    prototype: Cyclorite
    requiredLegs: 2
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 300 # heavier due to being made from rocky skin, same weight as diona
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Critical # 50 extra health than base species to crit
      300: Dead # 100 extra damage required to kill
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Cyclorite
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#9457eb"
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcFist
    attackRate: 0.5
    damage:
      types:
        Blunt: 13
        Structural: 10
  - type: Sprite
    scale: 1.08, 1.08
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: CycloriteBlood
        Quantity: 300
  - type: MovementSpeedModifierScale
    movementSpeedScale: 0.5
  - type: SlowOnDamage
    speedModifierThresholds:
      90: 0.5 # 0.75 w/ Speed Modifier Scale, 60% of base health based on BaseMobSpecies
      120: 0 # 0.5 w/ Speed Modifier Scale, 80% of base health based on BaseMobSpecies
  - type: Vocal
    sounds:
      Male: MaleCyclorite
      Female: FemaleCyclorite
      Unsexed: MaleCyclorite
  - type: Crawler
    standTime: 4
    knockdownDamageThreshold: 10
  - type: Stamina
    forceStandStamina: 20
  - type: Inventory
    speciesId: cyclorite
    templateId: cyclorite
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Cyclorite/displacement.rsi
            state: jumpsuit
      eyes:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Cyclorite/displacement.rsi
            state: eyes
      gloves:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Cyclorite/displacement.rsi
            state: hand
      head:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Cyclorite/displacement.rsi
            state: head
      back:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Cyclorite/displacement.rsi
            state: back
      ears:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Cyclorite/displacement.rsi
            state: ears
      shoes:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Cyclorite/displacement.rsi
            state: shoes
      neck:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Cyclorite/displacement.rsi
            state: neck
      misc:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Cyclorite/displacement.rsi
            state: neck
      belt:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Cyclorite/displacement.rsi
            state: belt
      outerClothing:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Cyclorite/displacement.rsi
            state: outer

