- type: entity
  id: BorgChassisSyndicateStealth
  parent: BaseBorgChassisSyndicate
  name: syndicate stealth cyborg
  components:
  - type: TextToSpeech
  - type: Sprite
    sprite: _Starlight/Mobs/Silicon/Chassis/synd_stealth.rsi
    layers:
    - state: borg
    - state: borg_e
      map: [ "enum.BorgVisualLayers.Light" ]
      shader: unshaded
      visible: false
    - state: borg_l
      shader: unshaded
      map: [ "light" ]
      visible: false
  - type: Body
    prototype: BorgSyndicateStealth
  - type: BorgChassis
    maxModules: 5
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
      - BorgModuleSyndicate
      - BorgModuleSyndicateStealth
    hasMindState: borg_e
    noMindState: borg_e_r
  - type: InteractionPopup
    interactSuccessString: petting-success-syndicate-cyborg
    interactFailureString: petting-failure-syndicate-cyborg
  - type: VentCrawler
  - type: Thieving
    stealthy: true
  - type: Pacified # THE STEALTH BORG DOES NOT FUCKING GET GUNS

- type: entity
  id: BorgChassisSecurity
  parent: BorgChassisSelectable
  name: security cyborg
  components:
  - type: BorgSwitchableType
    selectedBorgType: security
  - type: SiliconLawProvider
    laws: SecurityCyborgLawset
  - type: FlashImmunity
  - type: SecurityBorg
  - type: ActionGrant
    actions:
    - ActionBorgOpenLawbook
    - ActionBorgCallForHelp
  - type: MobThresholds
    thresholds:
      0: Alive
      155: Critical
      355: Dead
    stateAlertDict:
      Alive: BorgHealth
      Critical: BorgCrit
      Dead: BorgDead
    showOverlays: false
    allowRevives: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 130
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Machines/warning_buzzer.ogg
          params:
            volume: 5
    - trigger:
        !type:DamageTrigger
        damage: 355
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:EmptyContainersBehaviour
        containers:
        - borg_brain
        - borg_module
        - cell_slot
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Damageable
    damageContainer: Silicon
    damageModifierSet: SecurityBorgArmor

- type: entity
  id: BorgChassisSecurityPowered
  parent: BorgChassisSecurity
  name: security cyborg
  suffix: Powered
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHigh
        blacklist:
          tags:
          - MechReactor

- type: entity
  id: BorgChassisPurrfus
  parent: BorgChassisSelectable
  name: purrfus cyborg
  components:
  - type: TextToSpeech
  - type: BorgSwitchableType
    selectedBorgType: purrfus

- type: entity
  id: PurrfusBorgChassisDerelict
  parent: BaseBorgChassisDerelict
  name: derelict purrfus cyborg
  description: A man-machine hybrid of the purrfus variety. This one is in a state of great disrepair.
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Silicon/Chassis/purrfus.rsi
    layers:
    - state: borg
    - state: borg_e_r
      map: [ "enum.BorgVisualLayers.Light" ]
      shader: unshaded
      visible: false
    - state: borg_l
      shader: unshaded
      map: [ "light" ]
      visible: false
  - type: BorgChassis
    maxModules: 5
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
    hasMindState: borg_e
    noMindState: borg_e_r
  - type: Construction
    node: derelictcyborg
  - type: InteractionPopup
    interactSuccessString: petting-success-derelict-cyborg
    interactFailureString: petting-failure-derelict-cyborg
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
    - Common
  - type: ActiveRadio
    channels:
    - Binary
    - Common

- type: entity
  id: BorgChassisCargo
  parent: BorgChassisSelectable
  name: cargo cyborg
  components:
  - type: TextToSpeech
  - type: BorgSwitchableType
    selectedBorgType: cargo

# TSF
# ? Make this Generic in the future if we have... More TSF Borgs?
- type: entity
  id: BorgChassisTSF
  parent: BaseBorgChassisNotIonStormable
  name: TSMC assault cyborg
  description: A purpose built assault silicon used by the TSMC.
  abstract: true
  components:
  - type: TextToSpeech
  - type: Sprite
    sprite: _Starlight/Mobs/Silicon/Chassis/tsmc.rsi
    layers:
    - state: assault
      map: ["enum.BorgVisualLayers.Body", "movement"]
    - state: assault_l
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: assault_l
      shader: unshaded
      map: ["light","enum.BorgVisualLayers.LightStatus"]
  - type: BorgChassis
    jobIconOverride: JobIconTSF
    jobTitleOverride: chat-radio-tsf-borg
    maxModules: 8
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
      - BorgModuleSecurity
    hasMindState: assault_l
    noMindState: assault_l
  - type: BypassLock
    bypassDelay: 15
  - type: Access
    tags:
    - Solgov
  - type: AccessReader
    access: [["Solgov"]]
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
    - TSF
    - Common
  - type: ActiveRadio
    channels:
    - Binary
    - TSF
    - Common
  - type: MovementAlwaysTouching
  - type: Speech
    speechSounds: SyndieBorg
    allowedEmotes:
    - Laugh
  - type: Vocal
    sounds:
      Unsexed: UnisexSiliconSyndicate
  - type: ShowJobIcons
  - type: ShowMindShieldIcons
  - type: SiliconLawProvider
    laws: SolgovLawset
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound
    - CanPilot
    - SiliconEmotes
    - Unimplantable
    - EmagImmune

# MedTak
- type: entity
  id: BorgChassisMedTak
  parent: BaseBorgChassisNotIonStormable
  name: MedTak silicon
  description: A multirole heavy silicon chassis designed to support MedTak units.
  abstract: true
  components:
    - type: TextToSpeech
    - type: Sprite
      sprite: _Starlight/Admeme/Mobs/Silicon/Chassis/medtak.rsi
      layers:
      - state: borg
      - state: borg_e
        map: [ "enum.BorgVisualLayers.Light" ]
        shader: unshaded
        visible: false
      - state: borg_l
        shader: unshaded
        map: [ "light" ]
        visible: false
    - type: BorgChassis
      jobIconOverride: JobIconMedTakBorg
      jobTitleOverride: chat-radio-medtak-borg
      maxModules: 8
      moduleWhitelist:
        tags:
        - BorgModuleGeneric
        - BorgModuleMedTak
      hasMindState: borg_e
      noMindState: borg_e_r
    - type: Repairable
      allowSelfRepair: true
    - type: BypassLock
      bypassDelay: 15
    - type: Access
      tags:
      - MedTak
    - type: AccessReader
      access: [["MedTak"]]
    - type: ShowHealthBars
    - type: SolutionScanner
    - type: FlashImmunity
      showInExamine: false
    - type: IntrinsicRadioTransmitter
      channels:
      - Binary
      - MedTak
      - Common
    - type: ActiveRadio
      channels:
      - Binary
      - MedTak
      - Common
    - type: MovementAlwaysTouching
    - type: Speech
      speechSounds: SyndieBorg
      allowedEmotes: ['Beep', 'Ping', 'Buzz', 'Buzz-Two', 'Chime']
    - type: Vocal
      sounds:
        Unsexed: UnisexSiliconSyndicate
    - type: ShowJobIcons
    - type: ShowMindShieldIcons
    - type: SiliconLawProvider
      laws: MedTakLawset
    - type: Tag
      tags:
      - DoorBumpOpener
      - FootstepSound
      - CanPilot
      - SiliconEmotes
      - Unimplantable
      - EmagImmune
    - type: PointLight
      color: "#d55858"
      radius: 5
      energy: 3
