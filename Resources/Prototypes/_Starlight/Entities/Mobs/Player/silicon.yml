# Borgs

# region syndicate
- type: entity
  id: PlayerBorgSyndicateStealthBattery
  parent: BorgChassisSyndicateStealth
  suffix: Battery, Module, Operative
  components:
  - type: NukeOperative
  - type: ContainerFill
    containers:
      borg_brain:
        - PositronicBrain
  - type: DefaultBorgModules
    modules:
      - BorgModuleSyndicateNukeDisk
      - BorgModuleOperative
      - BorgModuleTool
      - BorgModuleSyndicateStealth
      - BorgModuleSyndicateChameleonProjector
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper
        blacklist:
          tags:
          - MechReactor

- type: entity
  id: PlayerBorgSyndicateStealthGhostRole
  parent: PlayerBorgSyndicateStealthBattery
  suffix: Ghost role
  components:
    - type: GhostRole
      name: ghost-role-information-syndicate-cyborg-name
      description: ghost-role-information-syndicate-cyborg-description
      rules: ghost-role-information-silicon-rules
      important: true # SL
      raffle:
        settings: default
    - type: GhostTakeoverAvailable

- type: entity
  id: PlayerBorgChassis
  parent: BorgChassisSelectable
  suffix: Battery
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
        blacklist:
          tags:
          - MechReactor
  - type: StartingMindRole
    mindRole: "MindRoleSiliconBrain"
    silent: true

