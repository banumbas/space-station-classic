## NTCC Default Settings

- type: randomHumanoidSettings
  id: EventHumanoidNTNC
  parent: EventHumanoidMindShielded
  speciesBlacklist:
    - Rodentia
    - IPC
    - Diona
    - Resomi
    - Vox
    - Avali
    - Shadekin
    - Felionoid
    - Thaven
    - ProtoArachnid # Can't let them spawn as ghost roles, at least, not until we can figure out how to force equip armor on them.
    - ProtoDiona
    - ProtoReptilian
    - ProtoResomi
    - ProtoVox
    - ProtoVulp
    - ProtoAvali
    - ProtoFelionoid
    - ProtoKin
    - ProtoThaven
    - ProtoCyclorite
    - ProtoDwarf
    - ProtoMoth
    - ProtoSlimePerson
    - ProtoLagomorph
    - ProtoElf
    - Protogen
    - ProtoHuman
  components:
    - type: AutoImplant
      implants:
        - DeathRattleImplantCentcomm
        - RadioImplantCentcomm
        - DeathAcidifierImplant
        - FreedomImplant
        - MindShieldImplant

