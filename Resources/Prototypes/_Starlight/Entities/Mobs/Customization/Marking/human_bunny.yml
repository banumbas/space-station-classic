# Gene splicing from early Lagomorph?
- type: marking
  id: HumanLagomorphEarsTall
  bodyPart: HeadTop
  markingCategory: HeadTop
  speciesRestriction: [Human]
  coloring:
    default:
      type:
        !type:CategoryColoring
          category: Hair
      fallbackTypes:
        - !type:SkinColoring
    layers:
      ears_cat_inner:
        type:
          !type:SimpleColoring
            color: "#FFFFFF"
  sprites:
  - sprite: _Starlight/Mobs/Customization/lagomorph.rsi
    state: tall_ears_outer
  - sprite: _Starlight/Mobs/Customization/lagomorph.rsi
    state: tall_ears_inner

