- type: entity
  parent: ClothingHandsButcherable
  id: ClothingHandsGlovesBlackNitrile
  name: black nitrile gloves
  description: High-quality nitrile gloves. Expensive medical PPE, now in black!
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Hands/Gloves/blacknitrile.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/Hands/Gloves/blacknitrile.rsi
  - type: Fiber
    fiberMaterial: fibers-black-nitrile
  - type: FingerprintMask
  - type: Armor
    modifiers:
      coefficients:
        Caustic: 0.9
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.9

