# Base Mittens
- type: entity
  abstract: true
  parent: ClothingHandsBase # Not butcherable, no fur material
  id: ClothingHandsMittensBase
  components:
  - type: Fiber
    fiberMaterial: fibers-fur
  - type: FingerprintMask
  - type: DamageOnInteractProtection
    damageProtection:
      flatReductions:
        Heat: 5 # Average lightbulb
        Cold: 5 # I don't know when you're physically going to touch anything cold, but might as well add something for it.
  - type: Armor
    modifiers:
      coefficients:
        Cold: 0.90 # Entire reason I added these.
  - type: TemperatureProtection
    heatingCoefficient: 1.005 # They're really just on your hands.
    coolingCoefficient: 0.8 # They're not *that* great, they just protect your hands.

# Purple Mittens
- type: entity
  parent: ClothingHandsMittensBase
  id: ClothingHandsMittensColorPurple
  name: purple mittens
  description: Regular purple mittens to keep the cold out.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Hands/Mittens/Color/color.rsi
    layers:
    - state: icon
      color: "#9C0DE1"
    - state: dark-winterbits-icon
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#9C0DE1"
      - state: dark-winterbits-inhand-left
      right:
      - state: inhand-right
        color: "#9C0DE1"
      - state: dark-winterbits-inhand-right
  - type: Clothing
    sprite: _Starlight/Clothing/Hands/Mittens/Color/color.rsi
    clothingVisuals:
      gloves:
      - state: equipped-HAND
        color: "#9C0DE1"
      - state: dark-winterbits-equipped-HAND
  - type: Fiber
    fiberColor: fibers-purple-fur

