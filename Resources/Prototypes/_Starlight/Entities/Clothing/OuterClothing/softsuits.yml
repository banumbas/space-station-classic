#CBURN Softsuit
- type: entity
  parent: [ BaseCentcommContraband, ClothingOuterEVASuitBase ]
  id: ClothingOuterSoftsuitCBURN
  name: CBURN insulated EVA suit
  description: A heavyweight, tough and padded EVA capable biosuit used for special cleanup operations.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/OuterClothing/Hardsuits/cburn.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/OuterClothing/Hardsuits/cburn.rsi
    equipSound: /Audio/Mecha/mechmove03.ogg #starlight
    unequipSound: /Audio/Mecha/mechmove03.ogg #starlight
    equipDelay: 3 #starlight
    unequipDelay: 3 #starlight
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.3
        Piercing: 0.5
        Heat: 0.1
        Cold: 0.1
        Shock: 0.1
        Radiation: 0.1
        Caustic: 0.1
    staminaModifier: 0.2
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.1
  - type: ClothingSpeedModifier
    walkModifier: 0.75
    sprintModifier: 0.75
  - type: HeldSpeedModifier
  - type: Tag
    tags:
    - SuitEVA

- type: entity
  parent: [ClothingOuterEVASuitBase, BaseTSFContraband]
  id: ClothingOuterArmorTSF
  name: Federation marine combat armor
  description: A full-body suit of semi-powered assault armor used by the Trans-Solar Marine Corps. Offers excellent protection in all areas without impairing movement.
  components:
  - type: Pierceable
    level: Metal
  - type: Sprite
    sprite: _Starlight/Clothing/OuterClothing/Armor/tsf.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/OuterClothing/Armor/tsf.rsi
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    equipDelay: 3
    unequipDelay: 3
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.6
        Heat: 0.5
        Caustic: 0
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: StaminaResistance 
    damageCoefficient: 0.75
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.8
  - type: ClothingSpeedModifier
    walkModifier: 0.75
    sprintModifier: 0.75
  - type: HeldSpeedModifier
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepHeavy
      params:
        volume: -6
        variation: 0.09
  - type: Tag
    tags:
    - SuitEVA

- type: entity
  parent: ClothingOuterArmorTSF
  id: ClothingOuterArmorTSFLeader
  name: Federation marine officer's armor
  description: A full-body suit of semi-powered assault armor used by the Trans-Solar Marine Corps. Offers excellent protection in all areas without impairing movement. This suit has golden stripes instead of the typical white.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/OuterClothing/Armor/tsfleader.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/OuterClothing/Armor/tsfleader.rsi

#Wizard "Robes"
- type: entity
  parent: [ ClothingOuterEVASuitBase, BaseMagicalContraband ]
  id: ClothingOuterSoftsuitWizard
  name: wizard void robes
  description: A cumbersome gem-encrusted robe that is magically resistant to the void of space
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/OuterClothing/Suits/wizard.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/OuterClothing/Suits/wizard.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Heat: 0.95
  - type: ClothingSpeedModifier
    walkModifier: 0.7
    sprintModifier: 0.7
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetsoftsuitWizard
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
  - type: Tag
    tags:
    - CorgiWearable
    - Hardsuit
    - WhitelistChameleon
