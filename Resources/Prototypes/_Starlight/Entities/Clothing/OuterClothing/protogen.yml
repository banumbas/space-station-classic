# Moved here due to the significant changes we're making.
#### Proto-Armor ####
- type: entity
  parent: ClothingOuterBaseMedium
  id: ClothingOuterArmorProtogenBase
  abstract: true
  components:
  - type: Sprite
    sprite: Clothing/OuterClothing/Armor/security.rsi
  - type: Clothing
    sprite: Clothing/OuterClothing/Armor/security.rsi # Just a placeholder, since it's overwritten below.
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
  - type: ArmorSparkEffect
  - type: Item
    size: Huge
  - type: Tag
    tags:
    - ProtogenCybernetics
    - SurgeryCompatibleArmor


# Light Frames
- type: entity
  parent: ClothingOuterArmorProtogenBase
  id: ClothingOuterArmorProtogenLightBasic
  name: Basic-Class light protogen frame
  description: Comes in-built with light armor plating to shield the cybernetics within. Removal of this would require killing you.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Armor/protogen.rsi
    state: light
  - type: Armor
    modifiers:
      coefficients:
        Slash: 0.95
        Piercing: 0.95
  - type: ExplosionResistance # This is acceptable.
    damageCoefficient: 0.95

- type: entity
  parent: ClothingOuterArmorProtogenBase
  id: ClothingOuterArmorProtogenLightSpeed
  name: Hermes-Class light protogen frame
  description: Augments your body's agility, at the cost of being incredibly susceptible to sharp objects. Removal of this would require killing you.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Armor/protogen.rsi
    state: light
  - type: Armor # Starlight start, no armor
    modifiers:
      coefficients:
        Slash: 1.15
        Piercing: 1.15
  - type: ClothingSpeedModifier
    walkModifier: 1.05 # I mean, sure I guess.
    sprintModifier: 1.05 #Speed for weakness. Worth the trade?
# No explosion resist. This armor is entirely for increasing your speed.

- type: entity
  parent: ClothingOuterArmorProtogenLightBasic
  id: ClothingOuterArmorProtogenLightBasicUnremovable
  suffix: Unremovable
  components:
  - type: Unremoveable

- type: entity
  parent: ClothingOuterArmorProtogenLightSpeed
  id: ClothingOuterArmorProtogenLightSpeedUnremovable
  suffix: Unremovable
  components:
  - type: Unremoveable

# Medium Frames
- type: entity
  parent: ClothingOuterArmorProtogenBase
  id: ClothingOuterArmorProtogenMediumBasic
  name: Basic-Class medium protogen frame
  description: Comes in-built with moderate armor plating to shield the cybernetics within and protect the user. Removal of this would require killing you.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Armor/protogen.rsi
    state: medium
  - type: Armor
    modifiers:
      coefficients:
        Slash: 0.90 # Slash can be higher, it's fine.
        Blunt: 0.95 # We're not getting more Pierce armor.
        Piercing: 0.95 # If you want 5% for 5%...
  - type: ClothingSpeedModifier # Starlight start
    walkModifier: 1
    sprintModifier: 0.95 # Not really a good tradeoff, but it's still not weightless...

- type: entity
  parent: ClothingOuterArmorProtogenBase
  id: ClothingOuterArmorProtogenMediumMagic
  name: Hecate-Class medium protogen frame
  description: Its self-cleansing module grants resistance to biological hazards. Removal of this would require killing you.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Armor/protogen.rsi
    state: medium
  - type: Armor
    modifiers:
      coefficients:
        Poison: 0.85 # "Magic" class in terms of it gives you some really odd resistances...
        Cellular: 0.85
        Radiation: 0.85
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.80 # It's really an anti-bio frame.
  - type: TemperatureProtection
    heatingCoefficient: 1.15
    coolingCoefficient: 0.45 # It's effectively a winter coat if you think about it.
  - type: PointLight # Little light to go with it. Glow.
    radius: 2.5
    energy: 2
    color: "#452e59"
  - type: DarkLight
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 0.90 # Not too slow, and you get some niche resistances.

- type: entity
  parent: ClothingOuterArmorProtogenMediumBasic
  id: ClothingOuterArmorProtogenMediumBasicUnremovable
  suffix: Unremovable
  components:
  - type: Unremoveable

- type: entity
  parent: ClothingOuterArmorProtogenMediumMagic
  id: ClothingOuterArmorProtogenMediumMagicUnremovable
  suffix: Unremovable
  components:
  - type: Unremoveable

# Heavy Frames
- type: entity
  parent: ClothingOuterArmorProtogenBase
  id: ClothingOuterArmorProtogenHeavyBasic
  name: Basic-Class heavy protogen frame
  description: Comes in-built with heavy armor plating for active combat scenarios. Very heavy. Removal of this would require killing you.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Armor/protogen.rsi
    state: heavy
  - type: Armor
    modifiers:
      coefficients:
        Slash: 0.75 # Ever try to tear through metal?
        Blunt: 0.85 # They're weak to blunt, so it evens out somewhat.
        Piercing: 0.90 # Can't have too high resistance to pierce due to guns.
  - type: ClothingSpeedModifier
    walkModifier: 0.85
    sprintModifier: 0.75 #This is actually the combat frame.
  - type: ExplosionResistance
    damageCoefficient: 0.75

- type: entity
  parent: [ClothingOuterArmorProtogenBase, AllowSuitStorageClothing]
  id: ClothingOuterArmorProtogenHeavySpace
  name: Nyx-Class heavy protogen frame
  description: Comes in-built with heavy insulation for spacefaring. A bit weighty. Removal of this would require killing you.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Armor/protogen.rsi
    state: heavy
  - type: PressureProtection
    highPressureMultiplier: 0.6
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.35 # It's not as good as an EVA for cold/heat though.
    coolingCoefficient: 0.7 # Bad cold coefficient, reason to wear a winter coat in space.
  - type: Armor
    modifiers:
      coefficients:
        Heat: 0.9 # You can get a little of this too.
        Cold: 0.85 # This one is, for all intents and purposes, an EVA. You just need a helmet...
  - type: ClothingSpeedModifier
    walkModifier: 0.90
    sprintModifier: 0.85 #This is basically a permamnent EVA, but a little lighter.
  - type: ExplosionResistance
    damageCoefficient: 0.75
  - type: Tag
    tags:
    - ProtogenCybernetics
    - SurgeryCompatibleArmor
    - SuitEVA

- type: entity
  parent: ClothingOuterArmorProtogenHeavyBasic
  id: ClothingOuterArmorProtogenHeavyBasicUnremovable
  suffix: Unremovable
  components:
  - type: Unremoveable

- type: entity
  parent: ClothingOuterArmorProtogenHeavySpace
  id: ClothingOuterArmorProtogenHeavySpaceUnremovable
  suffix: Unremovable
  components:
  - type: Unremoveable

# Changeling Disguise
- type: entity
  parent: ClothingOuterArmorProtogenBase
  id: ChangelingClothingProtogenArmor
  name: Basic-Class light protogen frame
  description: Comes in-built with light armor plating to shield the cybernetics within. Removal of this would require killing you.
  suffix: Unremoveable
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Armor/protogen.rsi
    state: light
  - type: Armor
    modifiers: {}
  - type: ExplosionResistance
    damageCoefficient: 1.0
  - type: Unremoveable
