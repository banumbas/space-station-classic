# Fashion
- type: entity
  parent: [ClothingEyesBase, BaseToggleClothing]
  id: ClothingEyesSpaceCourierGoggles
  name: space courier goggles
  description: Stylish space courier replica goggles. Provides nominal eye protection, but you shouldn't count on it.
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Eyes/Glasses/spacecourier.rsi
      layers:
      - state: icon
        map: [ "enum.ToggleableVisuals.Layer" ]
    - type: Clothing
      sprite: _Starlight/Clothing/Eyes/Glasses/spacecourier.rsi
      slots:
      - HEAD
      - EYES
    - type: ItemToggle # Starts in activated state
      activated: true
    - type: ToggleClothing
      action: ActionToggleWeldingMask
    - type: Appearance
    - type: WeldingMask
    - type: GenericVisualizer
      visuals:
        enum.ToggleableVisuals.Enabled:
          enum.ToggleableVisuals.Layer:
            True: {state: icon}
            False: {state: icon-up}
    - type: ComponentToggler
      components:
      - type: IdentityBlocker
        coverage: EYES
      - type: EyeProtection
        protectionTime: 5

