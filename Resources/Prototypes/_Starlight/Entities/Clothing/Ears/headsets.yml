- type: entity
  parent: [ ClothingHeadset, BaseNanoTrasenContraband ]
  id: ClothingHeadsetIAA
  name: internal affairs agent headset
  description: A headset for internal affairs agents to hear the captain's last words.
  components:
    - type: ContainerFill
      containers:
        key_slots:
        - EncryptionKeyNanoTrasenUnremovable
        - EncryptionKeyLawSecurity
        - EncryptionKeyCommon
    - type: Sprite
      sprite: Clothing/Ears/Headsets/servicesecurity.rsi

