- type: entity
  parent: [Clothing, BaseSecurityScienceCommandContraband]
  id: ClothingNullSpaceDrainer
  name: nullspace drainer
  description: A Superimposed device that occupies the physical and nullspace. Intaking external and foreign energy into data. This device restrains and blocks entities from entering and or leaving nullspace.
  components:
    - type: Tag
      tags:
        - WhitelistChameleon
    - type: Sprite
      sprite: _Starlight/Clothing/Back/nullspaceteleporter.rsi
      state: icon
    - type: Item
      size: Huge
    - type: Clothing
      slots: BACK
      sprite: _Starlight/Clothing/Back/nullspaceteleporter.rsi
    - type: IdClothingBlocker
      freezeUser: false
      allowedAccesses:
        - Security
        - Cadet
        - Command
    - type: NullSpaceDrainer
    - type: TheDarkImmune
    - type: ResearchClient
    - type: ActivatableUI
      inHandsOnly: true
      key: enum.ResearchClientUiKey.Key
    - type: UserInterface
      interfaces:
        enum.ResearchClientUiKey.Key:
          type: ResearchClientBoundUserInterface
    - type: GuideHelp
      guides:
        - Brighteye

# Greenshield Officer
- type: entity
  parent: [ ClothingBackpack, BaseCentcommContraband ]
  categories: [ DoNotMap ]
  id: ClothingBackpackGreenshield
  name: greenshield cloak
  description: A spacious cloak with lots of pockets, worn by Greenshield officers.
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Back/thermalcloak.rsi
    - type: Clothing
      sprite: _Starlight/Clothing/Back/thermalcloak.rsi
    - type: Storage
      grid:
        - 0,0,2,5
        - 6,0,8,5
    - type: ExplosionResistance
      damageCoefficient: 0.1
