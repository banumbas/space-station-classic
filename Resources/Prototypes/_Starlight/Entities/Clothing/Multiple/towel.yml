- type: entity
  id: TowelColorPurple
  name: purple towel
  parent: BaseTowel
  components:
  - type: Sprite
    layers:
    - state: icon
      color: "#9C0DE1"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#9C0DE1"
      right:
      - state: inhand-right
        color: "#9C0DE1"
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-HELMET
        color: "#9C0DE1"
      jumpsuit:
      - state: equipped-INNERCLOTHING
        color: "#9C0DE1"
      belt:
      - state: equipped-BELT
        color: "#9C0DE1"
  - type: Fiber
    fiberColor: fibers-purple

