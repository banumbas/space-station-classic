- type: entity
  id: ShadekinDoor
  parent: HospitalCurtains
  name: shadekin door
  description: A door, where will it lead?
  suffix: ""
  components:
    - type: Fixtures
      fixtures:
        fix1:
          shape: !type:PhysShapeAabb
            bounds: "-0.49,-0.49,0.49,0.49"
          density: 100
          mask:
            - FullTileMask
          layer:
            - AirlockLayer
    - type: Sprite
      snapCardinals: true
      sprite: Structures/Decoration/Curtains/hospital.rsi
      color: "#795382"
      layers:
        - state: closed
          map: ["enum.DoorVisualLayers.Base"]
    - type: Door
      performCollisionCheck: true
    - type: Destructible
      thresholds:
        - trigger: !type:DamageTrigger
            damage: 300
          behaviors:
            - !type:DoActsBehavior
              acts: ["Destruction"]
    - type: BlockWeather
