# Starlight - Pirate gear closets
# Blood-red closets (LockerSyndicate style), one per pirate loadout variant.

# Base pirate loadout (PirateGear)
- type: entity
  id: ClosetPirateBase
  parent: LockerSyndicate
  name: pirate closet
  description: A blood-red closet reeking of saltwater. Basic pirate crew kit.
  suffix: Pirate, Base
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ClothingUniformJumpsuitPirate
        - id: ClothingBackpackSatchelLeather
        - id: ClothingHeadBandBlack
        - id: ClothingShoesBootsLaceup
        - id: PiratePDA
        - id: ClothingBeltUtility
        - id: AppraisalTool

