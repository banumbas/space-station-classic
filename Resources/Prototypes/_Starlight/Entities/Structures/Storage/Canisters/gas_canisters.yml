- type: entity
  parent: GasCanister
  id: UlnitraniumCanister
  name: ulnitranium canister
  components:
  - type: Sprite
    layers:
    - state: ulnitranium
  - type: GasCanister
    gasMixture:
      volume: 1500
      moles:
        Ulnitranium: 2769.36
      temperature: 293.15
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          UlnitraniumCanisterBroken:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:DumpCanisterBehavior
  - type: Lock
    locked: true

