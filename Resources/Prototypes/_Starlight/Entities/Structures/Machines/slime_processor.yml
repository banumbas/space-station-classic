- type: entity
  id: SlimeProcessor
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  name: slime processor
  description: Turns slime corpses into extracts. Try freezing them first!
  placement:
    mode: SnapgridCenter
  components:
    - type: Sprite
      sprite: _Starlight/Structures/Machines/slime_processor.rsi
      state: slime_processor_icon
      snapCardinals: true
    - type: SlimeProcessor
      processingTime: 5s
      yieldMultiplier: 4
      slimeAcquireCooldown: 1s
    - type: CollectingSlimeProcessor
    - type: Machine
      board: SlimeProcessorMachineCircuitboard
    - type: ContainerContainer
