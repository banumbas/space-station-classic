# Shuttle Weapons Control Console

- type: entity
  parent: BaseComputer
  id: ShuttleWeaponsConsole
  name: shuttle weapons control console
  description: A computer for controlling linked shuttle weapons and scanning nearby objects.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: solar_screen
    - map: ["computerLayerKeys"]
      state: generic_keys
  - type: Computer
    board: ShuttleWeaponsConsoleCircuitboard
  - type: RadarConsole
    maxRange: 512
  - type: DeviceLinkSource
    range: 200
    ports:
    - Gun1
    - Gun2
    - Gun3
    - Gun4
    - Gun5
    - Gun6
  - type: ActivatableUI
    key: enum.RadarConsoleUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
      enum.RadarConsoleUiKey.Key:
        type: RadarConsoleBoundUserInterface
  - type: DeviceNetworkRequiresPower
  - type: ApcPowerReceiver
    powerLoad: 500
  - type: ExtensionCableReceiver
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: StaticPrice
    price: 750
  # Starlight Start - Immersive Lighting PR
  - type: PointLight
    radius: 2.5
    energy: 1.3
    color: "#d6cec3"
  # Starlight End
