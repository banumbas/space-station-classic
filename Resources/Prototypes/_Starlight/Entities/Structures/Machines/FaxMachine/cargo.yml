# Group
- type: faxGroup
  id: FaxGroupCargo
  name: fax-group-cargo
  color: "#b48b57"
  order: 5000

# Base
- type: entity
  abstract: true
  parent: FaxMachineBase
  id: FaxMachineCargoBase
  components:
    - type: Sprite
      layers:
        - state: icon
          map: [ "base" ]
          color: "#b48b57"

# Fax machines
- type: entity
  parent: FaxMachineCargoBase
  id: FaxMachineCargo
  suffix: "SUP: Cargo"
  components:
    - type: Sprite
      layers:
        - state: icon
          map: [ "base" ]
          color: "#b48b57"
    - type: FaxMachine
      group: FaxGroupCargo
      name: "Cargo"
      order: 100

- type: entity
