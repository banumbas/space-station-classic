# Group
- type: faxGroup
  id: FaxGroupBlackstar
  name: fax-group-blackstar
  color: "#896e14"
  order: 1500 # All events: 1500
  selectable: false

# Single fax -- can be edited for mapping/event purposes.
- type: entity
  parent: FaxMachineBase
  id: FaxMachineBlackstar
  suffix: "Blackstar"
  categories: [ DoNotMap ]
  components:
    - type: Sprite
      layers:
        - state: icon
          map: [ "base" ]
          color: "#896e14"
    - type: FaxMachine
      group: FaxGroupBlackstar
      intrinsicGroup: FaxGroupBlackstar
      intrinsicLocked: true # No impersonating unless emagged
      name: "Blackstar"
      order: 500
