# Group
- type: faxGroup
  id: FaxGroupService
  name: fax-group-service
  order: 9000
  color: "#539c00"

# Base
- type: entity
  abstract: true
  parent: FaxMachineBase
  id: FaxMachineServiceBase
  components:
    - type: Sprite
      layers:
        - state: icon
          map: [ "base" ]
          color: "#539c00"

