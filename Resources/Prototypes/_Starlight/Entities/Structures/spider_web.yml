- type: entity
  id: SpiderWebAirtight
  parent: SpiderWebBase
  name: airtight spider web
  description: It's stringy, sticky, and airtight.
  components:
  - type: Airtight
  - type: Sprite
    color: "#bdd5e7ff"
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        density: 7
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        layer:
        - MidImpassable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.5
    sprintSpeedModifier: 0.5
    blacklist:
      components:
      - IgnoreSpiderWeb

