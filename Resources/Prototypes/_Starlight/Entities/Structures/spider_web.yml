- type: entity
  id: SpiderWebSlime
  parent: SpiderWebBase
  name: slime spider web
  description: It's stringy, sticky, and slimy.
  components:
  - type: Sprite
    color: "#94ffcdbe"
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        density: 7
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        layer:
        - MidImpassable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.3
    sprintSpeedModifier: 0.3
    blacklist:
      components:
      - IgnoreSpiderWeb
  - type: InjectOnCollide
    limit: 20
    reagents:
    - ReagentId: SpaceDrugs
      Quantity: 2
    blacklist:
      components:
      - IgnoreSpiderWeb

