# Xenoborg

- type: entity
  parent: BaseSign
  id: SignCoreXeno
  name: core sign
  description: A sign indicating the xenoborg core. Nice of them to mark this for you.
  components:
    - type: Sprite
      sprite: _Starlight/Structures/Wallmounts/xeno_signs.rsi
      state: core

- type: entity
  parent: BaseSign
  id: SignDoorsXeno
  name: doors sign
  description: A sign warning of doors. Don't stand in them when closing, you wouldn't want to be gibbed would you?
  components:
    - type: Sprite
      sprite: _Starlight/Structures/Wallmounts/xeno_signs.rsi
      state: doors

- type: entity
  parent: BaseSign
  id: SignPowerXeno
  name: power sign
  description: A sign indicating the xenoborg power systems. Electrical hazards ahead.
  components:
    - type: Sprite
      sprite: _Starlight/Structures/Wallmounts/xeno_signs.rsi
      state: power

- type: entity
  parent: BaseSign
  id: SignSpaceXeno
  name: space sign
  description: A sign indicating these doors leads to space. That heavy xenoborg might be lost forever! Don't end up like them.
  components:
    - type: Sprite
      sprite: _Starlight/Structures/Wallmounts/xeno_signs.rsi
      state: space

# Emergency
- type: entity
  parent: BaseWallmountMachine
  id: SignEmergencyExit
  name: exit
  description: A sign indicating that an exit is this way.
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Wallmounts/safety_signs.rsi
    layers:
    - state: exit
    - state: exit_unlit
      shader: unshaded

- type: entity
  parent: BaseWallmountMachine
  id: SignEmergencyEvac
  name: evac
  description: A sign indicating that Evac is this way
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Wallmounts/safety_signs.rsi
    layers:
    - state: evac
    - state: evac_unlit
      shader: unshaded
