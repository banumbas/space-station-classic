- type: entity
  parent: BaseWallmountMetallic
  id: JunctionBox
  name: junction box
  description: Used to house breakers and power switches, but its been cut from the main lines for a decade.
  components:
  - type: StaticPrice
    price: 5
  - type: Sprite
    drawdepth: WallMountedItems
    noRot: false
    sprite: _Starlight/Structures/Wallmounts/junctionbox.rsi
    state: junctionbox_closed
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          CableApcStack10:
            min: 1
            max: 1
  - type: Appearance
