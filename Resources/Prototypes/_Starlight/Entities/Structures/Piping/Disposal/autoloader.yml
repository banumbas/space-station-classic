- type: entity
  id: AutoLoaderUnit
  parent: DisposalUnitBase
  name: autoloader unit
  description: A pneumatic autoloader delivery unit.
  components:
  - type: Sprite
    sprite: Structures/Piping/disposal.rsi
    snapCardinals: true
    layers:
    - map: [ "enum.DisposalUnitVisualLayers.Base" ]
      state: disposal
    - map: [ "enum.DisposalUnitVisualLayers.OverlayCharging" ]
      state: dispover-charge
      visible: false
    - map: [ "enum.DisposalUnitVisualLayers.OverlayFull" ]
      state: dispover-full
      visible: false
    - map: [ "enum.DisposalUnitVisualLayers.OverlayFlushing" ]
      state: disposal-flush
      visible: false
    - map: [ "enum.DisposalUnitVisualLayers.OverlayEngaged" ]
      state: dispover-handle
      visible: false
    - sprite: _Starlight/Structures/Piping/disposal.rsi
      state: red
  - type: GenericVisualizer
    visuals:
      enum.DisposalUnitVisuals.IsReady:
        enum.DisposalUnitVisualLayers.Base:
          True: { state: disposal }
          False: { state: disposal-charging }
      enum.DisposalUnitVisuals.IsCharging:
        enum.DisposalUnitVisualLayers.OverlayCharging:
          True: { visible: true }
          False: { visible: false }
      enum.DisposalUnitVisuals.IsFull:
        enum.DisposalUnitVisualLayers.OverlayFull:
          True: { visible: true }
          False: { visible: false }
      enum.DisposalUnitVisuals.IsEngaged:
        enum.DisposalUnitVisualLayers.OverlayEngaged:
          True: { visible: true }
          False: { visible: false }
      enum.DisposalUnitVisuals.IsFlushing:
        enum.DisposalUnitVisualLayers.OverlayFlushing:
          True: { visible: true }
          False: { visible: false }
      enum.AnchorVisuals.Anchored:
        enum.DisposalUnitVisualLayers.Base:
          True: { state: disposal }
          False: { state: condisposal }
        enum.DisposalUnitVisualLayers.OverlayEngaged:
          False: { visible: false }
        enum.DisposalUnitVisualLayers.OverlayCharging:
          False: { visible: false }
        enum.DisposalUnitVisualLayers.OverlayFull:
          False: { visible: false }
        enum.DisposalUnitVisualLayers.OverlayFlushing:
          False: { visible: false }
