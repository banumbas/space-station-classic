# ============================================================================
# Plumbing Ducts
# ============================================================================
# Ducts allow transport of reagents through the plumbing network.
# All ducts inherit from PlumbingDuctBase for common components.
# ============================================================================

# ============================================================================
# BASE ENTITY
# ============================================================================

- type: entity
  abstract: true
  parent: BaseItem
  id: PlumbingDuctBase
  name: fluid duct
  description: A duct for transporting reagents through the plumbing network.
  placement:
    mode: SnapgridCenter
  components:
  - type: AtmosPipeLayers
    numberOfPipeLayers: 3
    spriteLayersRsiPaths:
      enum.PipeVisualLayers.Pipe:
        Primary: _Starlight/Structures/Piping/Plumbing/fluid_ducts.rsi
        Secondary: _Starlight/Structures/Piping/Plumbing/fluid_ducts_alt1.rsi
        Tertiary: _Starlight/Structures/Piping/Plumbing/fluid_ducts_alt2.rsi
  - type: Visibility
    layer: 1
  - type: Item
    size: Normal
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _Starlight/Structures/Piping/Plumbing/fluid_ducts.rsi
    drawdepth: ThinPipe
    visible: false
  - type: Appearance
  - type: PipeColorVisuals
  - type: AtmosPipeColor
  - type: Clickable
  - type: InteractionOutline
  - type: SubFloorHide
  - type: CollideOnAnchor
  - type: Anchorable
  - type: Pullable
  - type: Rotatable
  - type: NodeContainer
  - type: Tag
    tags:
    - PlumbingDuct
  - type: Physics
    canCollide: false
    bodyType: static
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -8
      - !type:DoActsBehavior
        acts: [Breakage]
  - type: PipeRestrictOverlap
  - type: RCDDeconstructable
    cost: 1
    delay: 2
    fx: EffectRCDDeconstruct2
    rpld: true
  - type: StaticPrice
    price: 20

# ============================================================================
# DUCT VARIANTS
# ============================================================================

# --------------------------------
# Straight Duct
# --------------------------------
- type: entity
  parent: PlumbingDuctBase
  id: PlumbingDuctStraight
  name: fluid duct
  suffix: Straight
  placement:
    mode: AlignAtmosPipeLayers
  components:
  - type: NodeContainer
    nodes:
      duct:
        !type:PlumbingNode
        nodeGroupID: Plumbing
        pipeDirection: Longitudinal
  - type: Sprite
    layers:
    - state: ductStraight
      map: [ "enum.PipeVisualLayers.Pipe" ]
  - type: PipeAppearance
    sprite:
    - sprite: _Starlight/Structures/Piping/Plumbing/fluid_ducts.rsi
      state: ductConnector
    - sprite: _Starlight/Structures/Piping/Plumbing/fluid_ducts_alt1.rsi
      state: ductConnector
    - sprite: _Starlight/Structures/Piping/Plumbing/fluid_ducts_alt2.rsi
      state: ductConnector
  - type: AtmosPipeLayers
    alternativePrototypes:
      Primary: PlumbingDuctStraight
      Secondary: PlumbingDuctStraightAlt1
      Tertiary: PlumbingDuctStraightAlt2
  - type: Item
    storedSprite:
      sprite: _Starlight/Structures/Piping/Plumbing/fluid_ducts.rsi
      state: storageStraight
    shape:
    - 0,0,0,2

