# --------------------------------
# Plumbing Manifold Duct
# --------------------------------
- type: entity
  parent: PlumbingDuctBase
  id: PlumbingDuctManifold
  name: fluid manifold
  description: A manifold for connecting ducts on all layers.
  placement:
    mode: AlignAtmosPipeLayers
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Piping/Plumbing/plumbing_manifold.rsi
    layers:
    - state: duct_manifold
      map: [ "enum.PipeVisualLayers.Pipe" ]
  - type: PlumbingConnectorAppearance
    offset: 0.09375
  - type: PlumbingManifold
    sideA: [sideA0, sideA1, sideA2]
    sideB: [sideB0, sideB1, sideB2]
  - type: NodeContainer
    nodes:
      sideA0:
        !type:PlumbingNode
        nodeGroupID: Plumbing
        pipeDirection: North
        pipeLayer: 0
      sideA1:
        !type:PlumbingNode
        nodeGroupID: Plumbing
        pipeDirection: North
        pipeLayer: 1
      sideA2:
        !type:PlumbingNode
        nodeGroupID: Plumbing
        pipeDirection: North
        pipeLayer: 2
      sideB0:
        !type:PlumbingNode
        nodeGroupID: Plumbing
        pipeDirection: South
        pipeLayer: 0
      sideB1:
        !type:PlumbingNode
        nodeGroupID: Plumbing
        pipeDirection: South
        pipeLayer: 1
      sideB2:
        !type:PlumbingNode
        nodeGroupID: Plumbing
        pipeDirection: South
        pipeLayer: 2
  - type: AtmosPipeLayers
    pipeLayersLocked: true
    spriteLayersRsiPaths:
      enum.PipeVisualLayers.Pipe:
        Primary: _Starlight/Structures/Piping/Plumbing/plumbing_manifold.rsi
        Secondary: _Starlight/Structures/Piping/Plumbing/plumbing_manifold.rsi
        Tertiary: _Starlight/Structures/Piping/Plumbing/plumbing_manifold.rsi
    alternativePrototypes:
      Primary: PlumbingDuctManifold
      Secondary: PlumbingDuctManifoldAlt1
      Tertiary: PlumbingDuctManifoldAlt2
  - type: Item
    storedSprite:
      sprite: _Starlight/Structures/Piping/Plumbing/fluid_ducts.rsi
      state: storageStraight

