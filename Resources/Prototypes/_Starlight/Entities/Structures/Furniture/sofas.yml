#Diner Booth
- type: entity
  name: diner booth
  suffix: End Left
  id: DinerEndLeft
  parent: SeatBase
  description: It looks like cheap plastic, and smells like fries.
  components:
  - type: Transform
    anchored: true
  - type: Rotatable
  - type: Sprite
    sprite: _Starlight/Structures/Furniture/Sofas/diner_end_left.rsi
    state: base
  - type: Physics
    bodyType: Static
  - type: StaticPrice
    price: 70
  - type: Construction
    graph: SofaSL
    node: boothLeft

