# Chapel (Shrine) Pew

- type: entity
  name: Pew Base
  id: PewBase
  abstract: true
  parent: ChairBase
  components:
  - type: Damageable
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 1
  - type: Tag
    tags:
    - Wooden
  - type: StaticPrice
    price: 250

- type: entity
  name: Wood Pew
  suffix: End Left
  id: PewEndLeft
  parent: PewBase
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Furniture/Benches/pew_end_left.rsi
    state: base
  - type: Construction
    graph: BenchSL
    node: pewLeft

- type: entity
  name: Wood Pew
  suffix: End Right
  id: PewEndRight
  parent: PewBase
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Furniture/Benches/pew_end_right.rsi
    state: base
  - type: Construction
    graph: BenchSL
    node: pewRight

- type: entity
  name: Wood Pew
  suffix: Middle
  id: PewMiddle
  parent: PewBase
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Furniture/Benches/pew_middle.rsi
    state: base
  - type: Construction
    graph: BenchSL
    node: pewMid

