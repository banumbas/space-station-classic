- type: entity
  parent: BaseSMES
  id: SMESBlue
  suffix: Hyper Advanced, 64MJ
  name: hyper advanced SMES
  description: An even-higher-capacity superconducting magnetic energy storage (SMES) unit.
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Power/smes.rsi #SL Edit
    snapCardinals: true
    layers:
    - state: smes-blue
    - state: smes-blue-fan
    - map: [ "enum.SmesVisualLayers.Charge" ]
      state: "smes-og1" # -og0 does not exist
      shader: unshaded
      visible: false
    - map: [ "enum.SmesVisualLayers.Input" ]
      state: "smes-oc0"
      shader: unshaded
    - map: [ "enum.SmesVisualLayers.Output" ]
      state: "smes-op1"
      shader: unshaded
    - map: ["enum.WiresVisualLayers.MaintenancePanel"]
      state: smes-blue-open
  - type: Machine
    board: SMESHyperAdvancedMachineCircuitboard
  - type: Battery
    maxCharge: 64000000
    startingCharge: 64000000
  - type: PowerMonitoringDevice
    group: SMES
    sourceNode: input
    loadNode: output
    collectionName: smes
    sprite: _Starlight/Structures/Power/smes.rsi #SL Edit
    state: smes-blue-static

- type: entity
  parent: SMESBlue
  id: SMESBlueEmpty
  suffix: Empty
  components:
  - type: Battery
    startingCharge: 0
