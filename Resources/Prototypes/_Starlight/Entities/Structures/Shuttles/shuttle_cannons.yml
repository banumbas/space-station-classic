# Starlight Shuttle Cannons

# NTSF-CYERXA Dual 120mm Cannon - Based on Duster, fires 2 shots per trigger
- type: entity
  id: ShuttleGunNTSFCyerxa120mm
  parent: ShuttleGunBase
  name: CYERXA Dual 120mm Cannons
  description: A powerful dual 120mm cannon system designed for heavy shuttle combat. Fires devastating blast grenades with extreme destructive power. Each activation fires both barrels in rapid succession.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shuttleguns/ntsf_cyerxa_120mm.rsi
    state: space_artillery
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 500
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Anchorable
    delay: 90
  - type: Pullable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    projectileSpeed: 50
    fireRate: 1.0
    burstFireRate: 4
    shotsPerBurst: 2
    burstCooldown: 75
    selectedMode: Burst
    angleDecay: 30
    minAngle: 0
    maxAngle: 10
    availableModes:
    - Burst
    soundGunshot:
      path: /Audio/_Starlight/Weapons/Shuttleguns/uaf_cyrexa_452.ogg
      params:
        variation: 0.05
        volume: 5
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: MagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        priority: 2
        whitelist:
          tags:
          - MagazineGrenade120mm
        insertSound:
          path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
          params:
            pitch: 2
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
  - type: GunneryTrackable
  - type: StaticPrice
    price: 5000

# Apollo Heavy Laser Cannon - Slow firing devastating energy weapon
- type: entity
  id: ShuttleGunApollo
  parent: ShuttleGunBase
  name: Apollo Heavy Laser Cannon
  description: A devastating heavy laser cannon system designed for siege warfare. Fires an extremely powerful laser beam that melts through armor and structures. Slow recharge time between shots.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shuttleguns/Apollo.rsi
    layers:
    - state: space_artillery
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    fireRate: 1
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
      params:
        variation: 0.05
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: Magazine
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - PowerCage
  - type: BatteryAmmoProvider
    proto: ApolloHeavyLaser
    fireCost: 500
  - type: RadarLaserTracker
    laserColor: "#FF44FF"
    traceDuration: 0.75
    maxRange: 35.0
  - type: GunneryTrackable

# Vanyk-MK2 60mm Rocket Launcher - Multi-rocket burst fire system
- type: entity
  id: ShuttleGunVanyk
  parent: ShuttleGunBase
  name: Vanyk-MK2 Multi-Rocket System
  description: A rapid-fire 60mm rocket launcher system designed for sustained fire. Launches rockets in bursts of 3. Uses magazine-fed ammunition with 30-round capacity.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shuttleguns/vanyk-MK2.rsi
    layers:
    - state: space_artillery
      map: ["enum.GunVisualLayers.Base"]
    - state: space_artillery
      map: ["enum.GunVisualLayers.Mag"]
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 500
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Anchorable
    delay: 90
  - type: Pullable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    projectileSpeed: 40
    fireRate: 0.5
    selectedMode: SemiAuto
    angleDecay: 20
    minAngle: 0
    maxAngle: 8
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rpgfire.ogg
      params:
        variation: 0.08
        volume: 6
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: MagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        priority: 2
        whitelist:
          tags:
          - Magazine60mmRocket
        insertSound:
          path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
          params:
            pitch: 1.5
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
  - type: Appearance
  - type: GunneryTrackable
  - type: StaticPrice
    price: 6000

# M321-CHARYBDIS 'Thanatos' 280mm Railgun - Single-shot, manually loaded, extreme damage
- type: entity
  id: ShuttleGunCharon
  parent: ShuttleGunBase
  name: M321-CHARYBDIS 'Thanatos' 280mm Railgun
  description: A single-shot electromagnetic railgun of unparalleled destructive capability. Accelerates a 280mm slug to devastating velocities. Requires manual loading of each round into the open chamber before firing. Named for the devouring whirlpool of legend - because that is what awaits those who face one.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shuttleguns/Charon.rsi
    state: space_artillery
  - type: ContainerContainer
    containers:
      ballistic_chamber: !type:ContainerSlot
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 500
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Anchorable
    delay: 120
  - type: Pullable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    projectileSpeed: 150    # railgun slug velocity
    fireRate: 100           # instant fire when loaded - delay is the manual reload
    selectedMode: SemiAuto
    angleDecay: 90
    minAngle: 0
    maxAngle: 0             # perfect accuracy
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_Starlight/Weapons/Shuttleguns/leviathan_fire.ogg
      params:
        variation: 0.05
        volume: 15
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: BallisticAmmoProvider
    mayTransfer: false
    whitelist:
      tags:
      - Cartridge280mmSlug
    proto: CartridgeCharon280mmSlug
    capacity: 1
    soundRack:
      path: /Audio/Weapons/Guns/Bolt/lmg_bolt_closed.ogg
      params:
        variation: 0.05
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
      params:
        pitch: 0.6
        volume: 3
  - type: GunneryTrackable
  - type: StaticPrice
    price: 25000

