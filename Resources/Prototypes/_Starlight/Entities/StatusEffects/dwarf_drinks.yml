# special modifiers and status effects used exclusively by dwarves getting drunk

# Courage Effects

- type: entity
  parent: MobStatusEffectBase
  id: MobThresholdsTheHighlander
  name: <<TheHighlander Status Effect>>
  components:
  - type: StatusEffect
    whitelist:
      components:
        - MobState
        - StandingState
      requireAll: true
    blacklist:
      tags:
      - KnockdownImmune
    maximumDuration: 3s
  - type: StatusEffectAlert
    alert: DwarfCourage
  - type: MobThresholdsStatusEffect
    thresholds:
      0: Alive
      219: Critical
      220: Dead
  - type: SoundStatusEffect
    startSound:
      path: /Audio/_Starlight/Magic/dwarf-buff-highlander.ogg

- type: entity
  parent: MobStatusEffectBase
  id: MobThresholdsDeathInTheAfternoon
  name: <<DeathInTheAfternoon Status Effect>>
