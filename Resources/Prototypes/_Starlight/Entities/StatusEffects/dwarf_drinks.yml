# special modifiers and status effects used exclusively by dwarves getting drunk

# Courage Effects

- type: entity
  parent: MobStatusEffectBase
  id: MobThresholdsTheHighlander
  name: uncrittable
  components:
  - type: StatusEffect
    whitelist:
      components:
        - MobState
        - StandingState
      requireAll: true
    blacklist:
      tags:
      - KnockdownImmune
    maximumDuration: 3s
  - type: StatusEffectAlert
    alert: DwarfCourage
  - type: MobThresholdsStatusEffect
    thresholds:
      0: Alive
      219: Critical
      220: Dead
  - type: SoundStatusEffect
    startSound:
      path: /Audio/_Starlight/Magic/dwarf-buff-highlander.ogg

- type: entity
  parent: MobStatusEffectBase
  id: MobThresholdsDeathInTheAfternoon
  name: resilience to death
  components:
  - type: StatusEffect
    whitelist:
      components:
        - MobState
        - StandingState
      requireAll: true
    blacklist:
      tags:
      - KnockdownImmune
    maximumDuration: 3s
  - type: StatusEffectAlert
    alert: DwarfCourage
  - type: MobThresholdsStatusEffect
    thresholds:
      0: Alive
      129: Critical
      130: Dead

- type: entity
  abstract: true
  id: BonusArmorDwarfGeneric
  name: <<Dwarf Armor Mod Status Effect>>
