    whitelist:
      components:
        - MobState
        - StandingState
      requireAll: true
    blacklist:
      tags:
      - KnockdownImmune
  - type: StatusEffectAlert
    alert: DwarfFortitude

# Fortitude Effects

# Example of BonusArmorStatusEffect and SoundStatusEffect with all parameters set:
- type: entity
