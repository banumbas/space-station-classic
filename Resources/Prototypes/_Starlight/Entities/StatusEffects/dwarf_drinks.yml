# Fury Effects

- type: entity
  abstract: true
  id: BonusScalarDwarfGeneric
  name: <<Dwarf BonusScalar Status Effect>>
  components:
  - type: StatusEffect
    whitelist:
      components:
        - MobState
        - StandingState
      requireAll: true
    blacklist:
      tags:
      - KnockdownImmune
  - type: StatusEffectAlert
    alert: DwarfFury

- type: entity
  parent: BonusScalarDwarfGeneric
  id: BonusScalarIrishCream
  name: 25% increased attack rate when unarmed
  components:
  - type: BonusScalarStatusEffect
    # reference example of all possible effects for BonusScalarStatusEffect:
    coefficients:
      unarmedAttackRate: 1.25 # bigger is faster
      unarmedDamage: 1.0 # bigger is more damaging
      meleeWeaponAttackRate: 1.0 # bigger is faster
      meleeWeaponDamage: 1.0 # bigger is more damaging
      doAfterDelay: 1.0 # smaller is faster!
  - type: SoundStatusEffect
    startSound:
      path: /Audio/_Starlight/Magic/dwarf-buff-generic.ogg

- type: entity
  parent: BonusScalarDwarfGeneric # not actually a BonusScalarStatusEffect, but whatever -- we're using the same icon anyway
  id: BonusDamageBraveBull
  name: added Structural damage to unarmed attacks
  components:
  - type: BonusDamageStatusEffect
    # reference example of all possible effects for BonusDamageStatusEffect:
    affectsUnarmed: true
    affectsMeleeWeapons: false
    damage:
      types:
        Structural: 10 # you will rarely actually see this number, because most structures have damage reduction
      groups:
        Brute: 0
  - type: SoundStatusEffect
    startSound:
      path: /Audio/_Starlight/Magic/dwarf-buff-generic.ogg

- type: entity
  parent: BonusScalarDwarfGeneric
  id: BonusScalarBronx
  name: 50% increased unarmed damage
