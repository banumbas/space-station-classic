# Fortitude Effects

# Example of BonusArmorStatusEffect and SoundStatusEffect with all parameters set:
- type: entity
  parent: BonusArmorDwarfGeneric
  id: BonusArmorWhiskey
  name: <<Whiskey Status Effect>>
  components:
  - type: BonusArmorStatusEffect
    ignoreKnockdown: false
    staminaDamageModifier: 1.0
    explosionResistance: 1.00
    modifiers:
      coefficients:
        Blunt: 0.90
  - type: SoundStatusEffect
    startSound:
      path: /Audio/_Starlight/Magic/dwarf-buff-whiskey.ogg
      params:
        volume: -12.0
    startPositional: false
    #endSound:
    #  path: /Audio/_Starlight/Magic/gust.ogg
    endPositional: false

