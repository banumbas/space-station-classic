 # * Yeah... New StatusEffect System does not have Temp Blindness...
# ! Remove it if Upstream ever make a version with the new StatusEffect
- type: entity
  parent: MobStatusEffectDebuff
  id: StatusEffectTemporaryBlindness
  name: status-effect-misc-temporary-blindness
  components:
  - type: StatusEffect
    whitelist:
      components:
      - MobState
      - Blindable
      requireAll: true
  - type: TemporaryBlindness

# Upstream also does not have an updated status effect for muted. Delete this when they do,
# but keep the "maximumDuration", that's a Starlight change.
- type: entity
  parent: MobStatusEffectDebuff
  id: StatusEffectMuted
  name: status-effect-misc-muted
  components:
    - type: StatusEffect
      whitelist:
        components:
          - MobState
          - Blindable
        requireAll: true
      maximumDuration: 4m
    - type: Muted
    - type: StatusEffectAlert
      alert: Muted

- type: entity
  parent: MobStatusEffectDebuff
  id: StatusEffectTheDark
  name: status-effect-misc-the-dark
  components:
  - type: StatusEffect
    whitelist:
      components:
      - MobState
    blacklist:
      components:
      - Shadekin
      - TheDarkImmune
    maximumDuration: 2m 
  - type: DrunkStatusEffect
  - type: DrowsinessStatusEffect
    sleepIncident: false
    knockdownIncident: true

# Map Version so its we edit it slightly.
- type: entity
  parent: StatusEffectTheDark
  id: StatusEffectTheDarkMap
  components:
  - type: StatusEffectAlert
    alert: ShadekinTheDarkAlert

- type: entity
  parent: MobStatusEffectDebuff
  id: StatusEffectHeldBreath
  name: status-effect-misc-holding-breath
  components:
  - type: StatusEffect
    whitelist:
      components:
      - Respirator
  - type: StatusEffectAlert
    alert: BreathHeld
  - type: HeldBreathStatusEffect
