- type: entity
  id: RandomVendingMedical
  name: random medical vending machine spawner
  suffix: Departmental
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: red
      - sprite: _Starlight/Structures/Machines/VendingMachines/random.rsi
        state: medical
  - type: RandomSpawner
    prototypes:
      - VendingMachineMedical
      - VendingMachineMedical
      - VendingMachineMedical
      - VendingMachineMedical
      - VendingMachineMedical
      - VendingMachineMedical
      - VendingMachineMedical # 70% chance of NanoMed Plus, ignoring the rare prototype
      - VendingMachineMedicalDeforest
      - VendingMachineMedicalDeforest # 20% chance of DeForest Interstellar
      - VendingMachineMedicalSyndicate # 10# chance of Interdyne Enterprise
    chance: 1
    rarePrototypes:
    - VendingMachineMedicalGold # 1% chance of NanoMed Plus GOLD
    rareChance: 0.01

