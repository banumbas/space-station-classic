- type: entity
  parent: [ SmokeGrenade ]
  id: LubeGrenade
  name: lube grenade
  description: Special grenade for shenanigans, releasing large cloud of lube foam.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Grenades/lube.rsi
  - type: SmokeOnTrigger
    keysIn:
    - timer
    duration: 10
    spreadAmount: 25
    smokePrototype: Foam
    solution:
      reagents:
      - ReagentId: SpaceLube
        Quantity: 20
  - type: EorgPreventTrigger # Starlight

- type: entity
  parent: [ SmokeGrenade ]
  id: GlueGrenade
  name: glue grenade
  description: Special grenade for shenanigans, releasing large cloud of glue foam.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Grenades/glue.rsi
  - type: SmokeOnTrigger
    keysIn:
    - timer
    duration: 15
    spreadAmount: 20
    smokePrototype: Foam
    solution:
      reagents:
      - ReagentId: SpaceGlue
        Quantity: 20
  - type: EorgPreventTrigger # Starlight

- type: entity
  parent: SmokeGrenade
  id: ToxicGasGrenade
  name: acidic gas grenade
  description: A painful crowd control gas grenade full of Sulfuric Acid. Turn on your internals before using it.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Grenades/toxic_gas.rsi
  - type: SmokeOnTrigger
    keysIn:
    - timer
    duration: 10
    spreadAmount: 20
    smokePrototype: TearGasSmokeYellow
    solution:
      reagents:
      - ReagentId: SulfuricAcid
        Quantity: 12
  - type: StaticPrice
    price: 500
  - type: EorgPreventTrigger # Starlight
