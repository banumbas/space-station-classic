- type: entity
  id: CartridgeRifleRubber
  name: cartridge (.20 rifle rubber)
  parent: BaseCartridgeRifle
  components:
  - type: CartridgeAmmo
    proto: RubberBulletTrace
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#43c4f7"

- type: entity
  id: CartridgeRifleHP
  name: cartridge (.20 rifle HP)
  parent: BaseCartridgeRifle
  description: A modern intermediate cartridge for combat rifles. Standard kinetic ammunition is common and useful in most situations.
  components:
  - type: CartridgeAmmo
    proto: BulletRifleTraceHP
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#000000"

