- type: entity
  id: CartridgeMagnumRubber
  name: cartridge (.45 magnum rubber)
  parent: BaseCartridgeMagnum
  components:
  - type: CartridgeAmmo
    proto: RubberBulletTrace
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#43c4f7"

- type: entity
  id: CartridgeMagnumImprovised
  name: improvised cartridge (.45 magnum)
  description: A handmade revolver bullet, stuffed to the brim with phosphorus for extra 'oomph'. Still not as good as a normal magnum bullet.
  parent: [BaseCartridgePistol, BaseMinorContraband]
  components:
  - type: CartridgeAmmo
    proto: BulletMagnumTraceImprovised
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Ammunition/Casings/improvised_casing.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#717171"
  - type: Tag
    tags:
      - Cartridge
      - CartridgeMagnumImprovised
  - type: Construction
    graph: ImprovisedMagnumBulletGraph
    node: shell

- type: entity
  id: CartridgeMagnumHP
  name: cartridge (.45 magnum HP)
  parent: BaseCartridgeMagnum
  description: Heavy magnum cartridge mostly used by revolvers. Chalk ammunition is generally non-harmful, used for practice.
  components:
  - type: CartridgeAmmo
    proto: BulletMagnumTraceHP
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#000000"

- type: entity
  id: CartridgeMagnumFMJ
  name: cartridge (.45 magnum FMJ)
  parent: BaseCartridgeMagnum
  description: Heavy magnum cartridge mostly used by revolvers. Incendiary ammunition contains a self-igniting compound that sets the target ablaze.
  components:
  - type: CartridgeAmmo
    proto: BulletMagnumTraceFMJ
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#B68F0E"
