
- type: entity
  parent: AmmoProviderShotgunShell
  id: BoxShotgunBirdshot
  name: box of 12 gauge birdshot
  description: A cardboard box of 12 gauge shotgun shells loaded with fine birdshot pellets. Wide spread, short range, favored by the GA-6 Fang.
  components:
    - type: BallisticAmmoProvider
      proto: ShellShotgunBirdshot
    - type: Sprite
      layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-1
        map: ["enum.GunVisualLayers.Mag"]
      - state: lethal

- type: entity
  parent: [ BaseShellShotgun, BaseSecuritySalvageContraband ]
  id: ShellShotgunBirdshot
  name: 12 gauge birdshot
  description: A wide-spread shell loaded with dozens of tiny pellets. Devastating up close, nearly useless at range. Standard issue for the GA-6 Fang.
  components:
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#B87333"
      - state: spent
        map: [ "enum.AmmoVisualLayers.Spent" ]
        visible: false
  - type: CartridgeAmmo
    soundEject:
      collection: ShellEject
    proto: PelletShotgunBirdshotSpreadTrace

# the ZOZ is too shitty to fire real ammo

- type: entity
  id: BaseShellShotgunToz
  name: 20 gauge shell
  parent: BaseCartridge
  abstract: true
  components:
  - type: Tag
    tags:
    - ShellShotgunToz
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Ammunition/Casings/shotgun_shell_toz.rsi
    layers:
    - state: base
      map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Appearance
  - type: SpentAmmoVisuals
    revealSpent: true # Starlight
    tip: true

- type: entity
  id: ShellShotgunToz
  name: 20 gauge shell
  parent: [ BaseShellShotgunToz, BaseSovietContraband ]
  components:
  - type: Sprite
    layers:
    - state: base
      map: [ "enum.AmmoVisualLayers.Base" ]
    - state: tip
      map: [ "enum.AmmoVisualLayers.Tip" ]
      color: "#FFFFFF"
    - state: spent
      map: [ "enum.AmmoVisualLayers.Spent" ]
      visible: false
  - type: CartridgeAmmo
    soundEject:
      collection: ShellEject
    proto: PelletShotgunTozSpreadTrace
