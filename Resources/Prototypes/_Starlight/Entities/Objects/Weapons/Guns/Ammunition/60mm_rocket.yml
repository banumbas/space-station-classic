# Starlight 60mm Rocket Ammunition

# Starlight override of the base 60mm rocket projectile with radar blip.
- type: entity
  parent: Bullet60mmRocket
  id: Bullet60mmRocketStarlight
  categories: [ HideSpawnMenu ]
  components:
  - type: RadarBlip
    color: "#44FFAA"
    scale: 1.1
    shape: Circle
    requireInSpace: true
  - type: GuidedProjectile
    turnRate: 180

# 60mm Rocket Cartridge
- type: entity
  parent: [BaseItem, BaseMajorContraband]
  id: Cartridge60mmRocket
  name: 60mm rocket
  description: A 60mm rocket cartridge designed for the Vanyk-MK2 shuttle cannon system. Smaller and lighter than standard RPG rounds but still packs a punch.
  components:
  - type: Tag
    tags:
      - Cartridge60mmRocket
  - type: Item
    size: Small
  - type: CartridgeAmmo
    proto: Bullet60mmRocketStarlight
    deleteOnSpawn: true
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    state: rpg
  - type: StaticPrice
    price: 15

# 30-Round Magazine for 60mm Rockets
- type: entity
  parent: BaseMagazineGrenade
  id: Magazine60mmRocket
  name: 60mm rocket magazine
  description: A high-capacity 30-round magazine loaded with 60mm rockets for the Vanyk-MK2 shuttle cannon system.
  components:
  - type: Tag
    tags:
    - Magazine60mmRocket
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge60mmRocket
    proto: Cartridge60mmRocket
    capacity: 30
    soundRack:
      path: /Audio/Weapons/Guns/Bolt/lmg_bolt_closed.ogg
      params:
        variation: 0.05
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/rifle_load.ogg
      params:
        variation: 0.05
  - type: Item
    size: Huge
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/Grenade/grenade_cartridge.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-4
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false
  - type: StaticPrice
    price: 600

- type: entity
  parent: Magazine60mmRocket
  id: Magazine60mmRocketEmpty
  name: 60mm rocket magazine (empty)
  suffix: empty
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge60mmRocket
    capacity: 30
