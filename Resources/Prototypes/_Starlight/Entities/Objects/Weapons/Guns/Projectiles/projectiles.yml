- type: entity
  id: BaseBulletStarlight
  name: BaseBullet
  description: If you can see this you're probably dead!
  abstract: true
  components:
  - type: Reflective
  - type: FlyBySound
  - type: Clickable
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: bullet
      shader: unshaded
  - type: Physics
    bodyType: Dynamic
    linearDamping: 0
    angularDamping: 0
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
      fly-by: &flybyfixture
        shape: !type:PhysShapeCircle
          radius: 1.5
        layer:
        - Impassable
        - MidImpassable
        - HighImpassable
        - LowImpassable
        hard: False
  - type: Projectile
    impactEffect: BulletImpactEffect
    damage:
      types:
        Piercing: 14
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
  - type: TimedDespawn
    lifetime: 10

- type: entity
  name: taser bolt
  id: BulletAdvTaser
  parent: BaseBulletStarlight
  categories: [ HideSpawnMenu ]
  components:
  - type: FlyBySound
    sound:
      collection: EnergyMiss
      params:
        volume: 5
  - type: Sprite
    noRot: true
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    color: "#ffff33"
    layers:
    - state: spark
      shader: unshaded
  - type: Physics
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.45,0.15,0.15"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
      fly-by: *flybyfixture
  - type: Ammo
  - type: Projectile
    damage:
      types:
        Heat: 5
    soundHit:
      path: "/Audio/Weapons/Guns/Hits/taser_hit.ogg"
    forceSound: true
  - type: TimedDespawn
    lifetime: 0.2
  - type: StaminaDamageOnCollide
    damage: 33
  - type: StunOnCollide
    knockdownAmount: 0.5

- type: entity
  id: BaseBulletRubber
  parent: BaseBulletStarlight
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: rubber
  - type: Projectile
    damage:
      types:
        Blunt: 1
    soundHit:
      path: /Audio/Weapons/Guns/Hits/snap.ogg
  - type: StaminaDamageOnCollide
    damage: 12 # 9 hits to stun sounds reasonable


- type: entity
  name : laser bolt
  id: BulletEnergySMGLaser
  parent: BulletEnergyTurretBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Ammo
    muzzleFlash: MuzzleFlashEffectHeavyLaser
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: heavylaser
      shader: unshaded
  - type: Projectile
    impactEffect: BulletImpactEffectOrangeDisabler
    damage:
      types:
        Heat: 10

- type: entity
  name : disabler bolt
  id: BulletEnergySMGDisabler
  parent: BulletEnergyTurretBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Ammo
    muzzleFlash: MuzzleFlashEffectOmnilaser
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: omnilaser
      shader: unshaded
  - type: StaminaDamageOnCollide
    damage: 15
  - type: Projectile
    impactEffect: BulletImpactEffectDisabler
    damage:
      types:
        Heat: 0
    soundHit:
      collection: WeakHit
    forceSound: true

- type: entity
  parent: BaseBullet
  id: RadOrb
  name: radiation orb
  categories: [ HideSpawnMenu ]
  components:
  - type: FlyBySound
    sound:
      collection: EnergyMiss
      params:
        volume: 5
  - type: PointLight
    enabled: true
    color: "#38c23f"
    radius: 2.0
    energy: 7.0
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
      - state: bluespace
        shader: unshaded
    color: "#80c000"
  - type: Ammo
    muzzleFlash: null
  - type: Physics
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        mask:
        - Opaque
      fly-by: *flybyfixture
  - type: Projectile
    damage:
      types:
        Radiation: 20
    impactEffect: BulletImpactEffectDisabler
    ignoreShooter: false
    armingTime: 0.5
  - type: TimedDespawn
    lifetime: 10
  - type: Reflective
    reflective:
    - Energy

- type: entity
  parent: [ BulletGrenadeCleanade, BaseSyndicateContraband ]
  id: BulletGrenadeCleanadeSyndicate
  name: evil cleanade grenade round
  categories: [ HideSpawnMenu ]
  components:
    - type: SmokeOnTrigger
      duration: 3.5
      spreadAmount: 10
      smokePrototype: Foam
      solution:
        reagents:
          - ReagentId: SyndicateSpaceCleaner
            Quantity: 15

# Cosmic Cult

- type: entity
  id: ProjectileCosmicNova
  name: Astral Nova
  description: Uh oh.
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: PointLight
    color: "#42a4ae"
    radius: 2.0
    energy: 5.0
  - type: TimedDespawn
    lifetime: 10
  - type: Projectile
    impactEffect: CosmicNovaImpactVfx
    forceSound: true
    soundHit:
      path: /Audio/_Starlight/CosmicCult/ability_nova_impact.ogg
      params:
        variation: 0.1
        volume: +14
  - type: CosmicAstralNova
  - type: Sprite
    sprite: _Starlight/CosmicCult/Effects/ability_novavfx.rsi
    layers:
    - state: vfx
      shader: unshaded
  - type: GravityWell
    maxRange: 4
    baseRadialAcceleration: 12.5
    baseTangentialAcceleration: 4
    gravPulsePeriod: 0.05
  - type: SingularityDistortion
    intensity: +20
    falloffPower: 1.5
  - type: AmbientSound
    enabled: true
    volume: 0
    range: 10
    sound:
      path: /Audio/_Starlight/CosmicCult/ability_nova_ambient.ogg
  - type: CosmicCorrupting
    corruptionSpeed: 0.4
    useVFX: false
    mobile: true

- type: entity
  id: ProjectileCosmic
  name: Malign Bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  description: Ouch.
  components:
  - type: Reflective
    reflective:
    - Energy
  - type: Sprite
    noRot: false
    sprite: _Starlight/CosmicCult/Effects/weaponprojectiles.rsi
    layers:
      - state: razor
        shader: unshaded
  - type: Projectile
    impactEffect: BulletImpactEffectCosmic
    damage:
      types:
        Cold: 12
    soundHit:
      path: /Audio/_Starlight/CosmicCult/projectile_razor_hit.ogg
      params:
        variation: 0.08
  - type: Ammo
    muzzleFlash: null
  # Short lifespan
  - type: TimedDespawn
    lifetime: 0.6
  - type: SingularityDistortion
    intensity: +5
    falloffPower: 1.5
  - type: PointLight
    color: "#42a4ae"
    radius: 1.5
    energy: 6
    castShadows: false
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour
        interpolate: Linear
        minDuration: 0.58
        maxDuration: 0.59
        startValue: 0.1
        endValue: 6
        property: Energy
        enabled: true
        reverseWhenFinished: true

- type: entity
  id: ProjectileCosmicRazor
  name: Astral Bolt
  parent: ProjectileCosmic
  categories: [ HideSpawnMenu ]
  description: Ouch.
  components:
  - type: DamageMarkerOnCollide
    whitelist:
      components:
      - MobState
    damage:
      types:
        Cold: 15
        Asphyxiation: 10
  - type: Projectile
    impactEffect: BulletImpactEffectCosmic
    damage:
      types:
        Cold: 10
        Asphyxiation: 5

- type: entity
  id: BulletImpactEffectCosmic
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.66
  - type: Sprite
    drawdepth: Effects
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: _Starlight/CosmicCult/Effects/weaponarcs.rsi
      state: arc_cosmic
  - type: EffectVisuals
  - type: PointLight
    color: "#42a4ae"
    radius: 1.5
    energy: 6
    castShadows: false
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour
        interpolate: Linear
        minDuration: 0.64
        maxDuration: 0.65
        startValue: 0.1
        endValue: 6
        property: Energy
        enabled: true
        reverseWhenFinished: true
  - type: Tag
    tags:
      - HideContextMenu
