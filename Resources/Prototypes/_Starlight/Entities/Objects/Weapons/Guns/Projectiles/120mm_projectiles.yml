# Starlight 120mm Projectiles

- type: entity
  id: BulletGrenade120mmBlast
  name: 120mm blast grenade
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: grenade
    scale: 1.5, 1.5
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 450 # 3x stronger than normal blast grenade (150 * 3 = 450) - approximately ~6 tile radius
    intensitySlope: 8
    maxIntensity: 30
    canCreateVacuum: true
  - type: PointLight
    enabled: true
    radius: 3
    energy: 2
    color: "#ff4400"
  - type: RadarBlip
    color: "#FFDD00"
    scale: 1.0
    shape: Square
    requireInSpace: true
