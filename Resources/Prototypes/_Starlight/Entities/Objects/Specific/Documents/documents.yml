- type: entity
  parent: BaseItem
  id: ImportantDocumentGeneric
  abstract: true
  description: Looks highly classified!
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Specific/Documents/document.rsi
      layers:
      - state: background_messy
        map: [ "background" ]
      - state: bribe
        map: [ "bribe" ]
      - state: document
      - state: line
        map: [ "label" ]
    - type: Paper
      contentSize: 12000
      editingDisabled: true
    - type: ActivatableUI
      key: enum.PaperUiKey.Key
      requiresComplex: false
    - type: UserInterface
      interfaces:
        enum.PaperUiKey.Key:
          type: PaperBoundUserInterface
    - type: Tag
      tags:
        - Document
        - Paper
        - HighRiskItem
    - type: Item
      size: Normal
    - type: RandomSprite
      getAllGroups: true
      available:
        - background:
            background_messy: ""
            background_clean: ""
            background_large: ""
        - bribe:
            bribe: ""
            empty: ""
        - label:
            line: Departmental
            stamp: Departmental

