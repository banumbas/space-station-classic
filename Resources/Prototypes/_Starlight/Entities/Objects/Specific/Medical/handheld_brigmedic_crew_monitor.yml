- type: entity
  name: BrigBuddy™ 5000
  parent: [ PowerCellSlotMediumItem, BaseHandheldComputer, BaseSecurityContraband ]
  id: HandheldBrigmedicCrewMonitor
  description: So advanced it only tracks security personnel! Does not monitor emotional stability or competence levels of security members. Use at your own risk!
  components:
  - type: Tag
    tags:
      - BrigmedicBeltEquip
  - type: Item
    heldPrefix: scanner
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Medical/handheld_brigmedic_crewmonitor.rsi
    layers:
      - state: frame
        map: ["enum.CrewMonitorLayers.Frame"]
      - state: powered
        map: [ "enum.CrewMonitorLayers.Powered" ]
        visible: true
      - state: alert
        map: ["enum.CrewMonitorLayers.Alert"]
        visible: false
  - type: Appearance
  - type: BatteryVisuals
  - type: GenericVisualizer
    visuals:
      enum.BatteryVisuals.State:
        enum.CrewMonitorLayers.Powered:
          Full: { visible: true, shader: unshaded }
          Neither: { visible: true, shader: unshaded }
          Empty: { visible: false }
      enum.CrewMonitorVisuals.Alert:
        enum.CrewMonitorLayers.Alert:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
  - type: ActivatableUI
    key: enum.CrewMonitoringUIKey.Key
  - type: UserInterface
    interfaces:
      enum.CrewMonitoringUIKey.Key:
        type: CrewMonitoringBoundUserInterface
  - type: CrewMonitoringConsole
  - type: CrewMonitoringFilter
    shownDepartments:
    - Security
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: CrewMonitor
  - type: StationLimitedNetwork
  - type: WirelessNetworkConnection
    range: 500
  - type: StealTarget
    stealGroup: CrewMonitorCollection

- type: entity
  id: HandheldBrigmedicCrewMonitorEmpty
  parent: HandheldBrigmedicCrewMonitor
  suffix: Empty
  components:
  - type: Tag
    tags:
      - BrigmedicBeltEquip
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        blacklist:
          tags:
          - MechReactor
  - type: PowerCellDraw
    useCharge: 15
