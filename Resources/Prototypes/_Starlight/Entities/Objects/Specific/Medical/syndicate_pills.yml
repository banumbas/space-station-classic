# Lead
- type: entity
  name: lead
  parent: Pill
  id: PillLead5
  suffix: Lead 5u
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Lead
          Quantity: 5

# Here for consistency, but ideally if you're going to map these, use the 5u version instead.
- type: entity
  name: lead
  parent: Pill
  id: PillLead
  suffix: Lead 15u
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Lead
          Quantity: 15

