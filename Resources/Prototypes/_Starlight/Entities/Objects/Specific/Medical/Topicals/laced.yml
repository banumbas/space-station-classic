## Punct
- type: entity
  name: red punct-laced brute pack
  description: Specalized mixture of Puncturase and Security-Quality Red Goo. Best used for bullet-wounds, as it is much less effective on other types of damage.
  parent: BaseStarlightHealingItem
  id: RedPunctPack
  suffix: 20
  components:
  - type: Tag
    tags:
    - Brutepack
  - type: Sprite
    state: puncturaseredbrutepack3
  - type: Item
    heldPrefix: puncturaseredbrutepack
  - type: Healing
    damageContainers:
      - Biological
      - Hybrid
    delay: 1.6 # STARLIGHT
    damage:
      types:
        Piercing: -7.5
        Slash: -2.5
        Blunt: -2.5
    bloodlossModifier: -1 # Punct normally stops bleeding. Stands to reason a weaker version would slow it.
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
  - type: Stack
    stackType: RedPunctPack
    count: 20
  - type: InteractRestriction #FH - Edit
    restrictInteractionTarget:
      blacklist:  # Use blacklist instead of whitelist so can be clicked on bags/medkits
        - IPC

- type: entity
  name: red punct-laced brute pack
  description: Specalized mixture of Puncturase and Security-Quality Red Goo. Best used for bullet-wounds, as it is much less effective on other types of damage.
  parent: RedPunctPack
  id: RedPunctPack1
  suffix: 1
  components:
  - type: Sprite
    state: puncturaseredbrutepack
  - type: Stack
    stackType: RedPunctPack
    count: 1

- type: entity
  name: red punct-laced brute pack
  description: Specalized mixture of Puncturase and Security-Quality Red Goo. Best used for bullet-wounds, as it is much less effective on other types of damage.
  parent: RedPunctPack
  id: RedPunctPack10
  suffix: 10
  components:
  - type: Sprite
    state: puncturaseredbrutepack2
  - type: Stack
    stackType: RedPunctPack
    count: 10

- type: stack
  id: RedPunctPack
  name: stack-redpunctpack
  icon: { sprite: "/Textures/_Starlight/Objects/Specific/Medical/medical.rsi", state: puncturaseredbrutepack }
  spawn: RedPunctPack1
  maxCount: 20

