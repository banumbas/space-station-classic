- type: entity
  name: automender
  description: A device used to heal patients brute, burn or both damage types.
  parent: BaseStarlightHealingItem
  id: BaseAutoMender
  abstract: true
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Medical/mender.rsi
  - type: Item
    sprite: _Starlight/Objects/Specific/Medical/mender.rsi
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 35
  - type: ExaminableSolution
    solution: injector
    exactVolume: true
  - type: RefillableSolution
    solution: injector
  - type: SolutionItemStatus
    solution: injector
  - type: DrawableSolution
    solution: injector
  - type: DrainableSolution
    solution: injector
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: fillIndicator
    solutionName: injector
  - type: Tag
    tags:
      - AutoMender
  - type: InteractRestriction #FH - Edit
    restrictInteractionTarget:
      blacklist:  # Use blacklist instead of whitelist so can be clicked on bags/medkits
        - IPC

- type: entity
  id: AutoMenderBrute
  name: brute automender
  description: A device used to heal patients brute, burn or both damage types. Uses bicaridine to work.
  parent: BaseAutoMender
  components:
  - type: Sprite
    layers:
    - state: menderBrute
      map: ["enum.SolutionContainerLayers.Base"]
    - state: fillIndicator6
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: Item
    heldPrefix: menderBrute
  - type: Healing
    solutionDrain: true
    reagentsToDrain:
    - ReagentId: Bicaridine
      Quantity: 0.5
    delay: 0.5
    damageContainers:
      - Biological
      - Hybrid
    damage:
      groups:
        Brute: -2
    healingBeginSound:
      path: "/Audio/_Starlight/Items/Medical/mender.ogg"
    healingEndSound:
      path: "/Audio/_Starlight/Items/Medical/mender2.ogg"
  - type: RefillReagentFilter
    reagents:
    - Bicaridine

- type: entity
  suffix: Filled
  parent: AutoMenderBrute
  id: AutoMenderBruteFilled
  components:
  - type: SolutionContainerManager
    solutions:
      injector:
        reagents:
        - ReagentId: Bicaridine
          Quantity: 35

- type: entity
  id: AutoMenderBurn
  name: burn automender
  description: A device used to heal patients brute, burn or both damage types. Uses dermalin to work.
  parent: BaseAutoMender
  components:
  - type: Sprite
    layers:
    - state: menderBurn
      map: ["enum.SolutionContainerLayers.Base"]
    - state: fillIndicator6
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: Item
    heldPrefix: menderBurn
  - type: Healing
    solutionDrain: true
    reagentsToDrain:
    - ReagentId: Dermaline
      Quantity: 0.5
    damageContainers:
      - Biological
      - Hybrid
    delay: 0.5
    damage:
      types:
        Heat: -1.5
        Cold: -1.5
        Shock: -1.5
        Caustic: -1
    healingBeginSound:
      path: "/Audio/_Starlight/Items/Medical/mender.ogg"
    healingEndSound:
      path: "/Audio/_Starlight/Items/Medical/mender2.ogg"
  - type: RefillReagentFilter
    reagents:
    - Dermaline

- type: entity
  suffix: Filled
  parent: AutoMenderBurn
  id: AutoMenderBurnFilled
  components:
  - type: SolutionContainerManager
    solutions:
      injector:
        reagents:
        - ReagentId: Dermaline
          Quantity: 35
