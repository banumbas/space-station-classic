# It's skewed more towards god damn awful shit. The good shit, however, has a higher weight on syndicate chems. You also get *more* of each.
- type: weightedRandomFillSolution
  id: RandomFillOminousPill
  fills:
  # 5 groups for a total weight of 100
  # Very Good - weight: 15
    - quantity: 20
      weight: 9
      reagents:
      - Stimulants
    - quantity: 15
      weight: 1
      reagents:
      - Ichor
      - Necrosol
    - quantity: 10
      weight: 2
      reagents:
      - Cognizine
    - quantity: 15
      weight: 3
      reagents:
      - Vestine
  # Good - weight: 15
    - quantity: 25
      weight: 15
      reagents:
      - Desoxyephedrine
      - Ephedrine
      - Omnizine
      - Tricordrazine
      - Vitamin
      - PolypyryliumOligomers
      - Charcoal
  # Neutral - weight: 20
    - quantity: 25
      weight: 17.5
      reagents:
      - Ipecac
      - SodiumPolyacrylate
      - SpaceDrugs
      - SpaceGlue
      - Laughter
      - JuiceThatMakesYouWeh
      - Lipozine
      - Carpetium
      - Bananadine
      - THC
      - MindbreakerToxin
      - Mustard
      - HorseradishSauce
    - quantity: 10
      weight: 2.5
      reagents:
      - Honk
  # Bad - weight: 35
    - quantity: 25
      weight: 14
      reagents:
      - MuteToxin
      - Pax
      - Fresium
      - Cryptobiolin
    - quantity: 15
      weight: 14
      reagents:
      - Uranium
      - Licoxide
      - Razorium
      - Potassium
      - Phlogiston
    - quantity: 10
      weight: 7
      reagents:
      - Toxin
  # Very Bad - weight: 15
    - quantity: 25
      weight: 3
      reagents:
      - Nocturine
    - quantity: 15
      weight: 8
      reagents:
      - Bleach
      - CarpoToxin
      - BuzzochloricBees
      - Amatoxin
      - Tazinide
    - quantity: 10
      weight: 4
      reagents:
      - Lexorin
      - Lead

- type: entity
  name: ominous pill
  parent: Pill
  id: OminousPill
  description: This unusual pill bears no markings. You feel a sense of dread, but also... curiosity.
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 25 # Let's go gambling!
  - type: RandomFillSolution
    solution: food
    weightedRandomId: RandomFillOminousPill

