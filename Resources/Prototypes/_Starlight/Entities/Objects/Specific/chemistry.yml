- type: entity
  name: light beaker
  parent: [BaseBeakerMetallic, DrinkBaseOpenable, DrinkVisualsOpenable]
  description: The light side of an unbreakable beaker. Its true power can be sealed.
  id: LightBeaker
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Chemistry/lightbeaker.rsi
    layers:
      - state: beakerlarge
      - state: beakerlarge1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: _Starlight/Objects/Specific/Chemistry/lightbeaker.rsi
  - type: Spillable
    solution: beaker
  - type: StaticPrice
    price: 10
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: beakerlarge
    inHandsMaxFillLevels: 3
    inHandsFillBaseName: -fill-
  - type: Openable
    sound:
      collection: bottleOpenSounds
    closeable: true
    closeSound:
      collection: bottleCloseSounds
  - type: Sealable
    sealed: false
  - type: ExaminableSolution
    examinableWhileClosed: true
    heldOnly: false
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 3
    soundHit:
      collection: MetalThud
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 5
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 100

