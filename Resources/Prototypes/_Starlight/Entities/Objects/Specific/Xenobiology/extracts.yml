- type: entity
  parent: BaseItem
  id: BaseSlimeExtract
  abstract: true
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Specific/Xenobiology/slime_extract.rsi
      layers:
        - state: extract
    - type: SolutionContainerManager
      solutions:
        container:
          maxVol: 150
    - type: Item
      size: Tiny
    - type: MixableSolution
      solution: container
    - type: DrawableSolution
      solution: container
    - type: InjectableSolution
      solution: container
    - type: SolutionItemStatus
      solution: container
    - type: SlimeExtract
      containerName: container

- type: entity
  parent: BaseSlimeExtract
  id: GraySlimeExtract
  name: gray slime extract
  components:
    - type: Sprite
      color: "#999999ff"
    - type: SlimeExtract
      extractReactions:
        - GraySlimeExtractWaterReaction
        - GraySlimeExtractBloodReaction
        - GraySlimeExtractPlasmaReaction

- type: extractReaction
  id: GraySlimeExtractWaterReaction
  requirements:
    Water: 1
  effects:
    - effect: !type:AddReagentToSolution
        reagent: Epinephrine
        solution: container
      scalingFactor: 1
      scalingOffset: 0
  shouldDelete: false

- type: extractReaction
  id: GraySlimeExtractBloodReaction
  requirements:
    Blood: 1
  effects:
    - effect: !type:SpawnEntity
        entity: MonkeyCube
        number: 3
      scalingFactor: 0
      scalingOffset: 1
  shouldDelete: true

- type: extractReaction
  id: GraySlimeExtractPlasmaReaction
  requirements:
    Plasma: 1
  effects:
    - effect: !type:SpawnEntity
        entity: XenobiologySlimeGray
        number: 1
      scalingFactor: 0
      scalingOffset: 1
  shouldDelete: true

