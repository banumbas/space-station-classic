      scalingOffset: 0
  shouldDelete: true

- type: extractReaction
  id: OrangeSlimeExtractBloodReaction
  requirements:
    Blood: 1
  effects:
    - effect: !type:AddReagentToSolution
        reagent: CapsaicinOil
        solution: container
      scalingFactor: 10
      scalingOffset: 0
  shouldDelete: false

- type: extractReaction
  id: OrangeSlimeExtractPlasmaReaction
  requirements:
    Plasma: 1
  effects:
    - effect: !type:CreateGas
        gas: Plasma
      scalingFactor: 5
      scalingOffset: 0
    - effect: !type:CreateGas
