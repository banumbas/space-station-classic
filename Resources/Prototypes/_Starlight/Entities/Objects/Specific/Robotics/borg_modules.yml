# generic modules
- type: entity
  id: BorgModuleUppies
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: personnel transport cyborg module
  description: A universal cyborg module which allows the unit to carry small personnel.
  components:
  - type: Tag
    tags:
      - BorgModuleGeneric
      - PersonnelStorage
  - type: Sprite
    layers:
    - state: generic
    - state: icon-hands
  - type: ItemBorgModule
    hands:
    - forceRemovable: true
      hand:
        emptyRepresentative: MobResomi
        emptyLabel: borg-slot-uppies-empty
        whitelist:
          components:
          - HumanoidAppearance
    - forceRemovable: true
      hand:
        emptyRepresentative: MobResomi
        emptyLabel: borg-slot-uppies-empty
        whitelist:
          components:
          - HumanoidAppearance
  - type: BorgModuleIcon
    icon: { sprite: _Starlight/Interface/Actions/actions_borg.rsi, state: hands }

- type: entity
  id: BorgContrabandBag
  parent: BaseStorageItem
  name: contraband bag
  description: An integrated evidence bag mounted directly into a security cyborg's chassis. It can collect contraband on contact, and will drop to the floor if the cyborg is incapacitated.
  components:
  - type: Sprite
    sprite: Clothing/Back/Duffels/security.rsi
    state: icon
  - type: Item
    size: Ginormous
  - type: Storage
    maxItemSize: Large
    grid:
    - 0,0,8,3
    quickInsert: true
    areaInsert: false
    whitelist:
      components:
      - Contraband
  - type: Dumpable
  - type: Unremoveable
    deleteOnDrop: false

