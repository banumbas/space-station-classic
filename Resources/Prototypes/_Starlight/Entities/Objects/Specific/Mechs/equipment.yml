- type: entity
  id: MechEquipmentBorgPilot
  parent: [ BaseMechEquipment ]
  name: exosuit silicon control beacon
  description: A device used to transmit exosuit data. Also allows active cyborg units to take control of said exosuit.
  components:
  - type: MechEquipment
    equipmentType: Passive
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Mechs/equipment.rsi
    state: exosuit_beacon
  - type: Item
  - type: MultiHandedItem
  - type: PilotSupportModule
    pilotWhitelist:
      components:
        - BorgChassis
  - type: Tag
    tags:
    - CombatMech
    - IndustrialMech
    - SpecialMech

- type: entity
  id: MechEquipmentSecGrabber
  parent: [ BaseMechEquipment, CombatMechEquipment, BaseSecurityContraband]
  name: Hydraulic Claw
  description: A specialized Hydraulic claw designed for the containment of multiple subjects. Can hold up to 4 items at once.
  components:
  - type: Sprite
    state: paddy_claw
  - type: Item
  - type: MultiHandedItem
  - type: MechGrabber
    maxContents: 4
    grabDelay: 3
    grabEnergyDelta: -10
    CanGrabMobs: true
  - type: UIFragment
    ui: !type:MechGrabberUi
  - type: ContainerContainer
    containers:
      item-container: !type:Container
  - type: ChildBlockVision
  - type: SurgeryTool
    speed: 0.7
    startSound:
      path: /Audio/Mecha/sound_mecha_hydraulic.ogg
  - type: Retractor

- type: entity
  id: MechEquipmentCamera
  parent: [ BaseMechEquipment, CombatMechEquipment ]
  name: mech night vision camera
  description: night vision camera, allows you to switch the visor to night vision for increased visibility in poorly lit areas.
  components:
  - type: MechEquipment
    equipmentType: Passive
  - type: Sprite
    state: mecha_camera
  - type: MechEquipmentAction
    actionId: ActionMechToggleNightVision
  - type: MechNightVision
