# Industrial Mechs

# Ripley MK-II
- type: entity
  id: MechRipley2
  parent: [ BaseMech, IndustrialMech, BaseCargoContraband ]
  name: Ripley APLU MK-II
  description: The "MK-II" has a pressurized cabin for space operations, and stronger clamps are able to force doors open, but the added weight has slowed it down. # 🌟Starlight-Change
  components:
    - type: Sprite
      drawdepth: Mobs
      noRot: true
      sprite: _Starlight/Objects/Specific/Mechs/Mechs/ripleymkii.rsi
      layers:
        - map: [ "enum.MechVisualLayers.Base" ]
          state: base
    - type: FootstepModifier
      footstepSoundCollection:
        path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
    - type: Mech
      equipmentWhitelist:
        tags:
          - IndustrialMech
          - PaddyUpgradeKit
      baseState: base
      openState: base-open
      brokenState: base-broken
      mechToPilotDamageMultiplier: 0.0
      airtight: true
      pilotWhitelist:
        components:
          - HumanoidAppearance
    - type: MeleeWeapon
      hidden: true
      attackRate: 1
      damage:
        types:
          Blunt: 25 #brought in line with Ripley
    - type: MovementSpeedModifier
      baseWalkSpeed: 2 #All mechs walk at the same speed
      baseSprintSpeed: 3.0 #Mk II is still slower, but not unusably slow
    - type: Damageable
      damageModifierSet: MediumArmorNT
    - type: PointLight
      mask: /Textures/Effects/LightMasks/cone.png
      autoRot: true
      radius: 3
      energy: 5
      enabled: false
    - type: Construction
      graph: PaddyUpgrade
      node: start
      defaultTarget: paddy
    - type: Prying
      pryPowered: true

- type: entity
  id: MechRipley2Battery
  parent: MechRipley2
  suffix: Battery, Air
  components:
    - type: ContainerFill
      containers:
        mech-battery-slot:
          - MechReactorHigh
        mech-gas-tank-slot:
          - MechAirTankFilled

# Paddy
- type: entity
  id: MechPaddy
  parent: [ BaseMech, CombatMech, IndustrialMech, BaseSecurityContraband ]
  name: Paddy
  description: Autonomous Power Loader Unit Subtype Paddy. A Modified MK-II Ripley design intended for light security use.
  components:
    - type: Sprite
      drawdepth: Mobs
      noRot: true
      sprite: _Starlight/Objects/Specific/Mechs/Mechs/paddy.rsi
      layers:
        - map: [ "enum.MechVisualLayers.Base" ]
          state: base
        - state: base-sirens
          map: [ "enum.MechVisualLayers.Siren" ]
          shader: unshaded
          visible: false
    - type: FootstepModifier
      footstepSoundCollection:
        path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
    - type: Mech
      equipmentWhitelist:
        tags:
          - PaddyMech
          - IndustrialMech
      baseState: base
      openState: base-open
      brokenState: base-broken
      mechToPilotDamageMultiplier: 0.0
      airtight: true
      maxEquipmentAmount: 4
      pilotWhitelist:
        components:
          - HumanoidAppearance
    - type: MechSiren
    - type: MeleeWeapon
      hidden: true
      attackRate: 1
      bluntStaminaDamageFactor: 1.5
      damage:
        types:
          Blunt: 30 #Decent for a loader, but without the high structural damage of a combat mech. #
    - type: MovementSpeedModifier
      baseWalkSpeed: 2
      baseSprintSpeed: 4
    - type: PointLight
      mask: /Textures/Effects/LightMasks/cone.png
      autoRot: true
      radius: 5
      energy: 5
      enabled: false

- type: entity
  id: MechPaddyBattery
  parent: MechPaddy
  suffix: Battery, Air
  components:
    - type: ContainerFill
      containers:
        mech-battery-slot:
          - MechReactorHigh
        mech-gas-tank-slot:
          - MechAirTankFilled

- type: entity
  id: MechPaddyFilled
  parent: MechPaddyBattery
  suffix: Battery, Air, Filled
  components:
    - type: Mech
      startingEquipment:
        - WeaponMechCombatDisabler
        - WeaponMechCombatFlashbangLauncher

