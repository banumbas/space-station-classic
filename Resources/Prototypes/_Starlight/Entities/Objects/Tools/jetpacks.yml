#USSP
- type: entity
  id: JetpackSSFMarine
  parent: [BaseJetpack, BaseSovietContraband]
  name: SSF marine jetpack
  suffix: Empty
  description: Standard issued soviet-made jetpack for the kosmos.
  components:
    - type: Item
      sprite: _Starlight/Objects/Tanks/Jetpacks/marine_jetpack.rsi
    - type: Sprite
      sprite: _Starlight/Objects/Tanks/Jetpacks/marine_jetpack.rsi
    - type: Clothing
      sprite: _Starlight/Objects/Tanks/Jetpacks/marine_jetpack.rsi
      slots:
        - Back
        - suitStorage
        - Belt
#Starlight Start
    - type: ClothingSpeedModifier
      walkModifier: 1.0
      sprintModifier: 1.0
    - type: HeldSpeedModifier
#Starlight End

- type: entity
  id: JetpackSSFMarineFilled
  parent: [JetpackSSFMarine, BaseSovietContraband]
  name: SSF marine jetpack
  description: Standard issued soviet-made jetpack for the kosmos.
  components:
    - type: Item
      sprite: _Starlight/Objects/Tanks/Jetpacks/marine_jetpack.rsi
    - type: Sprite
      sprite: _Starlight/Objects/Tanks/Jetpacks/marine_jetpack.rsi
    - type: Clothing
      sprite: _Starlight/Objects/Tanks/Jetpacks/marine_jetpack.rsi
      slots:
        - Back
        - suitStorage
        - Belt
    - type: GasTank
      outputPressure: 42.6
      air:
        volume: 5
        temperature: 293.15
        moles:
          - 1.025689525 # oxygen
          - 1.025689525 # nitrogen

#Improvised Empty
- type: entity
  id: JetpackImprovised
  parent: [ BaseJetpack, BaseMinorContraband ]
  name: improvised jetpack
  description: It's a jetpack. It can hold 1.5 L of gas.
  suffix: Empty
  components:
    - type: Item
      sprite: _Starlight/Objects/Tanks/Jetpacks/improvised.rsi
    - type: Sprite
      sprite: _Starlight/Objects/Tanks/Jetpacks/improvised.rsi
    - type: Clothing
      sprite: _Starlight/Objects/Tanks/Jetpacks/improvised.rsi
      slots:
        - Back
        - suitStorage
        - Belt
    - type: GasTank
      outputPressure: 42.6
      air:
        volume: 1.5
    - type: Tag
      tags:
      - CorgiWearable
    - type: Construction
      graph: JetpackImprovisedGraph
      node: jetpack

#Improvised Filled
- type: entity
  id: JetpackImprovisedFilled
  parent: JetpackImprovised
  name: improvised jetpack
  suffix: Filled
  components:
  - type: GasTank
    outputPressure: 42.6
    air:
      # 4 minutes of thrust
      volume: 1.5
      temperature: 293.15
      moles:
        Oxygen: 0.307706858 # oxygen
        Nitrogen: 0.307706858 # nitrogen

#Empty CE void
- type: entity
  id: JetpackVoidEngineer
  parent: [ BaseJetpack, BaseGrandTheftContraband ]
  name: chief engineer's void jetpack
  suffix: Empty
  components:
  - type: Item
    sprite: _Starlight/Objects/Tanks/Jetpacks/ce_void.rsi
    size: Normal
  - type: Sprite
    sprite: _Starlight/Objects/Tanks/Jetpacks/ce_void.rsi
  - type: Clothing
    sprite: _Starlight/Objects/Tanks/Jetpacks/ce_void.rsi
    slots:
      - Back
      - suitStorage
      - Belt
  - type: ClothingSpeedModifier
    walkModifier: 1.0
    sprintModifier: 1.0
  - type: HeldSpeedModifier
  - type: Tag
    tags:
    - HighRiskItem
  - type: StealTarget
    stealGroup: JetpackChiefEngineerFilled

