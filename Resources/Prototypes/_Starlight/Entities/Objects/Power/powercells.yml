  - type: Battery
    maxCharge: 1800
    startingCharge: 1800
  - type: BatterySelfRecharger
    autoRechargeRate: 12
    autoRechargePauseTime: 10

- type: entity
  id: MechReactorMicro
  name: thor-class mech reactor
  description: A miniaturised reactor core, built to be fit into a mech chassis. This model features superior cooling systems to facilitate low reactor latency, at the cost of deep heat sinks.
  parent: MechReactorBase
  components:
  - type: Sprite
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: microreactor
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
  - type: Battery
    maxCharge: 720
    startingCharge: 720
  - type: BatterySelfRecharger
