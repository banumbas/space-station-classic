- type: entity
  name: brigmedic defibrillator battery
  description: You are fairly certain this is a AA battery in disguse..
  id: PowerCellTiny
  suffix: Full
  parent: BasePowerCell
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Power/power_cells.rsi
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: tiny
  - type: Item
    size: Small    
  - type: Battery
    maxCharge: 250 #while in theory this could give five uses, in practice it gives 2-3 uses (between charge-up time, cooldown and idle-time). Any lower and the margins are too narrow to get more than 1 use out of the defib.
    startingCharge: 250
  - type: Tag
    tags:
      - PowerCellTiny
  - type: GenericVisualizer #TODO: make these real states
    visuals:
      enum.BatteryVisuals.State:
        enum.PowerCellVisualLayers.Unshaded:
          Full: {visible: false}
          Neither: {visible: false}
          Empty: {visible: false}

- type: entity
  parent: BasePowerCell
  id: YellowSlimeExtractPowercell
  name: yellow slime extract powercell
  components:
    - type: Sprite
      layers:
        - map: [ "enum.PowerCellVisualLayers.Base" ]
          state: microreactor
        - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
          state: o2
          shader: unshaded
      color: "#ffeb52ff" # Yes I'm just taking the microreactor sprite and painting it yellow, sue me
    - type: Battery
      maxCharge: 1080
      startingCharge: 1080
    - type: BatterySelfRecharger
      autoRechargeRate: 5

# Mech Reactors
- type: entity
  id: MechReactorBase
  name: standard mech reactor
  description: A miniaturised reactor core, built to be fit into a mech chassis.
  parent: BasePowerCell
  abstract: true
  components:
  - type: Item
    size: Ginormous
  - type: MultiHandedItem
  - type: Sprite
    sprite: _Starlight/Objects/Power/mech_reactors.rsi
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: medium
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
      visible: false
  - type: GenericVisualizer
    visuals:
      enum.BatteryVisuals.State:
        enum.PowerCellVisualLayers.Unshaded:
          Full: {visible: false}
          Neither: {visible: true, state: o1}
          Empty: {visible: true, state: o2}
  - type: Battery
    maxCharge: 720
    startingCharge: 720
  - type: Tag
    tags:
      - MechReactor

- type: entity
  id: MechReactorStandard
  name: standard mech reactor
  description: A miniaturised reactor core, built to be fit into a mech chassis. It is quite slow, and has to cool down for some time before it begins to generate power.
  parent: MechReactorBase
  components:
  - type: BatterySelfRecharger
    autoRechargeRate: 8
    autoRechargePauseTime: 15

- type: entity
  id: MechReactorHigh
  name: workhorse-class mech reactor
  description: A miniaturised reactor core, built to be fit into a mech chassis. It is just as slow as the standard model, but has much a much higher heat capacity.
  parent: MechReactorBase
  components:
  - type: Sprite
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: high
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
  - type: Battery
    maxCharge: 1080
    startingCharge: 1080
  - type: BatterySelfRecharger
    autoRechargeRate: 8
    autoRechargePauseTime: 15

- type: entity
  id: MechReactorHyper
  name: longhaul-class mech reactor
  description: A miniaturised reactor core, built to be fit into a mech chassis. This model is outfitted with deep heatsinks and an upgraded coolant loop for extended operational time.
