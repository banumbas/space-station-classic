- type: entity
  id: MechReactorAntique
  name: emperor-class mech reactor
  description: A miniaturised reactor core, built in a more civilised age. It is highly efficient, and will never overheat.
  parent: MechReactorBase
  components:
  - type: Sprite
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: antique
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
  - type: Battery
    maxCharge: 1200
    startingCharge: 1200
  - type: BatterySelfRecharger
    autoRechargeRate: 60
    autoRechargePauseTime: 0

- type: entity
  id: MechReactorShielded
  name: paladin-class mech reactor
  description: A miniaturised reactor core, built in a more civilised age. It is highly efficient, but trades some of the advanced cooling systems of the emperor-class reactor for an energy shield system. The device ports on this do not interface with modern mech systems, but we can probably jury-rig that with a multitool...
  parent: MechReactorBase
  components:
  - type: Sprite
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: paladin
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
  - type: Battery
    maxCharge: 1200
    startingCharge: 1200
  - type: BatterySelfRecharger
    autoRechargeRate: 40
    autoRechargePauseTime: 0
  - type: EnergyDomeGenerator
    damageEnergyDraw: 2
    domePrototype: EnergyDomeSmallPink
    canInteractUse: false
    canDeviceNetworkUse: true
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: WirelessNetworkConnection
    range: 100
  - type: DeviceLinkSink
    ports:
    - Toggle
    - On
    - Off

- type: entity
  id: MechReactorBurnout
  name: burnout-class mech reactor
  description: A miniaturised reactor core, built to be fit into a mech chassis. The burnout-class reactor series is controversial for their extreme focus on extended burst windows... at the cost of fully melting down as they are used.
  parent: MechReactorBase
  components:
  - type: Sprite
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: burnout
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
  - type: Battery
    maxCharge: 40000
    startingCharge: 40000

- type: entity
  id: MechReactorCavalier
  name: cavalier-class mech reactor
  description: A miniaturised reactor core, built in a more civilised age. This model is overclocked, increasing operational speeds at the expense of both cooling systems and heat sinks.
