    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
      color: "#FF8800"
  - type: Battery
    maxCharge: 18600
    startingCharge: 18600
  - type: StaticPrice
    price: 9000

