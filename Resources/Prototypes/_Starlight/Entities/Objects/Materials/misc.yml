        - synthetic_bluespace_crystal_2
        - synthetic_bluespace_crystal_3
    - type: Sprite
      sprite: _Starlight/Objects/Materials/materials.rsi
      state: synthetic_bluespace_crystal_3
      layers:
        - state: synthetic_bluespace_crystal_3
          map: ["base"]

