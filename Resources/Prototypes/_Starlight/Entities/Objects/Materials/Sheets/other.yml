- type: entity
  parent: Paper
  id: SheetPrinter
  suffix: Full
  components:
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      SheetPrinter: 100
  - type: Stack
    stackType: SheetPrinter
    baseLayer: base
    layerStates:
    - paper
    - paper
    - paper
  - type: Sprite
    state: paper
    layers:
    - state: paper
      map: ["base"]
    - state: paper_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: Tag
    tags:
    - Document

- type: entity
  parent: SheetPrinter
  id: SheetPrinter1
  suffix: Single
  components:
  - type: Stack
    stackType: SheetPrinter
    count: 1

- type: entity
  parent: BaseItem
  id: CheapInsulatedFabric
  name: cheap insulated fabric
  description: A bolt of rough insulated fabric, not much use in it's current form.
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Misc/insults.rsi
      state: cheapinsulativefabric
    - type: Item
      sprite: _Starlight/Objects/Misc/insults.rsi
    - type: Butcherable
      butcheringType: Knife
      spawned:
        - id: InsulatedThread
    - type: Tag
      tags:
        - CheapInsulatedFabric
    
- type: entity
