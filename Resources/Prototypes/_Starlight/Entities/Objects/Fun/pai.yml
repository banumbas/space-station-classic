- type: entity
  parent: BaseMentalAction
  id: ActionPAIPDA
  name: Open PDA
  description: Opens the PDA UI if you are in one.
  components:
    - type: Action
      icon:
          sprite: Objects/Devices/pda.rsi
          state: pda
      itemIconStyle: NoItem
    - type: InstantAction
      event: !type:PAIPDAActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionPAIConsole
  name: Access Console
  description: Opens the console UI if you are slotted in one.
  components:
  - type: Action
    icon: { sprite: Structures/Machines/computers.rsi, state: avionics-systems }
    itemIconStyle: NoItem
  - type: InstantAction
    event: !type:PAIConsoleActionEvent

- type: entity
  parent: EncryptionKeySyndie
  id: EncryptionKeySyndiePAI
  components:
    - type: Unremoveable

- type: entity
  parent: [ PersonalAI, BaseMagicalContraband ]
  id: WizardPersonalAI
  name: wizard personal ai device
  description: Your magical pal who's fun to be with!
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Fun/pai.rsi
    layers:
    - state: wizard-pai-base
    - state: wizard-pai-off-overlay
      shader: unshaded
      map: ["screen"]
  - type: ToggleableGhostRole
    roleName: pai-system-role-name-wizard
    roleDescription: pai-system-role-description-wizard
    roleRules: ghost-role-information-wizard-pai-rules
    mindRoles:
    - MindRoleGhostRolePAI
  - type: ContainerFill #Starlight pAI comms rework, see PR #3299
    containers:
      key_slots:
      - EncryptionKeyWizardMasterUnremovable
  - type: EncryptionKeyHolder #Starlight pAI comms rework, see PR #3299
    keySlots: 2
  - type: UniversalLanguageSpeaker
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableGhostRoleVisuals.Status:
        screen:
          Off: { state: wizard-pai-off-overlay }
          Searching: { state: wizard-pai-searching-overlay }
          On: { state: wizard-pai-on-overlay }
