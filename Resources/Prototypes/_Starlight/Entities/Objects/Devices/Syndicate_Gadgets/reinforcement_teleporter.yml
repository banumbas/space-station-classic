- type: entity # funkystation, with different description and id card for us
  parent: ClothingBackpackDuffelSyndicateBundle
  id: ClothingBackpackDuffelSyndicateFilledSyndicateCyborgAssault
  name: Syndicate Assault Cyborg bundle
  description: Radio in a syndicate assault cyborg, equipped with a modified L6, a double esword and basic hacking tools. Comes bundled with a few Syndicate IDs for you and your buddies, just to make sure you're on the Cyborg's good side.
  components:
  - type: StorageFill
    contents:
    - id: ReinforcementRadioSyndicateCyborgAssault
    - id: SyndiOperativeIDCard
    - id: SyndicateFootsoldierIDCard
    - id: SyndicateFootsoldierIDCard

