- type: entity
  id: nctdatachip
  parent: [Clothing, BaseCommandContraband]
  name: NCT Trainee Access Chip
  description: A small electronic access token that allows its user to copy the access of their Trainee. Only accessible by NT Career Trainers!
  components:
  - type: Clothing
    quickEquip: false
    slots:
    - idcard
    sprite: Objects/Misc/id_cards.rsi
  - type: Sprite
    sprite: _Starlight/Objects/Devices/nctdatachip.rsi
    layers:
    - state: base
    - state: enabled
      shader: unshaded
      visible: false
  - type: Item
    size: Small
    heldPrefix: default
    storedRotation: -90
  - type: Access
  - type: Tag
    tags:
    - DoorBumpOpener
  - type: NCTDataChip

- type: entity
  parent: [ Clothing, BaseMinorContraband ]
  id: MakeshiftID
  name: makeshift ID card
  description: A set of door electronics rewired to act as an ID card.
  components: # Noteably absent is the ID card component and nanochat component - so borgs will treat you as non crew. It also can't be used in a PDA, and cannot be reprogrammed by an ID card computer.
  - type: Sprite
    sprite: _Starlight/Objects/Misc/id_cards.rsi
    state: makeshift
  - type: Clothing
    slots:
    - idcard
    sprite: _Starlight/Objects/Misc/id_cards.rsi # Moffstation
  - type: Access
    tags:
    - Maintenance
  - type: Tag
    tags:
    - DoorBumpOpener
    - WhitelistChameleon
    - WhitelistChameleonIdCard
