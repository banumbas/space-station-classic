      maxItemSize: Small
      grid:
        - 0,0,4,4
      whitelist:
        components:
          - Stamp
    - type: EntityTableContainerFill
      containers:
        storagebase: !type:AllSelector
          children:
            - id: RubberStampCentcom
            - id: RubberStampCAD
            - id: RubberStampCCD
            - id: RubberStampCED
            - id: RubberStampCID
            - id: RubberStampCMD
            - id: RubberStampCRD
            - id: RubberStampCDD
            - id: RubberStampCSOD
            - id: RubberStampCSD
