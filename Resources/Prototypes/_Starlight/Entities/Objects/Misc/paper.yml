- type: entity
  parent: Paper
  id: TapeRecorderTranscript
  name: record transcript
  # TODO: could have a unique sprite in the future

- type: entity
  name: MedTak invoice
  parent: Paper
  id: PaperMedTak
  description: A piece of paper headed by the MedTak logo. It looks expensive. For you.
  components:
  - type: Sprite
    layers:
    - state: paper
      color: "#ffffff"
    - state: paper_words
      map: ["enum.PaperVisualLayers.Writing"]
      color: "#ffffff"
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: PaperVisuals
    headerImagePath: "/Textures/_Starlight/Interface/Paper/paper_heading_medtak_logo.svg.96dpi.png"
    backgroundImagePath: "/Textures/Interface/Paper/paper_background_default.svg.96dpi.png"
    backgroundPatchMargin: 16.0, 16.0, 16.0, 16.0
    contentMargin: 8.0, 16.0, 8.0, 0.0
    maxWritableArea: 400.0, 0.0

- type: entity
  name: nt-cc paper
  parent: Paper
  id: PaperNTCC
  description: A single unit of bureaucracy, branded with the logos of NanoTrasen and Central Command.
  components:
  - type: Sprite
    sprite: Objects/Misc/bureaucracy.rsi
    layers:
    - state: paper_ntcc
    - state: paper_ntcc_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: PaperVisuals
    backgroundPatchMargin: 16.0, 16.0, 16.0, 16.0
    contentMargin: 0.0, 0.0, 0.0, 0.0
    headerImagePath: "/Textures/_Starlight/Interface/Paper/paper_heading_nt_cc_logos.svg.96dpi.png"
    headerMargin: 0.0, 0.0, 0.0, 0.0

- type: entity
  parent: NukeCodePaper
  id: NukeCodePaperAllNukes
  suffix: All Nukes
  components:
  - type: NukeCodePaper
    allNukesAvailable: true
    printAll: true
