- type: entity
  name: TSF ziptie pack
  parent: [BaseItem, BaseTSFContraband]
  id: TSFZiptiePack
  description: A compact pack containing ten single-use zipties. Standard issue for Trans Solar Federation peacekeepers for quick restraint of multiple suspects. Use it to dispense zipties one at a time.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Misc/ziptie_pack.rsi
    state: icon
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: Storage
    maxItemSize: Tiny
    grid:
    - 0,0,4,1
    whitelist:
      components:
      - Handcuff
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: Zipties
        amount: 10
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface

- type: entity
  name: Picture frame
  parent: [BaseItem]
  id: PictureFrame
  description: A flimsy amalgamation of wood scraps used to hold colourful paper.
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Misc/desktop_picture_frame.rsi
      state: icon
    - type: Item
      size: Small
    - type: Engraveable
      engraveVerb: "engraving-picture-verb"
      popupMessage: "engraving-picture-Ui-Popup"
      noEngravingText: "engraving-picture-no-message"
      engraveSuccessMessage: "engraving-picture-succeed"
      hasEngravingText: "engraving-picture-has-message"
