- type: entity
  name: energy shield
  parent: [BaseItem, BaseXenoborgContraband]
  id: EnergyShieldUnbreakable
  suffix: Unbreakable, Less Reflect, Weaker
  description: Exotic energy shield, when folded, can even fit in your pocket.
  components:
    - type: ItemToggle
      soundActivate:
        path: /Audio/Weapons/ebladeon.ogg
      soundDeactivate:
        path: /Audio/Weapons/ebladeoff.ogg
    - type: ItemToggleActiveSound
      activeSound:
        path: /Audio/Weapons/ebladehum.ogg
    - type: ItemToggleSize
      activatedSize: Huge
    - type: ComponentToggler
      components:
      - type: DisarmMalus
        malus: 0.6
    - type: Sprite
      sprite: Objects/Weapons/Melee/e_shield.rsi
      layers:
        - state: eshield-icon
        - state: eshield-on
          color: "#FFFFFF"
          visible: false
          shader: unshaded
          map: [ "shield" ]
    - type: Item
      size: Small
      sprite: Objects/Weapons/Melee/e_shield.rsi
      heldPrefix: eshield
    - type: UseDelay
      delay: 0.5
    - type: ToggleableVisuals
      spriteLayer: shield
      inhandVisuals:
        left:
          - state: inhand-left-shield
            shader: unshaded
        right:
          - state: inhand-right-shield
            shader: unshaded
    - type: PointLight
      netsync: false
      enabled: false
      radius: 2
      energy: 2
      color: blue
      castShadows: false #SL lighting optimization
    - type: ItemTogglePointLight
    - type: Reflect
      reflectProb: 0.30
      reflects:
        - Energy
    - type: Blocking
      passiveBlockModifier:
        coefficients:
          Blunt: 0.25
          Slash: 0.15
          Piercing: 0.10
          Heat: 0.15
      activeBlockModifier: # You shouldn't be able to wield it, but if for some reason you end up doing it, no more immortality.
        coefficients:
          Blunt: 0.4
          Slash: 0.35
          Piercing: 0.25
          Heat: 0.35
      passiveBlockFraction: 0.2
      activeBlockFraction: 0.3
    - type: Appearance
    - type: Damageable
      damageContainer: Shield
    - type: ExaminableDamage
      messages: EnergyShieldMessages
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 7
          Heat: 7
    - type: StaticPrice
      price: 350
    - type: Tag
      tags:
        - Shield
    - type: Pierceable
      level: HardenedMetal

- type: entity
  name: X-03 green phase shield
  parent: [BaseItem, BaseCentcommContraband ]
  id: GreenLightShield
  categories: [ DoNotMap ]
  description: Reverse engineered from a prototype that NT loaned CentComm, the wavelength has been tweaked to the glorious CentComm Green. While active, the micro-reactor cannot vent excess heat and needs to be shut off for a while to re-charge.
  components:
    - type: ItemToggle
      soundActivate:
        path: /Audio/Weapons/ebladeon.ogg
      soundDeactivate:
        path: /Audio/Weapons/ebladeoff.ogg
    - type: ItemToggleActiveSound
      activeSound:
        path: /Audio/Weapons/ebladehum.ogg
    - type: ItemToggleSize
      activatedSize: Huge
    - type: ComponentToggler
      components:
        - type: DisarmMalus
          malus: 0.6
    - type: Clothing
      quickEquip: false
      slots:
      - Belt
      - suitStorage
    - type: Sprite
      sprite: _Starlight/Objects/Weapons/Melee/greenlight_shield.rsi
      layers:
        - state: off-icon
        - state: on-icon
          color: "#FFFFFF"
          visible: false
          shader: unshaded
          map: [ "shield" ]
    - type: Item
      size: Small
      sprite: _Starlight/Objects/Weapons/Melee/greenlight_shield.rsi
      heldPrefix: off
    - type: UseDelay
      delay: 0.5
    - type: ToggleableVisuals
      spriteLayer: shield
      inhandVisuals:
        left:
          - state: on-inhand-left
            shader: unshaded
        right:
          - state: on-inhand-right
            shader: unshaded
    - type: ItemTogglePointLight
    - type: Reflect
      reflectProb: 0.10
      reflects:
        - Energy
      reflectEnergyDraw: 80
    - type: Appearance
    - type: PointLight
      netsync: false
      enabled: false
      radius: 2
      energy: 3
      color: "#439909"
      castShadows: false
    - type: PowerCellSlot
      cellSlotId: cell_slot
    - type: ItemSlots
      slots:
        cell_slot:
          name: power-cell-slot-component-slot-name-default
          startingItem: PowerCellSmallNuclear
          locked: true
    - type: ForceQuickDraw
    - type: ToggleCellDraw
    - type: PowerCellDraw
      drawRate: 2  # watts while active
    - type: Blocking
      passiveBlockModifier:
        coefficients:
          Blunt: 1.0
          Slash: 0.8
          Piercing: 0.85
          Heat: 0.6
      activeBlockModifier:
        coefficients:
          Blunt: 0.95
          Slash: 0.75
          Piercing: 0.5
          Heat: 0.4
        flatReductions:
          Heat: 1
          Piercing: 1
      damageEnergyDraw: 4
    - type: Damageable
      damageContainer: Shield
    - type: ContainerContainer
      containers:
        cell_slot: !type:ContainerSlot
    - type: Tag
      tags:
        - Shield
    - type: Pierceable
      level: HardenedMetal

