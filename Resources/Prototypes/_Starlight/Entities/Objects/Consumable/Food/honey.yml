- type: entity
  name: honeybar
  parent: BaseItem
  id: FoodHoneybar
  description: A sticky and sweet grain bar coated in honey.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/honey_bar.rsi
    state: honey_bar
  - type: Item
    size: Tiny
  - type: Edible
  - type: FlavorProfile
    flavors:
      - honey
      - sweet
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
  - type: Tag
    tags:
      - FoodSnack

