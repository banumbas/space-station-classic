      flavors:
        - bitter
    - type: SolutionContainerManager
      solutions:
        food:
          maxVol: 20
          reagents:
            - ReagentId: Acrileni
              Quantity: 5
    - type: Sprite
      sprite: _Starlight/Objects/Specific/Hydroponics/resinfera.rsi
    - type: Item
      heldPrefix: produce
    - type: Produce
      seedId: resinfera
    - type: Tag
      tags:
        - Fruit
