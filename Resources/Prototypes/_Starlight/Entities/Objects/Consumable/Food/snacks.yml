- type: entity
  parent: BaseItem
  id: FoodSnackHardCandy
  name: hard candy
  description: So many flavors of sugar!
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/hardcandy.rsi
    state: candy_wrapped
    color: "#ff63be"
  - type: Item
    size: Tiny
    storedOffset: -1,-1
  - type: Tag
    tags:
      - FoodSnack
  - type: SpawnItemsOnUse
    items:
      - id: FoodPacketHardCandyTrash
      - id: FoodSnackHardCandyOpen
    sound:
      path: /Audio/Effects/unwrap.ogg
    requireHands: false # 🌟Starlight🌟

- type: entity
  parent: FoodSnackBase
  id: FoodSnackHardCandyOpen
  name: hard candy
  description: So many flavors of sugar! Tastes even better with the skin off.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/hardcandy.rsi
    state: candy
    color: "#ff7dc9"
  - type: Item
    storedOffset: -1,-1
  - type: Tag
    tags:
    - FoodSnack
    - ReptilianFood
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20 # Room for extra condiments
        reagents:
        - ReagentId: Sugar
          Quantity: 15
  - type: FlavorProfile
    flavors:
    - sweet

- type: entity
  categories: [ HideSpawnMenu ]
  parent: FoodPacketTrash
  id: FoodPacketHardCandyTrash
  name: candy wrapper
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/hardcandy.rsi
    state: wrapper
    color: "#ff63be"
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - Trash
