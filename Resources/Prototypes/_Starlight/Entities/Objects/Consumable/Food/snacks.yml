- type: entity
  parent: BaseItem
  id: FoodSnackHardCandy
  name: hard candy
  description: So many flavors of sugar!
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/hardcandy.rsi
    state: candy_wrapped
    color: "#ff63be"
  - type: Item
    size: Tiny
    storedOffset: -1,-1
  - type: Tag
    tags:
      - FoodSnack
  - type: SpawnItemsOnUse
    items:
      - id: FoodPacketHardCandyTrash
      - id: FoodSnackHardCandyOpen
    sound:
      path: /Audio/Effects/unwrap.ogg
    requireHands: false # 🌟Starlight🌟

- type: entity
  parent: FoodSnackBase
  id: FoodSnackHardCandyOpen
  name: hard candy
  description: So many flavors of sugar! Tastes even better with the skin off.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/hardcandy.rsi
    state: candy
    color: "#ff7dc9"
  - type: Item
    storedOffset: -1,-1
  - type: Tag
    tags:
    - FoodSnack
    - ReptilianFood
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20 # Room for extra condiments
        reagents:
        - ReagentId: Sugar
          Quantity: 15
  - type: FlavorProfile
    flavors:
    - sweet

- type: entity
  categories: [ HideSpawnMenu ]
  parent: FoodPacketTrash
  id: FoodPacketHardCandyTrash
  name: candy wrapper
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/hardcandy.rsi
    state: wrapper
    color: "#ff63be"
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - Trash

- type: entity
  parent: FoodInjectableBase
  id: FoodLollipopPlain
  name: lollipop
  description: A sugary treat on a stick. Make sure to add some flavoring!
  components:
  - type: FlavorProfile
    flavors:
      - sweet
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/lollipop.rsi
    layers:
    - state: white_lollipop
    - state: white_lollipop_fill_1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Item
    sprite: _Starlight/Objects/Consumable/Food/lollipop.rsi
    size: Small
    storedRotation: -45
    storedOffset: 0,-1
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
          - ReagentId: Sugar
            Quantity: 10
  - type: RefillableSolution
    solution: food
  - type: SolutionContainerVisuals
    maxFillLevels: 2
    fillBaseName: white_lollipop_fill_
    solutionName: food
    changeColor: true
    inHandsMaxFillLevels: 2
    inHandsFillBaseName: _fill_
  - type: Appearance
  - type: Tag
    tags:
    - FoodSnack
  - type: Clothing
    sprite: _Starlight/Objects/Consumable/Food/lollipop.rsi
    equippedPrefix: white_lollipop
    slots: [ mask ]

# Rodentia Cheese Box
- type: entity
  id: FoodPacketCheeseBox
  parent: FoodSnackNutribrick
  name: cheese box
  description: A randomly selected piece of cheese from the NanoTrasen galactic cheese vault. Calorie dense and irresistible to rodents!
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/cheese.rsi
    state: box
  - type: SpawnItemsOnUse
    items:
      - id: FoodPacketCheeseBoxTrash
      - id: FoodNutriCheeseEdam
        orGroup: Cheese
      - id: FoodNutriCheeseBrie
        orGroup: Cheese
      - id: FoodNutriCheeseMozzarellaSticks
        orGroup: Cheese
      - id: FoodNutriCheeseGorgonzola
        orGroup: Cheese
    sound:
      path: /Audio/Effects/unwrap.ogg
    requireHands: false

- type: entity
  id: FoodRodentiaCheeseBase
  parent: FoodSnackNutribrickOpen
  abstract: true
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/cheese.rsi
  - type: FlavorProfile
    flavors:
      - cheesy

- type: entity
  id: FoodPacketCheeseBoxTrash
  parent: FoodPacketMRETrash
  name: cheese box
  description: A box that once held delicious cheese, is now a crumbled mess.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/cheese.rsi
    state: box-trash

- type: entity
  id: FoodNutriCheeseEdam
  parent: FoodRodentiaCheeseBase
  name: edam
  description: A delicate and nutty cheese, wrapped in a thin red wax for it's protection.
  components:
  - type: Sprite
    state: edam
  - type: FlavorProfile
    flavors:
      - cheesy
      - nutty

- type: entity
  id: FoodNutriCheeseBrie
  parent: FoodRodentiaCheeseBase
  name: brie
  description: Soft and creamy, like butter.
  components:
  - type: Sprite
    state: brie
  - type: FlavorProfile
    flavors:
      - cheesy
      - creamy

- type: entity
  id: FoodNutriCheeseMozzarellaSticks
  parent: FoodRodentiaCheeseBase
  name: mozzarella sticks
  description: Stringy cheese sticks! Yum!
  components:
  - type: Sprite
    state: mozzarella-sticks
  - type: FlavorProfile
    flavors:
      - cheesy
      - stringy

- type: entity
  id: FoodNutriCheeseGorgonzola
  parent: FoodRodentiaCheeseBase
  name: gorgonzola
  description: The stinkiest cheese for the stinkiest of mice!
  components:
  - type: Sprite
    state: gorgonzola
  - type: FlavorProfile
    flavors:
      - cheesy
      - stinky
