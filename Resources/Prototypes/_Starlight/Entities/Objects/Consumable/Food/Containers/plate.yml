
# festive plate, used by festive dinner - yields no resources and cannot be sold
# gets around the annoyance of having to use 16+ plates in the big feast recipe

- type: entity
  name: festive plate
  parent: FoodPlate
  id: FoodPlateFestive
  description: A festive plate. Cheerful.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/plate.rsi
    state: plate-small-festive
  - type: Item
    storedOffset: 0,-3
    inhandVisuals:
      left:
      - state: plate-festive-inhand-left
      right:
      - state: plate-festive-inhand-right
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -8
      - !type:SpawnEntitiesBehavior
        spawn:
          FoodPlateFestiveTrash:
            min: 0
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: PhysicalComposition
    materialComposition:
      Glass: 0
  - type: StaticPrice
    price: 0

- type: entity
  parent: FoodPlateTrash
  id: FoodPlateFestiveTrash
  description: Christmas is over.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/plate.rsi
    state: plate-small-festive-trash
  - type: Item
    storedOffset: 0,-3
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -8
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
