
- type: entity
  name: roast turkey
  parent: FoodMealBase
  id: FoodFeastTurkey
  description: "An entire roast turkey. You're going to share, right?"
  components:
    - type: MultiHandedItem
    - type: FlavorProfile
      flavors:
        - meaty
    - type: Item
      size: Normal
      shape:
        - 0,0,3,2
      inhandVisuals:
        left:
          - state: plate-inhand-left
        right:
          - state: plate-inhand-right
    - type: Edible
      trash:
        - FoodPlate
    - type: Sprite
      sprite: _Starlight/Objects/Consumable/Food/turkey.rsi
      layers:
        - state: turkeycooked
    - type: SolutionContainerManager
      solutions:
        food:
          maxVol: 350 # it's hollow
          reagents:
            - ReagentId: Nutriment
              Quantity: 200
            - ReagentId: Protein
              Quantity: 100
            
    - type: Tag
      tags:
        - Meat
    - type: SliceableFood
      count: 16
      slice: FoodTurkeySlice

- type: entity
  name: roast turkey slice
  parent: FoodMealBase
  id: FoodTurkeySlice
  description: A serving of roast turkey. Next time make the whole feast!
  components:
    - type: MultiHandedItem
    - type: FlavorProfile
      flavors:
        - meaty
    - type: Item
      size: Tiny
    - type: Sprite
      sprite: _Starlight/Objects/Consumable/Food/turkey.rsi
      layers:
        - state: turkeyslice
    - type: SolutionContainerManager
      solutions:
        food:
          maxVol: 22
          reagents:
            - ReagentId: Nutriment
              Quantity: 13
            - ReagentId: Protein
              Quantity: 6
    - type: Tag
      tags:
        - Meat

# hypothetically contains 320 nutriment, 100 protein, 50 gravy, 8 vitamin
- type: entity
  name: festive feast
  parent: BoxCardboard
  id: FoodFeastFestiveDinner
  description: Collectively it contains at least 32,000 calories.
  components:
    - type: MultiHandedItem
    - type: Storage
      grid:
        - 0,0,7,3
      maxItemSize: Normal
      whitelist:
        tags:
        - FestiveDinner
      hideStackVisualsWhenClosed: false
    - type: Item
      size: Normal
      shape:
        - 0,0,3,2
      sprite: _Starlight/Objects/Consumable/Food/turkey.rsi
      inhandVisuals:
        left:
          - state: plate-inhand-both
        right:
          - state: plate-inhand-both
    - type: Sprite
      sprite: _Starlight/Objects/Consumable/Food/turkey.rsi
      layers:
        - state: turkeyfeasted
        - state: turkeyfeast
          map: ["turkeyfeast1"]
        - state: turkeyfeast
          map: ["turkeyfeast2"]
    - type: Tag
      tags:
        - Meat
        - Potato
        - Trash
    - type: ItemCounter
      count:
        tags: [FestiveDinner]
      composite: true
      layerStates:
      - turkeyfeast1
      - turkeyfeast2
    - type: Appearance
    - type: EntityTableContainerFill
      containers:
        storagebase: !type:AllSelector
          children:
            - id: FoodMealFestiveDinner
              amount: 8
            - id: FoodMealFestiveDinnerGravy
              amount: 8

- type: entity
  name: festive dinner
  parent: FoodMealBase
  id: FoodMealFestiveDinner
  description: Roast turkey, mashed potatoes, and cabbage. Not bad!
  components:
    - type: FlavorProfile
      flavors:
        - meaty
        - potatoes
        - cabbage
    - type: Item
      shape:
        - 0,0,1,0
      inhandVisuals:
        left:
          - state: plate-festive-inhand-left
        right:
          - state: plate-festive-inhand-right
    - type: Edible
      trash:
        - FoodPlateFestive
    - type: Sprite
      sprite: _Starlight/Objects/Consumable/Food/plate.rsi
      layers:
        - state: festivedinner
    - type: SolutionContainerManager
      solutions:
        food:
          maxVol: 35
          reagents:
            - ReagentId: Nutriment
              Quantity: 20
            - ReagentId: Protein
              Quantity: 6
            - ReagentId: Vitamin
              Quantity: 4
    - type: Tag
      tags:
        - Meat
        - Potato
        - FestiveDinner

