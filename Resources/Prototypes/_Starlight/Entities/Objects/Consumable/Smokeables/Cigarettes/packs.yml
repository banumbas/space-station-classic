- type: entity
  id: CigPackSoviet
  parent: CigPackBase
  name: Gerat's sandworm packet
  description: For when a sandworm has managed to eat your nuclear MRV supply.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Smokeables/Cigarettes/Packs/soviet.rsi
  - type: Item
    sprite: _Starlight/Objects/Consumable/Smokeables/Cigarettes/Packs/soviet.rsi

- type: entity
  id: CigPackRollie
  parent: PackPaperRolling
  name: rollie packet
  description: An old rolling paper packet full of things to make rollies with.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: CigaretteFilter
          amount: 2
        - id: PaperRolling
          amount: 2
        - id: GroundTobacco5
          amount: 2
        - id: CigaretteSyndicate
          amount: 2

- type: entity
  id: CigPackMedRollie
  parent: PackPaperRolling
  name: medicinal blunt packet
  description: An old rolling paper packet full of things to make blunts with. Its purely medicinal man..
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: LeavesTobaccoDried5
          amount: 2
        - id: GroundCannabis10
          amount: 1
        - id: Blunt
          amount: 2

- type: entity
  id: CigPackBub
  parent: PackPaperRolling
  name: greyman's specials pack
  description: An old rolling paper packet full of Greyman's special cigarettes. You feel more surgically inclined while smoking them.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: CigaretteBub
          amount: 10

