# File for the  STARLIGHT specific metamorphic pre-filled drinks

- type: entity
  parent: DrinkGlass
  id: DrinkTheLastCall
  suffix: the last call
  description: There are no good or bad choices. Only consequences.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: TheLastCall
          Quantity: 30
  - type: Icon
    sprite: _Starlight/Objects/Consumable/Drinks/thelastcall.rsi
    state: icon

# this drink was missing, so now it is not missing
