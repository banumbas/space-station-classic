    - ExcessivelyOrganized
    - MostImportant
    - LeastImportant
    - MustDoDrugs
    - WorshipSilicons
    - DinnerEtiquette
    - HugGood
    - NeverAlone
    - VeryReligious
    - OnlySpeakToCommand
    - Scheduler
    - ProperStorage
    - TheftNeutral
    - Duel
    - Prometheus
    - Klingon
    - SogginsLaw
    - Generous
    - FavorsRepaid
    - Bookkeeper
    - SacredBlood
    - GiftReciever
    - NewJob
    - DepartmentTitle
    - Barefoot
    - Hospitable
    - VoxSymp
    - Smoker
    - EyeForEye
    - Optimist
    - ItemGood
    - Hypochondriac
    - ImposterSyndrome
    - YesMan
    - Centrist
    - SpeechRestriction
    - StationExistsForDepartment
    - MuteSympathizer
    - BlindSympathizer
    - AnimalRightsActivist
    - GlubEchoGlub
