- type: metamorphRecipe
  id: FoodSausageBun
  key: Burger
  result: FoodSausageBun
  rules:
  - !type:SequenceLength
    range:
      min: 2
      max: 3
  - !type:IngredientsWithTags # 1 cooked sausage
    tags:
    - Cooked
    - Meat
    - Sausage
    count:
      min: 1
      max: 2
  - !type:IngredientsWithTags # 1 cheese
    tags:
    - Cheese
    count:
      min: 0
      max: 2
  - !type:LastElementHasTags # last bun
    tags:
    - Bun
