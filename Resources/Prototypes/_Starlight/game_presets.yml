#EventLight Gamemode for Event Usage
- type: gamePreset
  id: EventLight
  alias:
    - eventlight
    - eventlite
    - eventdiet
  name: eventlight-title
  description: eventlight-description
  showInVote: false
  rules:
    - SpaceTrafficControlEventScheduler
    - ThiefGamerule
    - BasicRoundstartVariation

- type: gamePreset
  id: SubXenoborgs
  alias:
    - subxenoborgs
    - xenoborgsminorantag
    - originalxenoborgs
    - xenoborgslp
  name: xenoborgs-title
  description: xenoborgs-description
  minPlayers: 20
  showInVote: true
  rules:
  - SubXenoborgs
  - SubGamemodesRuleNoXenoborg # No two motherships. Allows wizards to spawn on Xenoborgs. Space is dangerous, yo.
  - BasicStationEventScheduler
  - MeteorSwarmScheduler
  - SpaceTrafficControlEventScheduler
  - BasicRoundstartVariation

- type: gamePreset
  id: ShitStation
  alias:
    - shitstation
    - trashstation
  name: shitstation-title
  description: shitstation-description
  showInVote: true
  minPlayers: 0
  rules:
    - ShitStationEventScheduler # It's all trash/shit/ion/derelict/minor critter event spawns. Should make the station feel sufficiently shitty.
    - BasicStationEventScheduler
    - BasicStationEventScheduler # More events without ramping events. What could go wrong?
    - MeteorSwarmMildScheduler
    - SubGamemodesRule
    - BasicRoundstartVariation
    - BasicRoundstartVariation
    - BasicRoundstartVariation
    - BasicRoundstartVariation
    - BasicRoundstartVariation

