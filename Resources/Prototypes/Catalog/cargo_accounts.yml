- type: cargoAccount
  id: Cargo
  name: cargo-account-cargo-name
  code: cargo-account-cargo-code
  color: "#b48b57"
  radioChannel: Supply
  acquisitionSlip: PaperAcquisitionSlipCargo
  # Starlight BEGIN
  tamperSealName: tamper-seal-account-name-cargo
  tamperSealColor: "#b38b56"
  tamperSealAccesses:
    - allOf: [ "Cargo" ] # Regular crew
      noneOf: [ "Borg" ]
    - allOf: [ "Borg", "BorgCargo" ] # Cyborg
  # Starlight END

