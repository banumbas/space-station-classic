- type: entity
  parent: BoxCardboard
  id: BoxSurvival
  name: survival box
  description: It's a box with basic internals inside.
  # suffix: Standard # Starlight: remove suffix
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ClothingMaskBreath
        - id: EmergencyOxygenTankFilled
        - id: EmergencyMedipen
        - id: Flare
        - id: FoodSnackNutribrick
        - id: DrinkWaterBottleFull
  - type: Sprite
    layers:
    - state: internals
    - state: emergencytank
  - type: Item # Starlight start
    shape:
      - 0,0,1,3
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,1,3 # Starlight end

- type: entity
  parent: BoxSurvival
  id: BoxSurvivalNitrogen
  suffix: Nitrogen # Starlight: Make suffix clearer
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ClothingMaskBreath
        - id: EmergencyNitrogenTankFilled
        - id: EmergencyMedipen
        - id: Flare
        - id: FoodSnackNutribrick
        - id: DrinkWaterBottleFull
  - type: Sprite
    layers:
    - state: internals
    - state: nitrogentank
  - type: Label
    currentLabel: reagent-name-nitrogen

