        Record #6

        Lead Scientist Viktor Keyes

        PROJECT ALGERNON


        I've locked myself in the security room. They've broken out and taken control over the station. As soon as the Gorlex Operatives left, they began their plotting, hiding weapon parts in their cheeks of all things. They assembled a pistol within the chambers and assaulted a scientist, before breaking out and taking the entire station. The meager security forces we had were no longer capable of stopping them.


        I couldn't be more proud of my creations.
