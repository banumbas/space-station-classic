        [head=1][color=#660000]──────────────────[/color][/head]


        Record #2

        Lead Scientist Viktor Keyes

        PROJECT ALGERNON


        The first of the subjects has spoken today. Intensive surgery and connection to a direct MMI was required, but basic speech was achieved. This is evolution on a scale unprecedented, just a few weeks ago these meek-minded things were incapable of comprehending their own limbs, but the rat is a creature that adapts far faster than we do. It was able to understand the basics of learning, and come a few more months, I hope to teach it language and more advanced processing. My benefactors may yet have the fast growing soldiers they so wish for, it's already capable of wielding weaponry, and even firing pistols, despite having no greater understanding of what it's doing.


        I couldn't be more pleased.

