        [head=1][color=#660000]──────────────────[/color][/head]


        Record #1

        Lead Scientist Viktor Keyes

        PROJECT ALGERNON


        Through experimentation on the species Rattus norvegicus, Rattus exulans, and Peromyscus leucopus, a most interesting discovery was made by yours truly only a few years ago. Through means arcane or otherwise poorly understood, the genome of these sample species is capable of mutation when exposed to a certain mixture of anomalous activity, chemical treatment, and dietary constraints. A baseline intelligence has been formed, no, molded by our own hands as we continue to observe and shape this simple new sentience into something greater.


        I have finally been allotted the funding needed for my research, and the station required. I tremble with excitement. Just as the humble lab rat elevated the very fields of science before, now, it shall do its duty again.

