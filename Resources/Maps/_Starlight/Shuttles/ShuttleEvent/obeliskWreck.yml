        [head=1][color=#660000]──────────────────[/color][/head]


        Record #5

        Lead Scientist Viktor Keyes

        PROJECT ALGERNON


        Of the twenty four subjects that participated in the Marauder training, only five survived. But these five are a brilliant bunch. Capable now of far more than I could ever have imagined. Another test run was performed, this time accomplishing our strike-task without casualties, and with greater speed than we could have expected. More funding from our benefactors has arrived, and one of the Rodentia subjects was even directly recruited by the Gorlex Marauders. I wish they hadn't taken our star subject away, but they aren't a group to be argued with. Test Subject #71 'Despereaux' has been sent off to join them.


