        [head=1][color=#660000]──────────────────[/color][/head]


        Record #3

        Lead Scientist Viktor Keyes

        PROJECT ALGERNON


        A riot happened today. Three of the scientists were injured, and one dead. A Rodentia subject had managed to slip some chunk of metal into the airlock door to prevent its closing, and with some of its brothers broke out and attempted to flee on a docked delivery shuttle.


        Each one now is being subjected to dissection. I went too far beyond the goals of my benefactors. I must instill, above all, loyalty to the cause. First and foremost.


        The next batch will need extensive brain modification. The remainder of this test group has been terminated. Onto greener pastures.

