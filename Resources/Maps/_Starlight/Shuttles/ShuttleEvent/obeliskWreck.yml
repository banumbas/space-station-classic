        [head=1][color=#660000]──────────────────[/color][/head]


        Record #4

        Lead Scientist Viktor Keyes

        PROJECT ALGERNON


        Progress at last! Grueling months of study, and no less than three separate failed batches of disloyalists. But now we have a promising case study. Fully capable of intelligent speech, learning, receiving and performing orders, and vat-grown in under two weeks time. It is not bold of me to say that I've outdone the wildest expectations of my benefactors. Today was the first mission.


        It was simple, to take a small asteroid mining outpost. Viewing the camera feeds from the helmet, it was obvious that more militant training would be required. The Rodentia are agile, yes, but in the laboratory they are unable to get anything more than a basic understanding of firearms. Despite having overwhelmingly better weapons and armor, our team of six was reduced to just two before the mission was finally accomplished. I have taken the mind to hire some specialists from the Gorlex Marauders to come train the survivors and those who will be coming up in the next test batch. Funding is running thin, but I believe this will prove enough to convince our benefactors for another stipend.



